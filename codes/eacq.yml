code_id: eacq
#physical: bits
#logical: qubits

name: 'Entanglement-assisted (EA) hybrid QECC'
short_name: 'EA hybrid'
introduced: '\cite{arxiv:0802.2414,arxiv:0807.2080,arxiv:1911.12260}'

# alternative_names:
#   - 'Entanglement-assisted classical-quantum (EACQ) code'
# not to be confused with c-q codes

description: |
  Code that encodes quantum and classical information and requires pre-shared
  entanglement for transmission.

  EA hybrid block quantum codes on \(n\) Galois qubits of dimensional \(q\) are denoted by \(((n,k:c,d;e))_q\), where \(k\) (\(c\)) is the number of encoded qubits (classical bits), where \(d\) is the distance, and where \(e\) is the required number of pre-shared ebits.
  Similarly, block codes on \(n\) modular qudits are denoted by \(((n,k:c,d;e))_{\mathbb{Z}_q}\).


  In alternative conventions (not used here), EA hybrid codes are called entanglement-assisted classical-quantum (EACQ) codes.
  Here, we use the term classical-quantum for codes for transmitting classical information over quantum channels.

# arxiv:1701.06963,arxiv:1911.12260 uses union and CWS

protection: |
  If an EA hybrid code is viewed as transmitting \(C\) cbits,
  \(Q\) qubits, and consuming \(E\) ebits, then the EA hybrid Singleton bound is
  the set of triples \((C,Q,E)\) for which there exists a parameter
  \(t\in[0,\log q]\) such that
  \begin{align}
    C + 2Q & \leq (n-d+1)(\log q + t)~,\\
    Q - E & \leq (n-2d+2)t~,\\
    C + Q - E & \leq (n-d+1)\log q - (d-1)t~,
  \end{align}
  for \(q\)-ary physical systems \cite[Thm. 8]{arxiv:2202.02184}.

features:
  rate: 'Trade-off between classical communication, quantum communication, and entanglement distribution has been examined \cite{arxiv:0811.4227,arxiv:0901.3038,arxiv:0903.3920}; see also Ref. \cite{arxiv:quant-ph/0501045}.'

notes:
  - 'Examples from the original paper include a \([[9,1:3,3;0]]\) code obtained from the Shor code, a \([[8,1:3,3;1]]\) code obtained from an \([[8,1,3;1]]\) EAQECC, and a \([[63,21:12,7;6]]\) code obtained from the \([[63,21,9;6]]\) EAQECC built from a classical \([63,39,9]\) BCH code \cite{arxiv:0802.2414}.'
  - 'Within the EAOAQEC stabilizer framework, EACQ codes are a proper subclass of the broader entanglement-assisted hybrid subspace codes; in particular, not every EA hybrid subspace code is EACQ-representable \cite{arxiv:2411.14389}.'

relations:
  parents:
    - code_id: eaoaecc
      detail: 'An EAOA QECC that has no gauge structure (e.g., gauge qubits), that has a block structure that corresponds to a classical code, and that utilizes pre-shared entanglement is an EA hybrid QECC.'
  cousins:
    - code_id: hybridqecc
      detail: 'EA hybrid codes utilize additional ancillary subsystems in a pre-shared entangled state, but reduce to hybrid QECCs when said subsystems are interpreted as noiseless physical subsystems.'
