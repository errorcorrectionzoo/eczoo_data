code_id: squeezed_coherent_bpsk
physical: oscillators
logical: reals

name: 'Squeezed-coherent BPSK c-q modulation format'
short_name: 'Squeezed BPSK c-q'
introduced: '\cite{doi:10.1109/TIT.1979.1056033}'

alternative_names:
  - 'Displaced-squeezed BPSK c-q modulation format'
  - 'Squeezed-state BPSK c-q modulation code'
  - 'Squeezed-state BPSK c-q modulation scheme'
  - 'Squeezed-state BPSK c-q signaling format'
  - 'Two-photon coherent-state BPSK c-q modulation format'
  # Original work called squeezed states two-photon coherent states

description: |
  Bosonic c-q binary modulation format whose codewords are antipodal displaced-squeezed states, i.e., states of the form \(D(\pm\alpha)S(\zeta)|0\rangle\) for a common squeezing parameter \(\zeta\).
  The format was originally formulated using the term \textit{two-photon coherent states} (TCS), an early name for squeezed states.

protection: |
  Optimizing the displacement and squeezing for fixed mean photon number \(N\) changes the coherent-state BPSK overlap exponent from \(4N\) to \(4N(N+1)\) \cite[Eq. (3.41)]{doi:10.1109/TIT.1979.1056033}.
  Thus, in the ideal binary pure-state discrimination expression, the coherent-state BPSK factor \(\exp[-4N]\) is replaced by \(\exp[-4N(N+1)]\).

features:
  rate: 'The c-q capacity of squeezed-state modulation over a \hyperref[topic:ad]{pure-loss bosonic channel} with coherent homodyne or heterodyne receivers, including closed-form optima for homodyne detection, was studied in Ref. \cite[Ch. 5]{manual:{S. Guha, “Classical capacity of the free-space quantum-optical channel”, S.M. thesis, Massachusetts Institute of Technology (2004), \href{http://hdl.handle.net/1721.1/87908}{URL}}}.'
  decoders:
    - 'Homodyne detection realizes the field-quadrature measurement advantage of antipodal TCS signals in the ideal model \cite{doi:10.1109/TIT.1979.1056033}.'
    - 'Homodyne and heterodyne receivers for squeezed-state modulation are treated in Ref. \cite[Ch. 5]{manual:{S. Guha, “Classical capacity of the free-space quantum-optical channel”, S.M. thesis, Massachusetts Institute of Technology (2004), \href{http://hdl.handle.net/1721.1/87908}{URL}}}.'

relations:
  parents:
    - code_id: bosonic_classical_into_quantum
  cousins:
    - code_id: squeezed_cat
      detail: 'Squeezed-coherent BPSK c-q modulation transmits classical information using displaced-squeezed states, while squeezed cat codes store quantum information in superpositions of squeezed coherent states.'


