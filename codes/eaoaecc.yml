code_id: eaoaecc

name: 'Entanglement-assisted operator-algebra QECC (EAOA QECC)'
short_name: 'EAOA QECC'
introduced: '\cite{arxiv:2411.14389}'

description: |-
  A code family that encompasses ordinary (i.e., subspace) codes, subsystem codes, classical-quantum codes, hybrid codes, and their entanglement-assisted counterparts using an operator-algebraic framework.
  In the EAOAQEC framework, the original EAQEC, EAOQEC, and EACQ formalisms appear as special cases, and the operator-algebra perspective also yields EA hybrid subspace and EA subsystem codes beyond those earlier settings \cite{arxiv:2411.14389}.

protection: |-
  For Pauli noise with noiseless receiver ebits, the EAOAQEC framework gives a unified error-correction criterion and an associated distance notion that specialize to the corresponding conditions for EAQEC, EAOQEC, and EACQ codes \cite{arxiv:2411.14389}.


relations:
  parents:
    - code_id: quantum_into_quantum
  cousins:
    - code_id: oaecc
      detail: 'EAOA QECCs use pre-shared entangled ancillary subsystems, while OAQECCs recover the same operator-algebraic structures when those ancillary subsystems are instead treated as noiseless physical subsystems.'


