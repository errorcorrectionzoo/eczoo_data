code_id: coxeter_todd
physical: reals
logical: reals

name: 'Coxeter-Todd \(K_{12}\) lattice'
short_name: '\(K_{12}\)'
introduced: '\cite{doi:10.4153/CJM-1953-043-4}'

description: |
  Even integral lattice in dimension \(12\) that gives the densest known lattice packing.
  Its automorphism group was discovered by Mitchell \cite{doi:10.2307/2370513}.
  As a real lattice, \(K_{12}\) is equivalent, up to rescaling, to its dual \(K_{12}^{\perp}\) \cite[Ch. 4, pg. 128]{doi:10.1007/978-1-4757-6568-7}.
  For more details, see \cite[Sec. 4.9]{doi:10.1007/978-1-4757-6568-7}\cite{doi:10.1017/S0305004100060746}.

protection: |
  The \(K_{12}\) lattice exhibits the densest known lattice packing in 12 dimensions.

relations:
  parents:
    - code_id: points_into_lattices
  cousins:
    - code_id: leech
      detail: 'The Coxeter-Todd lattice can be realized as a subset of the Leech lattice \cite[Ch. 4, pg. 128]{doi:10.1007/978-1-4757-6568-7}.'
    - code_id: hexacode
      detail: 'The hexacode can be used to obtain the Coxeter-Todd \(K_{12}\) lattice \cite[Exam. 10.5.6]{preset:EricZin}\cite[Ch. 7, pg. 198]{doi:10.1007/978-1-4757-6568-7}.'
    - code_id: q-ary_repetition
      detail: 'Applying Construction \(B_c\) to the ternary repetition code of length \(6\) over the Eisenstein integers yields the Coxeter-Todd \(K_{12}\) lattice \cite[Ch. 7, pg. 200]{doi:10.1007/978-1-4757-6568-7}.'
    - code_id: self_dual_lattice
      detail: 'The Coxeter-Todd lattice is unimodular when defined as a complex lattice over the Eisenstein integers \cite[Ch. 4, pg. 128]{doi:10.1007/978-1-4757-6568-7}.'


