code_id: b_array
physical: matrices


name: 'B-code'
introduced: '\cite{doi:10.1109/18.179343}'

description: |
  Binary MDS block array code \(\mathcal{B}_2(m)\) on \((m-1)\times m\) arrays with horizontal and toroidal diagonal parity checks \cite{preset:HPArray}.

protection: |
  Corrects any two erased columns if and only if \(m\) is prime, and can then also correct any single column error \cite{preset:HPArray}.

features:
  decoders:
    - 'Efficient decoding algorithm against erasures \cite{doi:10.1109/18.179343}.'


relations:
  parents:
    - code_id: mds_array
      detail: 'B-codes are examples of MDS array codes \cite{arxiv:1112.0371}.'
  cousins:
    - code_id: reed_solomon
      detail: 'B-codes can be interpreted as RS codes over polynomials whose symbols lie in Galois rings \cite{doi:10.1109/18.179343,doi:10.1007/978-1-4615-1525-8_7}.'


