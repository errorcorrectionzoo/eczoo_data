code_id: ye_barg
physical: matrices


name: 'Ye-Barg code'
introduced: '\cite{arxiv:1604.00454,arxiv:1605.08630}'


description: |
  A member of an explicit family of MDS array codes with the optimal access property.
  The constructions of Ye and Barg achieve optimal repair bandwidth for single-node repair and include optimal-access variants with nearly optimal sub-packetization \cite{arxiv:1604.00454,arxiv:1605.08630}.


