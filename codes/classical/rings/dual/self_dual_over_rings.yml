code_id: self_dual_over_rings
physical: rings
logical: rings

name: 'Self-dual code over \(R\)'

description: |
  An additive linear code \(C\) over a ring \(R\) that is equal to its dual, \(C^\perp = C\), where the dual is defined with respect to some inner product.

  For \(m=2^{s} p_{1}^{n_{1}} \cdots p_{r}^{n_{r}}\) with distinct odd primes \(p_i\), the group ring \(\mathbb{Z}_m G\) contains a self-dual group code if and only if all exponents \(n_i\) are even and either \(s\) or \(|G|\) is even \cite[Thm. 16.12.6]{preset:HKSalgebra}.


