code_id: quaternary_reed_muller
physical: rings
logical: rings

name: 'Quaternary RM (QRM) code'
short_name: 'QRM'
introduced: '\cite{arxiv:math/0207208}'


description: |
  A quaternary linear code over \(\mathbb{Z}_4\) whose binary mod-two reduction is an RM code.
  This code family includes the quaternary codes whose Gray images are the binary Kerdock and Preparata codes.
  The code is usually noted as QRM\((r,m)\), with its mod-two reduction yielding the RM code RM\((r,m)\) \cite[Thm. 19]{arxiv:math/0207208}.


features:
  decoders:
    - 'QRM codes whose Gray images are Preparata codes can be decoded using a syndrome-calculation-based algorithm to correct all error patterns of Lee weight at most 2 and detect all (or, for some constructions, a subset of) error patterns of Lee weight 3 or 4 \cite{arxiv:math/0207208}.'


relations:
  parents:
    - code_id: quaternary_over_z4
  cousins:
    - code_id: reed_muller
      detail: 'The mod-two reduction of the QRM\((r,m)\) code is the RM\((r,m)\) code \cite[Thm. 19]{arxiv:math/0207208}.'
    - code_id: dual_over_z4
      detail: 'The dual of a QRM\((r,m)\) code is the QRM\((m-r-1,m)\) code \cite[Thm. 19]{arxiv:math/0207208}.'


