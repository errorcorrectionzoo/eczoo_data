code_id: quaternary_golay
physical: rings
logical: rings

name: 'Extended quaternary Golay code'
introduced: '\cite{doi:10.1109/18.370138}'

alternative_names:
  - '\(\mathbb{Z}_4\) Golay code'

description: |
  An extended quadratic residue quaternary linear \((24,4^{12},12)_{\mathbb{Z}_4}\) code that is a quaternary version of the Golay code.
  The code has Lee distance 12, Hamming distance 8, and Euclidean distance 16 \cite{doi:10.1109/18.370138}. 
  Under the \term{Gray map}, the code yields a formally self-dual binary \((48,2^{24},12)\) code whose distance distribution is the \hyperref[topic:weight-enumerator]{MacWilliams transform} of the distance distribution of its dual code \cite{doi:10.1109/18.370138}.
  The lattice \(A(C)/2\) obtained from the code is the Leech lattice \cite{doi:10.1109/18.370138}.


relations:
  parents:
    - code_id: self_dual_over_z4
      detail: 'The extended quaternary Golay code is an extremal Type II self-dual code over \(\mathbb{Z}_4\) by virtue of its parameters \cite{doi:10.1007/s10623-023-01293-7}.'
  cousins:
    - code_id: extended_golay
      detail: 'Codewords of the extended quaternary Golay code with entries 0 and 2 are of the form \(2c\), where \(c\) is a codeword of the extended Golay code. Its mod-two reduction (mapping \(0,1,2,3\) to \(0,1,0,1\)) also yields the extended Golay code \cite{doi:10.1109/18.370138,arxiv:2309.02382}. The quaternary Golay code can be constructed from the extended Golay code by Hensel lifting to \(\mathbb{Z}_4\) \cite{doi:10.1109/18.370138}\cite[3rd Ed., pg. xxxiii]{doi:10.1007/978-1-4757-6568-7}\cite{arxiv:math/0311319}.'
    - code_id: combinatorial_design
      detail: 'Supports of codewords of any fixed symmetrized type of the extended quaternary Golay code form a 5-design \cite{doi:10.1016/S0012-365X(98)00035-1,doi:10.1002/(SICI)1520-6610(1998)6:3<225::AID-JCD4>3.0.CO;2-H,doi:10.1016/S0378-3758(99)00117-2}.'


