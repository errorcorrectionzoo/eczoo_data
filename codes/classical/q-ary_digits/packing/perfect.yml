code_id: perfect
physical: q-ary_digits
logical: q-ary_digits

name: 'Perfect code'

description: |
  A type of \(q\)-ary code whose parameters satisfy the Hamming bound with equality.

  An \((n,K,2t+1)_q\) code is perfect if parameters \(n\), \(K\), \(t\), and \(q\) are such that the Hamming (a.k.a. sphere-packing) bound
  \begin{align}
  \sum_{j=0}^{t}(q-1)^{j}{n \choose j}\leq q^{n}/K
  \end{align}
  becomes an equality.
  In other words, the code's packing radius matches its covering radius.

  For example, for a binary \(q=2\) code with one logical bit (\(K=2\)) and \(t=1\), the bound becomes \(n+1 \leq 2^{n-1}\).
  Perfect codes are those for which balls of Hamming radius \(t\) exactly fill the space of all \(n\) \(q\)-ary strings.

  Any perfect linear code over \(\mathbb{F}_q\) is either a repetition code, a Hamming code, or a binary or ternary Golay code \cite[Thm. 3.3.1]{preset:HKSclass}\cite{doi:10.1016/S0019-9958(77)90519-8}.
  If \(q\) is a prime power, any nontrivial perfect unrestricted code that is not equivalent to a linear code has the same length, size, and minimum distance as a Hamming code \cite[Thm. 3.3.1]{preset:HKSclass}; see \cite[pg. 100]{preset:HKSdesigns} for more details.
  There are many nonlinear perfect codes \cite{doi:10.1147/rd.31.0025,doi:10.1016/S0019-9958(68)90167-8,manual:{B. Lindström, "On group and nongroup perfect codes in q symbols." Mathematica Scandinavica 25.2 (1969): 149-158},doi:10.1016/0012-365X(84)90121-3,doi:10.1137/0607013,doi:10.1007/BF02579339,manual:{J. M. Laborde and M. Schützenberger (1983). "Une nouvelle famille de codes binaires, parfaits, non linéaires". Comptes rendus des séances de l'Académie des sciences. Série 1, Mathématique, 297(1), 67-70},preset:Vasilyev62,preset:Krotov00,doi:10.1137/0604040,doi:10.1109/18.335887,arxiv:math/0608278,arxiv:0806.2513}.

notes:
  - 'See Ref. \cite[Def. 1.9.8]{preset:HKSbasics} for an introduction to perfect codes.'
  - 'See book \cite{doi:10.1142/12823} on perfect codes for more details.'

relations:
  parents:
    - code_id: completely_regular
      detail: 'Perfect codes and extended perfect codes are completely regular \cite{arxiv:1703.08684}.'
    - code_id: covering
