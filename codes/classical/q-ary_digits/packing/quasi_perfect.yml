code_id: quasi_perfect
physical: q-ary_digits
logical: q-ary_digits

name: 'Quasi-perfect code'
#introduced: '\cite{preset:MacSlo}'

description: |
  Perfect codes \((n,K,d)_q\) are those for which balls of Hamming radius \(t=\left\lfloor (d-1)/2\right\rfloor\) exactly fill the space of all \(n\) \(q\)-ary strings. \textit{Quasi-perfect codes} are those for which balls of Hamming radius \(t\) are disjoint, while balls of radius \(t+1\) cover the space with possible overlaps. In other words, any \(q\)-ary string is at Hamming distance at most \(t+1\) from a codeword of a quasi-perfect code.

protection: 'Correct errors of weight \(t\) as well as some errors of weight \(t+1\).'

relations:
  parents:
    - code_id: uniformly_packed
      detail: 'Quasi-perfect codes are uniformly packed \cite[Def. 2.5]{arxiv:1703.08684}.'
    - code_id: weighed_covering
      detail: 'A quasi-perfect code is a special case of an \(m\)-weighted covering code with \(m\)-covering radius \(r=t+1\) \cite[Ch. 13]{preset:CoveringBook}.'


