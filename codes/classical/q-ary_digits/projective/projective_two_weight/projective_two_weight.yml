code_id: projective_two_weight
physical: q-ary_digits
logical: q-ary_digits

name: 'Projective two-weight code'

description: |
  A projective code whose codewords all have one of two possible nonzero Hamming weights.

  There is a correspondence between projective two-weight codes, projective two-character sets, and certain strongly regular graphs \cite[Sec. 19.3.3]{preset:HKStwoweight}\cite{doi:10.1016/0012-365X(72)90024-6}.
  As such, projective two-weight codes have been classified and can be constructed out of quadrics \cite{doi:10.1109/18.748994,doi:10.1016/S0012-365X(02)00390-4}, maximal arcs and hyperovals, Baer spaces, or Hermitian quadrics \cite[Secs. 19.7.1-19.7.5]{preset:HKStwoweight}.
  There are also several sporadic examples \cite[Table 19.1]{preset:HKStwoweight}.

protection: |
  In a projective two-weight code, the difference between the two nonzero weights is a power of the characteristic \cite[Sec. 19.3.6]{preset:HKStwoweight}.


relations:
  parents:
    - code_id: projective
      detail: 'Projective two-weight codes are projective codes by definition \cite[Sec. 19.2]{preset:HKStwoweight} (see also \cite{doi:10.1023/A:1008294128110,doi:10.1112/blms/18.2.97,doi:10.1016/j.ffa.2017.12.010}).'
    - code_id: two_weight
      detail: 'Projective two-weight codes are two-weight codes by definition \cite[Def. 19.1]{preset:HKStwoweight} (see also \cite{doi:10.1023/A:1008294128110,doi:10.1112/blms/18.2.97,doi:10.1016/j.ffa.2017.12.010}).'
