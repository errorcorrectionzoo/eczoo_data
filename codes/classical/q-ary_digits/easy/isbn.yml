name: 'International Standard Book Number (ISBN) code'
short_name: 'ISBN'


description: |
  A 10-digit checksum code used worldwide to identify books in stores.
  In the ISBN-10 convention, the modulo-\(11\) check digit can take values between \(0\) and \(10\), with \(10\) denoted by the symbol \(X\).

protection: 'The last digit of an ISBN-10 string is a check digit computed modulo 11 \cite{preset:Hill}.'


