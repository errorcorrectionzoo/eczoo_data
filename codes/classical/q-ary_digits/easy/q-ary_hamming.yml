code_id: q-ary_hamming
physical: q-ary_digits
logical: q-ary_digits

name: '\(q\)-ary Hamming code'
introduced: '\cite{doi:10.1111/j.1469-1809.1943.tb02332.x,preset:Golay49}'
#  from P. J. Cameron, "Some bridges between codes and designs." Unpublished manuscript, Queen Mary and Westfield College, London (1998).

description: |
  Member of an infinite family of perfect linear \(q\)-ary codes with parameters \([(q^r-1)/(q-1),(q^r-1)/(q-1)-r, 3]_q\) for \(r \geq 2\) \cite[(3.1)]{preset:HKSclass}.
  These are precisely the nontrivial perfect linear codes over \(\mathbb{F}_q\) \cite[Thm. 3.3.1]{preset:HKSclass}.

  The automorphism group is known \cite{doi:10.1134/S0032946009040024}.

protection: 'Can detect 1-bit and 2-bit errors, and can correct 1-dit errors.'

notes:
  - 'Example 2.2.2 studies the subfield subcode \(H_{3,2^2}|_{\mathbb{F}_2}\), a \([21,16,3]_2\) code, of a \(q\)-ary Hamming code over an extension field \cite[Exam. 2.2.2]{preset:HKScyclic}.'


# Perfect more important parent than linear; these are not PRM necessarily so no other choice here
relations:
  parents:
    - code_id: perfect
    - code_id: q-ary_linear
    - code_id: univ_opt_q-ary
      detail: 'Hamming codes and their once-punctured and once-shortened versions are LP universally optimal codes \cite{arxiv:1212.1913}.'
    - code_id: small_distance
  cousins:
    - code_id: incidence_matrix
      detail: 'Columns of a Hamming parity-check matrix correspond to 1D subspaces of \(\mathbb{F}_q^r\).'
    - code_id: q-ary_bch
      detail: 'When \(\gcd(r,q-1)=1\), \(q\)-ary Hamming codes are narrow-sense BCH codes \cite[Exam. 16.4.10]{preset:HKSalgebra}\cite[Thm. 5.1.4]{doi:10.1017/CBO9780511807077}, which are cyclic \cite[pg. 194]{preset:MacSlo}\cite[Exam. 2.5.1]{preset:HKScyclic}.'


