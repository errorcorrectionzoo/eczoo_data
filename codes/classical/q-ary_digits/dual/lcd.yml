code_id: lcd
physical: q-ary_digits
logical: q-ary_digits

name: 'Linear code with complementary dual (LCD)'
short_name: 'LCD'
introduced: '\cite{doi:10.1016/0012-365X(92)90563-U}'

description: |
  A linear code \(C\) admits a complementary dual if \(C\) and its dual code \(C^{\perp}\) do not share any nonzero codewords. Equivalently, \(\mathbb{F}_q^n = C \oplus C^{\perp}\).

protection: |
  Optimal binary and ternary LCD codes have been characterized \cite{arxiv:1908.03294}. LP bounds have been derived \cite{arxiv:1506.01955}.

features:
  rate: 'Asymptotically good LCD codes exist \cite{doi:10.1016/0012-365X(92)90563-U}.'
  decoders:
    - 'The decoding problem reduces to finding the nearest codeword in \(C\) given a word in \(C^{\perp}\) \cite{doi:10.1016/0012-365X(92)90563-U}.'


relations:
  parents:
    - code_id: dual
  cousins:
    - code_id: group
      detail: 'A group code \(C \leq \mathbb{F}_q G\) is LCD if and only if \(C=e \mathbb{F}_q G\) for an idempotent \(e\) satisfying \(e=\hat{e}\), and then \(C^{\perp}=(1-e)\mathbb{F}_q G\) \cite[Thm. 16.7.6]{preset:HKSalgebra}.'
    - code_id: q-ary_cyclic
      detail: 'A cyclic \([n,k]\) code with generator polynomial \(g(x)\) is LCD if and only if \(g(x)\) is self-reciprocal and \(\gcd( g(x), (x^{n}-1)/g(x) )=1\) \cite[Cor. 16.7.11]{preset:HKSalgebra}.'


