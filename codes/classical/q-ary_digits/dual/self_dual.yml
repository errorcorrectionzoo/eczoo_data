code_id: self_dual
physical: q-ary_digits
logical: q-ary_digits

name: 'Self-dual linear code'

description: |
  An \([n,n/2]_q\) code that is equal to its dual, \(C^\perp = C\), where the dual is defined with respect to an inner product, most commonly either Euclidean or Hermitian.
  Self-dual codes exist only for even lengths and have dimension \(k=n/2\).
  A code that is equivalent to its dual is called \textit{isodual}.
  Any self-dual code is isodual, and hence formally self-dual \cite[Rem. 4.2.2]{preset:HKSselfdual}.

  A binary singly even (doubly even) self-dual code is called Type I (Type II), a ternary self-dual code is called Type III, and a Hermitian self-dual code over \(\mathbb{F}_4\) is called Type IV \cite[Rems. 4.1.10 and 4.3.2]{preset:HKSselfdual}.
  Type III codes are 3-divisible, while Type IV codes are 2-divisible \cite[Thm. 4.1.9]{preset:HKSselfdual}.
  Self-dual doubly even binary codes exist iff \(8|n\), self-dual ternary codes exist iff \(4|n\), and Hermitian self-dual codes over \(\mathbb{F}_4\) exist iff \(n\) is even \cite[Thm. 4.1.13]{preset:HKSselfdual}.

protection: |
  The generator matrix of the Hermitian dual of a code with generator matrix \(G = [I_k~~A]\) is \([-\bar{A}^T~~I_{n-k}]\), where \(\bar{A}\) contains matrix elements of \(A\) raised to the \(p\)th power.
  A code is Hermitian self-dual if and only if \(A \bar{A}^{T} = -I_{n/2}\).

  The minimum distance of a formally self-dual even binary code, a Type II binary self-dual code, a Type III ternary self-dual code, and a Type IV Hermitian self-dual code over \(\mathbb{F}_4\) satisfies
  \begin{align}
    d\leq\begin{cases}
      2\left\lfloor \frac{n}{8}\right\rfloor +2\\
      4\left\lfloor \frac{n}{24}\right\rfloor +4\\
      3\left\lfloor \frac{n}{12}\right\rfloor +3\\
      2\left\lfloor \frac{n}{6}\right\rfloor +2
    \end{cases}
  \end{align}
  respectively \cite[Thm. 4.3.1]{preset:HKSselfdual}.
  More generally, binary self-dual codes satisfy Rains's bound \(d\leq 4\lfloor n/24\rfloor+4\), except when \(n\equiv 22\) modulo \(24\), in which case \(d\leq 4\lfloor n/24\rfloor+6\) \cite[Thm. 4.3.6]{preset:HKSselfdual}.
  A self-dual code meeting the relevant upper bound is called \textit{extremal} \cite[Def. 4.3.7]{preset:HKSselfdual}.

  Fixed-weight codewords of extremal Type II codes of length divisible by \(24\) form combinatorial 5-designs \cite[Thm. 4.3.16(a)]{preset:HKSselfdual}.
  The extended Golay code and the \([48,24,12]\) self-dual code are two such codes.
  It is not yet known whether a \([72,36,16]\) self-dual code exists \cite[Rem. 4.3.11]{preset:HKSselfdual}; see also \cite{doi:10.1109/TIT.1973.1054975,doi:10.1090/conm/634/12692,arxiv:math/0208001}.

  Doubly even self-dual codes have been classified up to \(n\leq 40\) \cite{arxiv:1104.3727}. 
  The \([22,11]\) and \([24,12]\) doubly even self-dual codes have been classified, and there are nine inequivalent codes with the latter parameters \cite{doi:10.1016/0097-3165(75)90042-4}.

  For ternary self-dual codes, see \cite[Remark 4.3.14]{preset:HPRainsSloane}\cite{doi:10.1016/j.ffa.2005.05.012,arxiv:math/0208001}.
  Ternary self-dual codes have been classified for \(n=24\) \cite{doi:10.1016/j.jcta.2008.11.011} and, in the extremal case, for \(n=28\) \cite{doi:10.1090/S0025-5718-08-02194-7}.

notes:
  - 'See books \cite{doi:10.1007/3-540-30731-1,doi:10.1017/CBO9780511807077} for more on self-dual codes.'
  - 'See Refs. \cite{doi:10.1016/j.disc.2004.06.010,arxiv:1706.01694} for constructions of binary self-dual codes.'
  - 'See \href{https://www.unilim.fr/pages_perso/philippe.gaborit/SD/index.html}{Tables of Self-Dual Codes} by P. Gaborit and A. Otmani for a database of self-dual codes over \(\mathbb{F}_2\), \(\mathbb{F}_3\), \(\mathbb{F}_4\) (Euclidean or Hermitian), \(\mathbb{F}_5\), and \(\mathbb{F}_7\). See also Ref. \cite{doi:10.1016/S1071-5797(03)00011-X}.'
  - 'See \href{https://www.math.is.tohoku.ac.jp/~munemasa/selfdualcodes.htm}{Database of self-dual codes} by M. Harada and A. Munemasa for a database of self-dual codes over \(\mathbb{F}_2\), \(\mathbb{F}_3\), \(\mathbb{F}_5\), and \(\mathbb{F}_7\).'


relations:
  parents:
    - code_id: dual
    - code_id: self_dual_additive
      detail: 'Self-dual linear codes with respect to some inner product are automatically self-dual additive under the same inner product since linear codes are additive. In addition, quaternary linear codes are Hermitian self-orthogonal (self-dual) iff they are trace-Hermitian self-orthogonal (self-dual) additive \cite[Thm. 27.4.1]{preset:HKSquantum}\cite[Thm. 9.10.3]{doi:10.1017/CBO9780511807077}.'
    - code_id: self_dual_over_rings
      detail: 'Self-dual linear codes are over fields, which are also rings.'
  cousins:
    - code_id: divisible
      detail: 'Binary self-orthogonal codes are even, doubly even binary codes are self-orthogonal, and binary self-dual codes split into singly-even Type I and doubly-even Type II families \cite[Def. 4.1.6]{preset:HKSselfdual}\cite[Rems. 4.1.7 and 4.1.10]{preset:HKSselfdual}. Ternary self-dual codes are 3-divisible and Hermitian self-dual quaternary codes are 2-divisible \cite[Thm. 4.1.9]{preset:HKSselfdual}.'
    - code_id: group
      detail: 'Self-dual group codes exist exactly when the base field has characteristic \(2\) and the underlying group has even order \cite[Thm. 16.5.4]{preset:HKSalgebra}.'
    - code_id: cft
      detail: 'Even self-dual binary codes and even unimodular lattices define CFTs \cite{doi:10.1016/B978-0-444-87492-4.50023-9,doi:10.1016/0370-2693(90)90821-M,arxiv:hep-th/9410029}. Self-dual ternary codes define superconformal field theories (SCFTs) \cite{arxiv:1811.00589}.'


