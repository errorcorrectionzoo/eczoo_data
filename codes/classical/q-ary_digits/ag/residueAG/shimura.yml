code_id: shimura
physical: q-ary_digits
logical: q-ary_digits

name: 'Tsfasman-Vladut-Zink (TVZ) code'
short_name: 'TVZ'
introduced: '\cite{doi:10.1002/mana.19821090103}'

description: 'Member of a family of AG codes obtained from algebraic curves via the residue or evaluation construction. Sequences of curves with many rational points, such as Drinfeld modular curves, classical modular curves, or Garcia-Stichtenoth curves, yield the asymptotic parameters of the TVZ bound \cite[Sec. 15.4.2]{preset:HKSag}.'

# either a reduction of a Shimura curve or an elliptic curve of varying genus.'

features:
  rate: 'TVZ codes, either in the residue AG or evaluation AG constructions, exceed the \hyperref[topic:gv-bound]{asymptotic GV bound} \cite{doi:10.1002/mana.19821090103} (see also Ref. \cite{manual:{Y. Ihara. "Some remarks on the number of rational points of algebraic curves over finite fields." J. Fac. Sci. Univ. Tokyo Sect. IA Math., 28:721-724 (1982),1981}}). For square \(q \geq 49\), these codes improve on the GV bound; for smaller \(q\), they do not \cite[Sec. 15.4.2]{preset:HKSag}. Roughly speaking, this result implies that AG codes can outperform random codes.'

relations:
  parents:
    - code_id: residue
      detail: 'TVZ codes can be formulated as residue AG codes on algebraic curves.'
  cousins:
    - code_id: evaluation
      detail: 'TVZ codes can also be formulated as evaluation AG codes on algebraic curves; these are dual to the corresponding residue AG codes.'

