code_id: ruled_surface
physical: q-ary_digits
logical: q-ary_digits

name: 'Ruled-surface code'
introduced: '\cite{doi:10.1006/ffta.2001.0313,arxiv:math/0309123}'

description: |
  Evaluation code obtained by evaluating global sections of a line bundle, or equivalently suitable polynomial functions, on rational points of a ruled surface over a finite field. Such codes extend algebraic-geometry constructions from curves to certain projective surfaces \cite{doi:10.1006/ffta.2001.0313,arxiv:math/0309123}.

relations:
  parents:
    - code_id: evaluation_polynomial
      detail: 'Ruled-surface codes are polynomial evaluation codes with \(\cal X\) being a ruled surface.'


