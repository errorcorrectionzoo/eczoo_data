code_id: serge
physical: q-ary_digits
logical: q-ary_digits

name: 'Segre-variety RM-type code'
introduced: '\cite{doi:10.1006/ffta.2002.0360}'

description: |
  Evaluation code of multihomogeneous polynomials evaluated on points of a Segre variety, i.e., on the Segre embedding of a product of projective spaces. These codes are Reed-Muller-type analogues adapted to product projective geometries \cite{doi:10.1006/ffta.2002.0360}.

relations:
  parents:
    - code_id: evaluation_polynomial
      detail: 'Segre-variety RM-type codes are polynomial evaluation codes with \(\cal X\) being a Segre variety.'


