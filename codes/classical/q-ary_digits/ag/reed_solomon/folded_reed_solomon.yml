code_id: folded_reed_solomon
physical: q-ary_digits
logical: q-ary_digits

name: 'Folded RS (FRS) code'
short_name: 'FRS'
introduced: '\cite{doi:10.1109/TIT.2003.819333}'

description: |
  A code obtained from an RS code by bundling consecutive symbols into larger alphabet symbols. This preserves the algebraic structure of the parent RS code while lowering the block length over an extension alphabet, and it is a key ingredient in capacity-approaching list-decoding constructions.

  An \([n/m,k]_{q^m}\) FRS code is obtained from an \([n,k]_q\) RS code by grouping consecutive evaluations, thereby reducing the block length over a larger alphabet. In this case, the evaluation points are powers of a field element \(\gamma\), namely \(\gamma^0,\gamma^1,\ldots,\gamma^{n-1}\). Each codeword \(\mu\) of an \(m\)-folded RS code is a string of \(n/m\) symbols, with each symbol being a block of values of a polynomial \(f_\mu\) at consecutive powers of \(\gamma\),
  \begin{align}
  \begin{split}
    \mu\to&\Big(\left(f_{\mu}(\gamma^{0}),\cdots,f_{\mu}(\gamma^{m-1})\right),\left(f_{\mu}(\gamma^{m}),\cdots,f_{\mu}(\gamma^{2m-1})\right)\cdots\\&\cdots,\left(f_{\mu}(\gamma^{n-m}),\cdots,f_{\mu}(\gamma^{n-1})\right)\Big)~.
  \end{split}
  \end{align}

features:
  rate: 'FRS codes achieve relaxed generalized Singleton bounds \cite{arxiv:2408.15925}.'
  decoders:
    - 'Guruswami and Rudra \cite{arxiv:cs/0511072,manual:{A. Rudra. List Decoding and Property Testing of Error Correcting Codes. PhD thesis, University of Washington, 8 2007.}} achieved list-decoding up to \(1-\frac{k}{n}-\epsilon\) fraction of errors using the Parvaresh-Vardy algorithm \cite{doi:10.1109/SFCS.2005.29}; see Ref. \cite{arxiv:1106.0436} for a randomized construction.'
    - 'List-decoding works up to the Johnson bound using the Guruswami-Sudan algorithm \cite{arxiv:2103.07930}.'
    - 'Folded RS codes, concatenated with suitable inner codes, can be efficiently list-decoded up to the Blokh-Zyablov bound \cite{arxiv:cs/0511072,doi:10.1109/TIT.2008.2008124}.'

notes:
  - 'See the book \cite{manual:{V. Guruswami, A. Rudra, and M. Sudan. \emph{Essential coding theory}. Draft available at \href{https://cse.buffalo.edu/faculty/atri/courses/coding-theory/book/}{this URL} (2012).}} for an introduction to FRS codes.'
  - 'A class of FRS codes can be used in the Yamakawa-Zhandry quantum algorithm \cite{arxiv:2204.02063}.'

relations:
  parents:
    - code_id: group
      detail: 'FRS codes are polynomial ideal codes whose corresponding polynomial is a product of the polynomials of the RS codes that are being folded \cite{arxiv:2103.07930}.'

