code_id: hermitian
physical: q-ary_digits
logical: q-ary_digits

name: 'Hermitian code'
introduced: '\cite{doi:10.1109/TIT.1987.1057327,doi:10.1017/CBO9780511543401}\cite[Sec. 4.4.3]{preset:TVNAlgCodes}'
#doi:10.1109/18.21267,doi:10.6100/IR381307,doi:10.1109/18.476234}'

alternative_names:
  - 'Hermitian AG code'

description: |
  Evaluation AG code of rational functions on a Hermitian curve over \(\mathbb{F}_{q^2}\).
  
  A standard affine model of the curve is
  \begin{align}
    y^q+y=x^{q+1}~,
  \end{align}
  and this curve has \(q^3+1\) rational points and genus \(g=q(q-1)/2\).

  Hermitian codes are usually defined as one-point AG codes \(C_L(D,mP_\infty)\), where \(D\) is the sum of the \(q^3\) affine rational points and \(P_\infty\) is the unique point at infinity.
  They provide much longer code lengths than Reed-Solomon codes over the same alphabet, since the standard one-point construction has length \(q^3\) over \(\mathbb{F}_{q^2}\).

  There exists a family of Hermitian codes with automorphism group \(PGL(2,\mathbb{F}_q)\) \cite{doi:10.1016/j.ffa.2016.11.003}.

protection: 'Distance is determined by the divisor and the geometry of the Hermitian curve \cite{doi:10.1007/BFb0087995}; see \cite[Sec. 5.3]{preset:HPAlgCodes} for the general result. For the standard one-point code \(C_L(D,mP_\infty)\) of length \(n=q^3\), the designed distance satisfies \(d \geq n-m\).'

features:

  rate: |
    For the standard one-point code \(C_L(D,mP_\infty)\) with genus \(g=q(q-1)/2\), Riemann-Roch gives
    \begin{align}
      k=m-g+1
    \end{align}
    whenever \(2g-2 < m < n=q^3\).

  decoders:
    - 'Unique decoding using syndromes and error locator ideals for polynomial evaluations. Note that Hermitian codes are linear codes so we can compute the syndrome of a received vector. Moreover, akin to the error-locator ideals found in decoding RS codes, for the multivariate case we must define an error locator ideal \(\Lambda \) such that the variety of this ideal over \(\mathbb{F}^{2}_q\) is exactly the set of errors. The Sakata algorithm uses these two ingredients to get a unique decoding procedure \cite{doi:10.1016/S0747-7171(88)80033-6}.'

notes:
  - 'Certain structured classical optimization problems can be mapped into decoding and list decoding Hermitian codes via the Decoded Quantum Interferomentry (DQI) algorithm \cite{arxiv:2510.06603}.'


relations:
  parents:
    - code_id: norm_trace
      detail: 'Hermitian codes are evaluation AG codes with \(\cal X\) being a Hermitian curve \cite{doi:10.1017/CBO9780511543401}\cite[Exam. 2.74]{preset:HPAlgCodes}. This curve is maximal, meaning that Hermitian codes are evaluation AG codes with maximum possible length given a fixed genus. They are a special case of norm-trace codes \cite{doi:10.1016/S1071-5797(03)00010-8}.'
  cousins:
    - code_id: generalized_reed_solomon
      detail: 'Hermitian codes are concatenated GRS codes \cite{doi:10.1007/BF00124208}.'
    - code_id: group
      detail: 'Some Hermitian codes are group-algebra codes \cite{manual:{Hansen, Johan P. Group codes on algebraic curves. Universität zu Göttingen. SFB Geometrie und Analysis, 1987.}}\cite[Remark 16.4.14]{preset:HKSalgebra}.'


