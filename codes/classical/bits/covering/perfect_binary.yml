code_id: perfect_binary
physical: bits
logical: bits

name: 'Perfect binary code'

description: |
  A type of binary code whose parameters satisfy the Hamming bound with equality.

  An \((n,K,2t+1)\) binary code is perfect if parameters \(n\), \(K\), and \(t\) are such that the binary Hamming (a.k.a. sphere-packing) bound
  \begin{align}
  \sum_{j=0}^{t} {n \choose j} \leq 2^{n}/K
  \end{align}
  becomes an equality. For example, for a code with one logical bit (\(K=2\)) and \(t=1\), the bound becomes \(n+1 \leq 2^{n-1}\).
  Perfect codes are those for which balls of Hamming radius \(t\) exactly fill the space of all \(n\) binary strings.

  Any perfect linear binary code is either a binary repetition code, a binary Hamming code, or the binary Golay code \cite[Thm. 3.3.1]{preset:HKSclass}\cite{doi:10.1016/S0019-9958(77)90519-8}.

  For codes with \(K=2^k\), one can work out an asymptotic Hamming bound in the large-\(n,k,t\) limit,
  \begin{align}
  \frac{k}{n}\leq 1-h(t/n),
  \end{align}
  where \(h\) is the binary entropy function.

  There are many inequivalent nonlinear perfect binary codes \cite{preset:Vasilyev62,preset:Krotov00,doi:10.1137/0604040,doi:10.1109/18.335887,arxiv:math/0608278}; for example, there are 5983 inequivalent perfect distance-three codes of length 15 \cite{arxiv:0806.2513}.
  Nonlinear perfect codes can have arbitrary finite groups as their automorphism groups \cite{doi:10.1016/0097-3165(86)90021-X}, including the trivial group \cite{doi:10.1109/ITW.1998.706460,doi:10.3934/amc.2012.6.121}.
  The automorphism group of a distance-three perfect binary code is no greater than the automorphism of the Hamming code of the same length \cite{manual:{F. I. Solov'eva and S. T. Topalova, "On Automorphism Groups of Perfect Binary Codes and Steiner Triple Systems", Problemy Peredachi Informatsii, 36:4 (2000), 53–58; Problems of Information Transmission, 36:4 (2000), 331–335.},manual:{F. I. Solov'eva and S. T. Topalova, "Perfect binary codes and Steiner triple systems with maximum orders of automorphism groups", Diskretnyi Analiz i Issledovanie Operatsii, Ser. 1, 7:4 (2000), 101–110.},manual:{S. A. Malyugin, "On the order of the automorphism group of perfect binary codes", Diskretnyi Analiz i Issledovanie Operatsii, Ser. 1, 7:4 (2000), 91–100.},doi:10.1016/j.disc.2011.05.002}.

relations:
  parents:
    - code_id: nearly_perfect
      detail: 'Perfect binary codes are nearly perfect, and \(t+1\) divides \(n-t\) for such codes. In addition, any perfect code can be extended to a nearly perfect code.'
    - code_id: perfect
    - code_id: orthogonal_array
      detail: 'Perfect distance-three binary codes of length \(n =2^m-1\) are equivalent to binary orthogonal arrays of strength \(t = 2^{m-1}-1\) \cite{doi:10.1016/S0019-9958(73)80007-5,doi:10.1109/18.335887,arxiv:0903.2749}.'
  cousins:
    - code_id: combinatorial_design
      detail: 'If a perfect binary code contains the zero vector, then its minimum-weight codewords support a Steiner \((t+1)\)-\((n,2t+1,1)\) design, while the minimum-weight codewords in the extended code support a Steiner \((t+2)\)-\((n+1,2t+2,1)\) design \cite[Thm. 5.3.1(b)]{preset:HKSdesigns}.'


