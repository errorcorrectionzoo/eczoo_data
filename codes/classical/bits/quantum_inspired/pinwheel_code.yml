code_id: pinwheel_code
physical: bits
logical: bits

name: 'Pinwheel code'
introduced: '\cite{arxiv:2312.08462}'

description: |
  A geometrically local binary LDPC code defined on planar graphs obtained from the pinwheel tiling.
  Both bits and checks live on vertices of the graph.
  If \(L_N\) is the graph Laplacian at generation \(N\), the undepleted check matrix is \(\tilde H_N=(L_N-\mathbb{I})\bmod 2\), and the actual parity-check matrix \(H_N\) is obtained by removing an evenly spaced fraction of boundary checks.

  The construction was introduced as a concrete aperiodic seed code whose hypergraph products realize local Type-I and Type-II fracton models.

protection: |
  For boundary-depletion period \(p\), the family has \(k\approx \sqrt{n}/p\) and distance \(d\sim n\) in the numerics of Ref. \cite{arxiv:2312.08462}, saturating the classical BPT bound \(k\sqrt{d}=O(n)\).
  The same work gives numerical evidence for confinement.

features:
  rate: 'The encoding rate vanishes asymptotically because \(k\sim\sqrt{n}\) while the block length grows with the substitution generation \cite{arxiv:2312.08462}.'

relations:
  parents:
    - code_id: aperiodic_code
  cousins:
    - code_id: hypergraph_product
      detail: 'The hypergraph product of a pinwheel code with a cyclic repetition code yields a local Type-I fracton model in three dimensions, while the hypergraph product of two pinwheel codes yields a local Type-II fracton model in four dimensions \cite{arxiv:2312.08462}.'
    - code_id: repetition
      detail: 'The hypergraph product of a pinwheel code with a cyclic repetition code yields a local Type-I fracton model in three dimensions \cite{arxiv:2312.08462}.'
    - code_id: fracton
      detail: 'Pinwheel codes were introduced as seed codes for constructing local Type-I and Type-II fracton models via hypergraph products \cite{arxiv:2312.08462}.'


