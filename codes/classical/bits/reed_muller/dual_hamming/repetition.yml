code_id: repetition
physical: bits
logical: bits

name: 'Repetition code'

description: |
  \([n,1,n]\) binary linear code encoding one bit of information into an \(n\)-bit string.
  Majority decoding requires \(n\) to be odd in order to avoid ties.
  The idea is to increase the code distance by repeating the logical information several times. It is a \((n,1)\)-Hamming code.
  Its automorphism group is \(S_n\).

protection: 'Detects errors on up to \(n-1\) coordinates, corrects errors on up to \(\frac{n-1}{2}\) coordinates, and corrects erasure errors on up to \(n-1\) coordinates. The generator matrix is \(G=\left[\begin{smallmatrix}1 & 1&\cdots& 1 & 1 \end{smallmatrix}\right]\).'

features:
  rate: 'Code rate is \(\frac{1}{n}\), code distance is \(n\).'

  decoders:
    - 'Calculate the Hamming weight \(d_H\) of an error word. If \(d_H\leq \frac{n-1}{2}\), decode the code as 0. If \(d_H\geq \frac{n+1}{2}\), decode the code as 1.'
    - 'Local automaton decoder for the repetition code on a 2D lattice based on Toom''s rule \cite{preset:Toom74,preset:Toom80,doi:10.1007/978-1-4612-2168-5_18,doi:10.1147/rd.481.0005}.'
    - 'Local automaton decoder for the repetition code on a 1D lattice by Gacs that is translation-invariant, that does not require synchronization of local clocks, and that has a constant encoding rate \cite{doi:10.1145/800061.808730,doi:10.1016/0022-0000(86)90002-4,preset:Gacs89,arxiv:math/0003117}.'
    - 'Local automaton decoder for the repetition code on a 1D lattice by Tsirelson \cite{doi:10.1007/BFb0070081}.'
    - 'Local automaton decoder obtained from reinforcement learning \cite{arxiv:2408.09524}.'

  threshold:
    - 'Suppose each bit has probability \(p\) of being received correctly, independent for each bit. The probability that a repetition code is received correctly is \(\sum_{k=0}^{(n-1)/2}\frac{n!}{k!(n-k)!}p^{n-k}(1-p)^{k}\). If \(\frac{1}{2}\leq p\), then one can always increase the probability of success by increasing the number of physical bits \(n\); see \cite[Sec. 2.2.1]{arxiv:2111.08894} for a pedagogical explanation.'
    - 'The first threshold theorem for classical circuits was proven by von Neumann \cite{doi:10.1515/9781400882618-003} using cellular automata \cite{manual:{J. von Neumann and A. W. Burks. "Theory of self-reproducing automata." (1966).},manual:{J. von Neumann. "Probabilistic logics and the synthesis of reliable organisms from unreliable components." Automata studies 34.34 (1956): 43-98.}} and which spurred the study of noisy classical circuits \cite{doi:10.1109/SFCS.1985.41,doi:10.1109/18.2628,doi:10.1214/aop/1022855749,doi:10.1214/aoms/1177699266}.'

  fault_tolerance:
    - 'Triple modular redundancy (TMR) error-correction protocol \cite{doi:10.1147/rd.62.0200} for fault-tolerant memory operations and classical gate operations; see \cite[Secs. 2.6 and 2.7]{arxiv:2111.08894} for a pedagogical explanation.'

realizations:
  - 'Repetition codes, in conjunction with other codes, were used in magnetic disks \cite{doi:10.1109/TCOM.1984.1096094}.'
  - Communication protocols such as FlexRay \cite{doi:10.1016/C2012-0-07058-5}.'
#  - 'Although classical repetition code does not have many real-world applications, it still inspire the studies of quantum error correction. Quantum repetition code is widely studied in quantum computing community.'

relations:
  parents:
    - code_id: reed_muller
      detail: 'Repetition codes are RM\((0,m)\) codes.'
    - code_id: nearly_perfect
    - code_id: binary_cyclic
      detail: 'The repetition code is cyclic with generator polynomial \(1+x+\cdots+x^{n-1}\).'
    - code_id: mds
      detail: 'Binary repetition codes are trivial MDS codes \cite[Thm. 12.3.1]{preset:HKSbounds}\cite[Sec. 3.3.2]{preset:HKSclass}.'
    - code_id: q-ary_repetition
      detail: '\(q\)-ary repetition code reduce to repetition codes for \(q=2\).'
  cousins:
    - code_id: perfect_binary
      detail: 'Repetition codes are trivially perfect for odd \(n\) \cite[Def. 12.3.4]{preset:HKSbounds}\cite[pg. 180]{preset:MacSlo}.'
    - code_id: quantum_repetition
      detail: 'A quantum repetition code can be thought of as a classical \([n,1,n]\) repetition code embedded in a quantum system.'
    - code_id: hamming
      detail: 'The triple repetition code \([3,1,3]\) is the smallest Hamming code.'


