code_id: preparata
physical: bits
logical: bits

name: 'Preparata code'
introduced: '\cite{doi:10.1016/S0019-9958(68)90874-7}'

description: |
  A nonlinear binary \((2^{m+1}, 2^{2^{m+1}-2m-2}, 6)\) code where \(m\) is odd.
  Puncturing a Preparata code yields the \textit{shortened Preparata code} with parameters \((2^{m+1}-1, 2^{2^{m+1}-2m-2}, 5)\).



  The automorphism groups of Preparata and shortened Preparata codes are determined in Refs. \cite{doi:10.1137/0603015,doi:10.1137/0603032,doi:10.1109/TIT.1983.1056676}.


# protection: 'Preparata codes are a nonlinear double-error-correcting family. The shortened Preparata codes have minimum distance \(5\), while Preparata codes have minimum distance \(6\).'


features:
  rate: 'The rate is \(\frac{2^{m+1}-2m-2}{2^{m+1}}\), tending to 1 as \(m\) becomes large.'


notes:
  - 'See corresponding MinT database entry \cite{manual:{R. Schürer and W. Ch. Schmid. “Preparata Codes.” From MinT—the database of optimal net, code, OA, and OOA parameters. Version: 2015-09-03. https://web.archive.org/web/20240420202309/https://mint.sbg.ac.at/desc_CPreparata.html.}}.'


relations:
  parents:
    - code_id: hergert
      detail: 'Preparata codes are equivalent to Hergert codes for \(r=2\) \cite[Thm. 2]{doi:10.1016/0097-3165(75)90090-4}.'
  cousins:
    - code_id: small_distance
      detail: 'Shortened Preparata codes form an infinite family of small-distance block codes with minimum distance \(5\).'
    - code_id: nearly_perfect
      detail: 'Shortened Preparata codes are uniformly packed and nearly perfect \cite{doi:10.1016/0012-365X(72)90025-8}. For any word \(u\) and shortened Preparata codebook \(C\) with \(d(u, C) > 2\), we have that \(u\) has distance 2 or 3 to exactly \(\left\lfloor (2^{m+1}-1)/3\right\rfloor\) codewords.'
    - code_id: quasi_perfect
      detail: 'Shortened Preparata codes are quasi-perfect \cite[pg. 475]{preset:MacSlo}.'
    - code_id: reed_muller
      detail: 'Preparata codes are nonlinear subcodes of second-order Reed-Muller codes, and shortened Preparata codes are obtained from them by puncturing.'
    - code_id: bch
      detail: 'Preparata codes contain twice as many codewords as the extended double-error-correcting BCH codes of the same length and minimum distance, and have the greatest possible number of codewords for this minimum distance \cite[pg. 475]{preset:MacSlo}\cite{doi:10.1016/S0019-9958(68)90874-7}.'
    - code_id: hamming
      detail: |
        Preparata codes can be obtained by Hensel-lifting Hamming codes to \(\mathbb{Z}_4\) \cite{doi:10.1109/18.312154}.
        The union of the dual of a Preparata code and some of its translates forms a Hamming code \cite[pg. 475]{preset:MacSlo}.
    - code_id: extended_hamming
      detail: 'Any code with the same parameters as the Preparata code must be a distance invariant subcode of a (possibly nonlinear) code with the same parameters as the extended Hamming code \cite{manual:{N. V. Semakov, V. A. Zinoviev, and G. V. Zaitsev, “Uniformly Packed Codes”, Problemy Peredachi Informatsii, 7:1 (1971), 38–50; Problems of Information Transmission, 7:1 (1971), 30–39.},manual:{G. V. Zaitsev, V. A. Zinoviev, and N. V. Semakov (1973). "Interrelation of Preparata and Hamming codes and extension of Hamming codes to new double-error-correcting codes". In Proc. 2nd International Symp. Inform. Theory (pp. 257-263).}}.'
    - code_id: combinatorial_design
      detail: 'Preparata codewords of each weight form 3-designs, and the minimum-weight codewords yield infinite families of 4-designs, including Steiner 4-designs with block sizes 5 and 6 \cite[Rem. 5.5.6 and Thms. 5.5.7, 5.5.11]{preset:HKSdesigns}\cite[pg. 471]{preset:MacSlo}.'
    - code_id: quaternary_reed_muller
      detail: 'The binary Preparata code is the Gray-map image of the quaternary code QRM\((m-2,m)\) \cite[Thm. 19]{arxiv:math/0207208}.'
    - code_id: gray
      detail: 'The binary Preparata code is the Gray-map image of the quaternary code QRM\((m-2,m)\) \cite[Thm. 19]{arxiv:math/0207208}.'
    - code_id: zrm
      detail: 'Each Preparata code is contained in a corresponding dual of ZRM\((1,m)\) \cite{arxiv:math/0207208}.'


