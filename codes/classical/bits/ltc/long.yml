code_id: long
physical: bits
logical: bits

name: 'Long code'
introduced: '\cite{doi:10.1109/SFCS.1995.492573,doi:10.1145/502090.502098,doi:10.1137/S0097539796302531}'

description: |
  Nonlinear locally testable code of extremely large length that is not practical, but is useful for certain probabilistically checkable proof (PCP) constructions \cite{arxiv:1002.3864}. 
  
  For \(x\in\mathbb{F}_2^k\), the long-code encoding of \(x\) is the binary string
  \begin{align}
    \mathrm{Long}(x)=\left(f(x)\right)_{f:\mathbb{F}_2^k\to\mathbb{F}_2}~,
  \end{align}
  whose coordinates are indexed by all Boolean functions on \(\mathbb{F}_2^k\).
  Thus, the code has length \(2^{2^k}\) and \(2^k\) codewords.

protection: |
  Any two distinct codewords differ on exactly half of the coordinates, so the minimum distance is \(2^{2^k-1}\).

relations:
  parents:
    - code_id: binary_ltc


