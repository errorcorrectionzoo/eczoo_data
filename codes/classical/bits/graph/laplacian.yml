code_id: laplacian
physical: bits
logical: bits

name: 'Laplacian code'
introduced: '\cite{arxiv:2312.08462}'

description: |
  A binary linear code whose parity-check matrix is the graph Laplacian reduced mod 2.
  For an undirected graph \(\Gamma\) with degree matrix \(D\) and adjacency matrix \(A\), the parity-check matrix is the symmetric matrix \(H=(D-A)\bmod 2\).

protection: |
  A connected graph always contributes at least one logical bit.
  For generic sparse bounded-degree graph ensembles, the logical dimension stays \(O(1)\), while highly symmetric graphs such as square lattices or complete graphs can have much larger rank deficiency \cite{arxiv:2312.08462}.

features:
  rate: 'Generic sparse-graph Laplacian-code families have vanishing rate with only \(O(1)\) logical bits, whereas more symmetric families can exhibit enhanced rank deficiency \cite{arxiv:2312.08462}.'

relations:
  parents:
    - code_id: binary_linear
    - code_id: projective
      detail: 'Incidence matrices of graphs have no repeated columns since that would correspond to multi-edges. Therefore, Laplacian codes can be interpreted as projective codes.'
    - code_id: quantum_inspired
  cousins:
    - code_id: ldpc
      detail: 'Laplacian codes on bounded-degree graph families are classical LDPC codes.'


