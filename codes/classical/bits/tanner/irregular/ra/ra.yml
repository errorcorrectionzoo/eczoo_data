code_id: ra
physical: bits
logical: bits

name: 'Repeat-accumulate (RA) code'
short_name: 'RA'
introduced: '\cite{manual:{D. Divsalar, H. Jin, and R. J. McEliece, "Coding theorems for" turbo-like" codes." Proceedings of the annual Allerton Conference on Communication control and Computing. Vol. 36. University Of Illinois, 1998.}}'

description: |
  An LDPC code whose parity-check matrix has weight-two columns arranged in a step-like pattern for its last columns \cite{preset:Johnson06}.

protection: |
  Minimum-distance upper bounds \cite{doi:10.1109/TIT.2007.892805,manual:{R. M. Tanner, "On quasi-cyclic repeat-accumulate codes." Proceedings of the 37th Annual Allerton Conference on Communication, Control, and Computing, Monticello, IL, Sept. 1999. Vol. 37, 1999.}}.

features:
  rate: 'RA codes are not asymptotically good \cite{doi:10.1109/TIT.2008.2008114}.'
  encoders:
    - 'An encoder for an RA code acting on a string \((c_1c_2\cdots c_K)\) of logical bits begins by repeating each bit three times to obtain the length-\(3K\) bitstring \((c_1 c_1 c_1 c_2 c_2 c_2 \cdots c_K c_K c_K)\), permuting using a random permutation to obtain a bitstring \(u\), and applying the mod-two accumulated sum (or \textit{accumulator}) to obtain \cite[Ch. 49]{preset:MacKay}
    \begin{align}
      (u_{1},u_{1}+u_{2},\cdots,u_{1}+\cdots+u_{3K})~.
    \end{align}
    The first repeating step is effectively using a 1-in-3 repetition code, which can be thought of as the outer code in this concatenated construction.'

relations:
  parents:
    - code_id: ira
      detail: 'IRA codes for which the outer code is a 1-in-3 repetition code reduce to RA codes.'
    - code_id: ara
      detail: 'ARA codes with no pre-encoding accumulator and no post-accumulator puncturing reduce to RA codes.'
    - code_id: raa
      detail: 'RAA codes with no second permutation and accumulator reduce to RA codes.'
  cousins:
    - code_id: qc_ldpc
      detail: 'There exist quasi-cyclic versions of RA codes \cite{manual:{R. M. Tanner, "On quasi-cyclic repeat-accumulate codes." Proceedings of the 37th Annual Allerton Conference on Communication, Control, and Computing, Monticello, IL, Sept. 1999. Vol. 37, 1999.}}.'

