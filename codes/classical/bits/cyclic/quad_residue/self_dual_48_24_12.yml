code_id: self_dual_48_24_12
physical: bits
logical: bits

name: '\([48,24,12]\) self-dual code'

description: |
  An extended quadratic-residue code that is the unique self-dual doubly even \([48,24,12]\) code. It is extremal Type II, and its automorphism group is \(PSL(2,47)\) \cite[Rem. 4.3.11]{preset:HKSselfdual}\cite{doi:10.1109/TIT.2002.806146}.

relations:
  parents:
    - code_id: binary_linear
    - code_id: self_dual
      detail: 'The \([48,24,12]\) code is the unique self-dual doubly even code with those parameters \cite[Rem. 4.3.11]{preset:HKSselfdual}\cite{doi:10.1109/TIT.2002.806146}.'
    - code_id: divisible
      detail: 'The \([48,24,12]\) code is doubly even and hence Type II \cite[Rem. 4.1.10]{preset:HKSselfdual}; it is the unique self-dual doubly even code with those parameters \cite{doi:10.1109/TIT.2002.806146}.'
  cousins:
    - code_id: binary_quad_residue
      detail: 'The \([48,24,12]\) self-dual code is an extended quadratic-residue code \cite[Ch. 16]{preset:MacSlo}.'
    - code_id: combinatorial_design
      detail: 'Fixed-weight codewords of extremal Type II codes of length divisible by \(24\) form combinatorial 5-designs \cite[Thm. 4.3.16(a)]{preset:HKSselfdual}. There are several designs associated with this code \cite{doi:10.1007/s00026-005-0250-x}.'
    - code_id: group
      detail: 'The \([48,24,12]\) self-dual code is a group code for \(G\) being a dihedral group \cite{doi:10.1007/s10623-011-9530-0}\cite[Exam. 16.5.1]{preset:HKSalgebra}.'


