code_id: binary_duadic
physical: bits
logical: bits

name: 'Binary duadic code'
introduced: '\cite{doi:10.1109/TIT.1984.1056944}'

description: |
  Member of a pair of cyclic linear binary codes that satisfy certain relations, depending on whether the pair is \textit{even-like} or \textit{odd-like} duadic. Binary duadic codes generalize binary quadratic-residue codes \cite[Sec. 2.7]{preset:HKScyclic}. Duadic codes exist for lengths \(n\) that are products of powers of primes, with each prime being \(\pm 1\) modulo \(8\) \cite{doi:10.1007/978-3-7091-2786-5_1}.

  Duadic codes come in two pairs, an even-like duadic pair and an odd-like duadic pair. All codewords in an even-like pair are \textit{even-like}, i.e., \(\sum_i c_i = 0\). By contrast, an odd-like pair is not even-like, i.e., it contains at least one codeword with \(\sum_i c_i = 1\).

  Duadic code pairs can be defined in terms of their idempotent generators (see \ref{topic:Cyclic-to-polynomial-correspondence}).
  A pair of even-like codes \(C_1\) and \(C_2\) with respective idempotents \(e_1\) and \(e_2\) is an \textit{even-like duadic pair} if (1) \(e_1(x)+e_2(x)=1-\frac{1}{n}(1+x+x^2+\cdots+x^{n-1})\) and (2) there exists a multiplier \(\mu\) such that \(C_1 \mu=C_2\) and \(C_2 \mu=C_1\).

  There is an odd-like duadic pair \(\{D_1,D_2\}\) associated with the even-like pair \(\{C_1, C_2\}\), where \(1-e_2(x)\) generates \(D_1\) and \(1-e_1(x)\) generates \(D_2\). The even-pair codes are \([n,\frac{n-1}{2}]\) codes while the odd-pair codes are \([n,\frac{n+1}{2}]\) codes.

  Families of binary duadic codes were constructed in Ref. \cite{arxiv:2408.01906}.

protection: 'For odd-like duadic codes, the common minimum odd-like weight \(d_o\) satisfies \(d_o^2 \geq n\); if the splitting is given by \(\mu=-1\), then \(d_o^2-d_o+1 \geq n\) \cite[Thm. 2.7.1]{preset:HKScyclic}.'

notes:
  - 'Reviews of duadic codes \cite{doi:10.1007/978-3-7091-2786-5_1,doi:10.1017/CBO9780511807077}\cite[Sec. 2.7]{preset:HKScyclic}.'

