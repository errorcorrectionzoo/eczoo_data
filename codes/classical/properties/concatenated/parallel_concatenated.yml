code_id: parallel_concatenated

name: 'Parallel concatenated code'

description: |
  A code obtained by encoding the same information sequence using two or more component encoders in parallel, often with one branch preceded by an interleaver. Turbo codes are a standard example \cite{doi:10.1109/TIT.2005.846392}.

