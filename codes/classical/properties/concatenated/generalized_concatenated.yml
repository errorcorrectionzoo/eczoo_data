code_id: generalized_concatenated

name: 'Generalized concatenated code (GCC)'
introduced: '\cite{manual:{È. L. Blokh and V. V. Zyablov, “Coding of Generalized Concatenated Codes”, Problemy Peredachi Informatsii 10(3), 45–50 (1974); Problems of Information Transmission 10(3), 218–222 (1974)},manual:{V. A. Zinoviev, “Generalized Cascade Codes”, Problemy Peredachi Informatsii 12(1), 5–15 (1976); Problems of Information Transmission 12(1), 2–9 (1976)}}'

alternative_names:
  - 'Cascade code'

description: |
  A code that combines multiple outer codes of the same length and (possibly) different dimensions with a single inner code; see Refs. \cite{manual:{V. A. Zinoviev, “Generalized Cascade Codes”, Problemy Peredachi Informatsii 12(1), 5–15 (1976); Problems of Information Transmission 12(1), 2–9 (1976)}}\cite[Ch. 18]{preset:MacSlo}.

notes:
 - 'Introductions to GCCs \cite{doi:10.1002/ett.4460100606,manual:{I. I. Dumer, “Concatenated codes and their multilevel generalizations”, in \emph{Handbook of Coding Theory}, Vol. II, Part 3, eds. V. S. Pless and W. C. Huffman (Elsevier, 1998), pp. 1911-1988}}.'

