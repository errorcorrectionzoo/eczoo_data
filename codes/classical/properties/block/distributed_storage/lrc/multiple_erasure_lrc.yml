code_id: multiple_erasure_lrc

name: '\(t\)-erasure LRC'

alternative_names:
  - 'Multiple-erasure LRC'

description: |
  A code which admits local recoverability against more than one coordinate erasure, typically up to some specified number \(t\) of erasures per local group.

relations:
  parents:
    - code_id: locally_recoverable
      detail: 'A \(t\)-erasure LRC is locally recoverable by definition since \(t > 1\).'


