code_id: reversible

name: 'Reversible code'
#introduced: ''

description: |
  A block code of length \(n\) over an alphabet is reversible if, for each codeword \(c_1 c_2 \cdots c_n\), the reversed string \(c_n \cdots c_2 c_1\) is also a codeword.

notes:
  - 'Reversible cyclic codes are studied in \cite[Sec. 2.10]{preset:HKScyclic}.'

relations:
  parents:
    - code_id: block
  cousins:
    - code_id: q-ary_cyclic
      detail: 'A reversible cyclic code is a cyclic code with self-reciprocal generator polynomial and is an LCD code \cite[Thm. 2.10.3]{preset:HKScyclic}.'
    - code_id: lcd
      detail: 'A reversible cyclic code is a cyclic code with self-reciprocal generator polynomial and is an LCD code \cite[Thm. 2.10.3]{preset:HKScyclic}.'


