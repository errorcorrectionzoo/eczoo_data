code_id: checksum

name: 'Checksum code'

description: |
  An error-detecting block code that appends to a message a shorter string, called a checksum, that is computed from the message.


protection: 'The checksum can be recalculated from the received message and compared with the appended checksum in order to detect certain transmission or storage errors.'


relations:
  parents:
    - code_id: block


