code_id: random
name: 'Random code'
introduced: '\cite{doi:10.1002/j.1538-7305.1948.tb01338.x}'

description: |
  Code whose construction is non-deterministic in some way, i.e., codes that utilize an element of randomness somewhere in their construction. Members of this class range from fully non-deterministic codes to codes whose multi-step construction is deterministic except for a single step.

  Typically, random codes are selected with uniform distribution from some ensemble of codes. 
  For example, a random binary code is a set of \(K\) codewords of length \(n\) chosen uniformly from the ensemble of all \(2^n\) bit-strings. Each bit in each codeword is chosen independently and uniformly. 
  For another example, a random binary linear code is generated from \(k\) randomly chosen generators of length \(n\). Equivalently, it is defined by a random \(k \times n\) binary generator matrix whose entries are chosen independently and uniformly.

  In both of the above random code constructions, the ensemble size scales exponentially with \(n\). A common convention is to think of the resulting code constructions as effectively explicit (as opposed to random) in cases where the ensemble size is independent of \(n\) or even when the size scales polynomially with \(n\).

#protection: 'Random codes can protect against random errors, e.g. from Binary Symmetry Channel (BSC), discrete memoryless channel.'

features:
  rate: Typical random codes (TRC) or typical random linear codes (TLC) refer to codes in the respective ensemble that satisfy a certain minimum-distance property. The relative fraction of typical codes in the ensemble approaches one as \(n\) goes to infinity \cite{doi:10.1002/j.1538-7305.1948.tb01338.x} (see also Ref. \cite{doi:10.1109/TIT.2002.800480}). Asymptotically, given relative distance \(\delta=d/n\), the maximum rate for a TRC is \(R=\frac{1}{2}R_{GV}(\delta)\), where \(R_{GV}(\delta)=1-h(\delta)\) is the Gilbert-Varshamov (GV) bound and \(h(\delta)\) is the binary entropy function. The maximum rate for a TLC is \(R=R_{GV}(\delta)\), meaning that TLCs achieve the \hyperref[topic:gv-bound]{asymptotic GV bound}.

  decoders:
    - 'Ball-collision decoding \cite{doi:10.1007/978-3-642-22792-9_42}.'
    - 'Information set decoding (ISD) \cite{doi:10.1007/978-3-642-29011-4_31} and Finiasz and Sendrier (FS-ISD) decoding \cite{doi:10.1007/978-3-642-10366-7_6}.'

realizations:
  - 'Distributed storage systems \cite{doi:10.1109/TPDS.2008.251}.'
  - 'Classical and quantum cryptography based on the learning-with-errors problem, which is related to decoding a random linear code \cite{doi:10.1145/1568318.1568324}.'
  - 'Random codes can be used to realize secure computation \cite{doi:10.1007/978-3-540-72540-4_17}.'

notes:
  - 'Shannon''s pioneering work \cite{doi:10.1002/j.1538-7305.1948.tb01338.x} analyzes the distance distribution of the code given a rate. Given \(n\) and rate \(R\), the minimum distance of a TRC is governed asymptotically by the \hyperref[topic:gv-bound]{GV bound} \(d=n\delta_{GV}(2R)\), where \(\delta_{GV}(x)=h^{-1}(1-x)\) for \(0\leq x \leq 1\). For a TLC, the minimum distance is similarly governed by \(d=n\delta_{GV}(R)\).'

