code_id: ppm
physical: spheres
logical: reals

name: 'Pulse-position modulation (PPM) code'
short_name: 'PPM'

description: |
  A modulation code with \(q\) equal-energy signals in which each codeword has one pulse in one of \(q\) time slots and zeros elsewhere.

realizations:
  - 'Greek hydraulic semaphore system \cite{manual:{M. Lahanas. "Ancient Greek Communication Methods". https://web.archive.org/web/20141102224501/https://www.mlahanas.de/Greeks/Communication.htm. Archived from the original on 2014-11-02},doi:10.1049/iet-com.2019.0051}.'
  - 'Telegraph time-division multiplexing.'
  - 'Radio-control, fiber-optic communications, and deep-space communications.'

relations:
  parents: 
    - code_id: modulation
  cousins:
    - code_id: biorthogonal_spherical
      detail: 'PPM codewords form a spherical code whose constellation consists of the standard basis vectors. Adjoining negatives yields the corresponding biorthogonal spherical code.'



