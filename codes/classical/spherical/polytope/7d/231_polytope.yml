code_id: 231_polytope
physical: spheres
logical: reals

name: '\(2_{31}\) polytope code'


description: |
  An antipodal spherical \((7,126,1)\) code whose codewords are the vertices of the smallest shell of the \(E_7\) lattice \cite{doi:10.1007/s00010-024-01036-6}.


relations:
  parents:
    - code_id: polytope
    - code_id: eseven_shell
      detail: 'Codewords of the \(2_{31}\) polytope form the smallest shell of the \(E_7\) lattice \cite{doi:10.1007/s00010-024-01036-6}.'
    - code_id: spherical_design
      detail: 'The 126 vertices of the \(2_{31}\) polytope form a spherical 5-design \cite{preset:Venkov01}.'
  cousins:
    - code_id: delsarte_optimal
      detail: 'The 63 antipodal pairs of vertices of the \(2_{31}\) polytope form a sharp configuration in \(\mathbb{R}P^6\) \cite{arxiv:math/0607446}.'
    - code_id: t-designs
      detail: 'The 63 antipodal pairs of vertices of the \(2_{31}\) polytope form a 2-design in \(\mathbb{R}P^6\) \cite{arxiv:math/0607446}.'
    - code_id: real_projective
      detail: 'The 63 antipodal pairs of vertices of the \(2_{31}\) polytope form a sharp configuration and a 2-design in \(\mathbb{R}P^6\) \cite{arxiv:math/0607446}.'



