code_id: snub_cube
physical: spheres
logical: reals

name: 'Snub-cube code'

alternative_names:
  - 'Snub cuboctahedron code'

description: |
  Spherical \((3,24,\frac{2(t^2+1)}{3t^2+2t+2})\) code whose codewords are the vertices of a snub cube, normalized to lie on the unit sphere.
  Here, \(t \approx 1.839\) is the tribonacci constant, the real root of \(t^3-t^2-t-1=0\), and the minimum distance squared is approximately \(0.55384\).

protection: 'Optimal configuration of 24 points on \(S^2\) \cite[pg. 78]{preset:EricZin}; see also the recent discussion in \cite[Sec. 1.3, Conj. 1.4]{arxiv:2403.16874}, which cites Robinson''s geometric proof of optimality and asks for a semidefinite-programming proof.'

notes:
  - 'See corresponding Bendwavy database entry \cite{manual:{R. Klitzing. "Snub cube." Polytopes \& their Incidence Matrices. \url{https://bendwavy.org/klitzing/incmats/snic.htm}}}.'

relations:
