code_id: snub_cube
physical: spheres
logical: reals

name: 'Snub-cube code'

description: |
  Spherical \((3,24,0.55384)\) code whose codewords are the vertices of a snub cube, normalized to lie on the unit sphere.

protection: 'Optimal configuration of 24 points on \(S^2\) \cite[pg. 78]{preset:EricZin}; see also the recent discussion in \cite[Sec. 1.3, Conj. 1.4]{arxiv:2403.16874}, which cites Robinson''s geometric proof of optimality and asks for a semidefinite-programming proof.'

