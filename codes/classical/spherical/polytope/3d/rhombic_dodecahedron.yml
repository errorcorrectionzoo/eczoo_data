code_id: rhombic_dodecahedron
physical: spheres
logical: reals

name: 'Rhombic dodecahedron code'

alternative_names:
  - 'Granatahedron code'

# vertices on wikipedia
description: |
  Spherical \((3,14,2-2/\sqrt{3})\) code whose codewords are the normalized vertices of the rhombic dodecahedron.
  Equivalently, the codewords are the union of the vertices of a cube and an octahedron on the unit sphere.
  

protection: |
  Optimal antipodal configuration of 14 points in 3D space \cite{arxiv:math/0208004}.

notes:
  - 'See corresponding Bendwavy database entry \cite{manual:{R. Klitzing. "Rhombic dodecahedron." Polytopes \& their Incidence Matrices. \url{https://bendwavy.org/klitzing/incmats/rhode.htm}}}.'

relations:
