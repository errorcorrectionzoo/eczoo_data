      detail: 'The rhombic dodecahedron and cuboctahedron are dual to each other \cite{doi:10.7312/hold92776}.'
    - code_id: cubeoctahedron
      detail: 'The rhombic dodecahedron and cuboctahedron are dual to each other \cite{doi:10.7312/hold92776}.'
    - code_id: hypercube
      detail: 'The vertices of a rhombic dodecahedron are a union of the vertices of a cube and an octahedron.'
    - code_id: biorthogonal_spherical
      detail: 'The vertices of a rhombic dodecahedron are a union of the vertices of a cube and an octahedron.'


