code_id: rhombicuboctahedron
physical: spheres
logical: reals

name: 'Rhombicuboctahedron code'

alternative_names:
  - 'Small rhombicuboctahedron code'
  - 'Expanded octahedron code'
  - 'Expanded cube code'

# vertices on wikipedia
description: |
  Spherical \((3,24,4/(5+2 \sqrt{2}))\) code whose codewords are the vertices of the rhombicuboctahedron.
  

protection: |
  Optimal antipodal configuration of 24 points in 3D space \cite{arxiv:math/0208004}.

notes:
  - 'See corresponding Bendwavy database entry \cite{manual:{R. Klitzing. "Small rhombicuboctahedron." Polytopes \& their Incidence Matrices. \url{https://bendwavy.org/klitzing/incmats/sirco.htm}}}.'

