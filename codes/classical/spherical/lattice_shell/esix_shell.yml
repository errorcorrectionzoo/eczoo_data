code_id: esix_shell
physical: spheres
logical: reals

name: '\(E_6\) lattice-shell code'

description: |
  Spherical code obtained by taking vectors from a fixed shell of the \(E_6\) lattice and normalizing them to lie on the unit sphere.

  The minimal shell of the lattice yields the \((6,72,1)\) code, whose codewords form the vertices of the \(1_{22}\) polytope and the rectified Hessian polyhedron.


relations:
  parents:
    - code_id: lattice_shell
  cousins:
    - code_id: esix
      detail: 'The \(E_6\) lattice-shell code is obtained from a shell of the \(E_6\) lattice.'
    - code_id: delsarte_optimal
      detail: 'The 36 antipodal pairs of the smallest \(E_6\) lattice shell form a sharp configuration in \(\mathbb{R}P^5\) \cite{arxiv:math/0607446}.'
    - code_id: t-designs
      detail: 'The 36 antipodal pairs of the smallest \(E_6\) lattice shell form a 2-design in \(\mathbb{R}P^5\) \cite{arxiv:math/0607446}.'
    - code_id: real_projective
      detail: 'The 36 antipodal pairs of the smallest \(E_6\) lattice shell form a sharp configuration and a 2-design in \(\mathbb{R}P^5\) \cite{arxiv:math/0607446}.'


