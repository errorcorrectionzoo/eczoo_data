relations:
  parents:
    - code_id: lattice_shell
  cousins:
    - code_id: leech
      detail: 'The \(\Lambda_{24}\) lattice-shell code is obtained from a shell of the Leech lattice.'
    - code_id: sharp_config
      detail: 'The smallest-shell \((24,196560,1)\) code is a spherical sharp configuration \cite{manual:{N. N. Andreev, "Location of points on a sphere with minimal energy". (Russian) Tr. Mat. Inst. Steklova 219 (1997), Teor. Priblizh. Garmon. Anal., 27–31; translation in Proceedings of the Steklov Institute of Mathematics 1997, no. 4(219), 20–24},arxiv:math/0607446}.
      The \((23,4600,1/3)\) and \((22,891,1/4)\) spherical codes are also sharp configurations \cite{doi:10.4153/CJM-1981-038-7,doi:10.1016/0021-8693(89)90260-3,arxiv:math/0607448,arxiv:math/0607446}\cite[Table 1]{arxiv:1603.05202}.'
    - code_id: spherical_design
      detail: 'Smallest-shell \((24,196560,1)\) code is a tight and unique spherical 11-design \cite[Ch. 3]{doi:10.1007/978-1-4757-6568-7}.
      The \((23,4600,1/3)\) and \((22,891,1/4)\) spherical codes are spherical 7- and 5-designs, respectively \cite{doi:10.4153/CJM-1981-038-7,doi:10.1016/0021-8693(89)90260-3,arxiv:math/0607448,arxiv:math/0607446}\cite[Table 1]{arxiv:1603.05202}.'


