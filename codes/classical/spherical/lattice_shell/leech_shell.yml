code_id: leech_shell
physical: spheres
logical: reals

name: '\(\Lambda_{24}\) Leech lattice-shell code'
introduced: '\cite{doi:10.4153/CJM-1967-017-0}'

description: |
  Spherical code whose codewords are points on the \(\Lambda_{24}\) Leech lattice normalized to lie on the unit sphere.
  The minimal shell of the lattice yields the \((24,196560,1)\) code, and recursively taking its kissing configurations yields the \((23,4600,1/3)\) and \((22,891,1/4)\) spherical codes \cite{doi:10.1007/BF03187604}; all three codes are optimal and unique for their parameters \cite{doi:10.4153/CJM-1981-038-7,arxiv:math/0607448}.


protection: |
  The minimal-shell code yields an optimal solution to the kissing problem in 24D \cite{doi:10.4153/CJM-1981-038-7}.
  This code saturates the Levenshtein bound \cite{preset:Levenshtein78,preset:Levenshtein79,preset:Levenshtein83,doi:10.1016/0097-3165(79)90074-8}\cite[pg. 337]{doi:10.1007/978-1-4757-6568-7} and is unique up to equivalence \cite{doi:10.4153/CJM-1981-038-7}.

