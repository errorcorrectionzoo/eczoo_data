code_id: group_linear
physical: groups

name: 'Linear code over \(G\)'
introduced: '\cite{doi:10.1109/49.29613,doi:10.1109/18.133243,doi:10.1109/18.104333}'

description: |
  Block code that encodes \(K\) states (codewords) in \(n\) coordinates over a group \(G\) such that the codewords form a subgroup of \(G^n\). In other words, the set of codewords is closed under the componentwise group operation. This notion generalizes linear codes over finite fields, but it does not require \(G\) to be a field or even Abelian.

  For codes endowed with the Hamming metric on \(G^n\), the ambient isometry group contains coordinate permutations together with coordinatewise \hyperref[topic:group-pauli]{left translations} by elements of \(G\). The \textit{automorphism group} of a particular group code is the subgroup of those isometries that preserves the code, rather than the entire ambient group.

features:
  rate: 'Linear codes over non-Abelian \(G\) cannot have better parameters than those for Abelian groups \cite{doi:10.1109/18.165454} and are asymptotically bad \cite{doi:10.1007/BF02997785,doi:10.1109/18.508859}.'

  encoders:
    - 'Canonical encoder \cite{doi:10.1109/18.259635}.'

relations:
  parents:
    - code_id: group_classical
    - code_id: group_orbit
      detail: 'The set of codewords of a linear code over \(G\) can be thought of as an orbit of a particular codeword under the group formed by the code. However, group orbit codes do not have to be linear \cite[Remark 8.4.3]{preset:EricZin}.'
    - code_id: block
      detail: 'Linear codes over \(G\) are linear block codes with \(\Sigma=G\).'
  cousins:
    - code_id: group_gkp
      detail: 'Group GKP codes are quantum analogues of linear codes over groups.'


