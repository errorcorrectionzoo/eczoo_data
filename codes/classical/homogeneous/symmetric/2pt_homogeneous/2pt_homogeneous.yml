code_id: 2pt_homogeneous
physical: quotients

name: 'Two-point homogeneous-space code'
introduced: '\cite{preset:KLbounds}'

alternative_names:
  - 'Rank-one symmetric space code'

description: |
  Encodes \(K\) states (codewords) into a two-point homogeneous space \(G/H\), i.e., a homogeneous space with a \(G\)-invariant metric whose symmetry group acts transitively on pairs of points at any fixed distance.
  In the compact connected case, these are precisely the rank-one symmetric spaces. Finite examples tag along as the corresponding combinatorial analogues, where pairs of points are indistinguishable up to the symmetry group once their mutual distance is fixed.

  More technically, a two-point homogeneous space \(G/H\) is a homogeneous space with a \(G\)-invariant metric such that for any \(x,x',y,y'\in G/H\), there exists \(g\in G\) with \(gx=x'\) and \(gy=y'\) whenever \(d(x,y)=d(x',y')\) \cite[Def. 4.7]{arxiv:0909.4767}. For finite spaces, this is the metric-space analogue of distance transitivity on pairs, not ordinary two-transitivity on all ordered pairs \cite[Table 2]{arxiv:1007.2905}.

  Two-point homogeneous spaces for compact connected \(G\) have been classified and include spheres, the real, complex, and quaternionic projective spaces, and the octonionic projective (a.k.a. Cayley) plane \cite{doi:10.2307/1969427}\cite[Ch. 9]{doi:10.1007/978-1-4757-6568-7}. 
  These compact examples have positive sectional curvature \cite{doi:10.2307/1970789}\cite[Fig. 1]{doi:10.1016/S0926-2245(00)00038-3}. 

  Examples of two-point homogeneous spaces for finite \(G\) include Hamming space, Johnson space, and distance-transitive graphs \cite{doi:10.1007/978-3-642-74341-2}.
  Finite spaces have yet to be classified \cite[Ch. 9]{doi:10.1007/978-1-4757-6568-7}\cite{arxiv:0909.4767}\cite[Table 2]{arxiv:1007.2905}.

  Infinite two-point homogeneous spaces with constant curvature include spheres, Euclidean spaces, and hyperbolic spaces.
  These spaces are three-point homogeneous (a.k.a. satisfy the mobility axiom), meaning that the \(G\) action maps any triangle to any other triangle with the same parameters \cite[Sec. 6.6.1.1]{doi:10.1007/978-3-642-18245-7}.



protection: |
  The zonal spherical functions of two-point homogeneous spaces depend only on the distance between points due to the pairwise distance-homogeneity of the \(G\) action. 
  For the compact connected families, these spherical functions are Jacobi polynomials; in the spherical case, they reduce to Gegenbauer polynomials \cite[Table 1]{arxiv:1007.2905}.
  This yields a general series of bounds on packings in \(G/H\) originating with the Kabatiansky-Levenshtein bound \cite{preset:KLbounds}\cite[Ch. 9]{doi:10.1007/978-1-4757-6568-7}; see Ref. \cite{preset:HPLevBounds} for a review. 


notes:
  - 'See \cite[Ch. 9]{doi:10.1007/978-1-4757-6568-7}\cite{doi:10.1007/978-94-010-9787-1_2,arxiv:0909.4767,arxiv:1007.2905} for reviews.'


relations:
  parents:
    - code_id: symmetric_space
      detail: 'A special class of symmetric spaces are the two-point homogeneous spaces (a.k.a. rank-one symmetric spaces \cite[Table 6.1]{doi:10.1007/978-3-642-18245-7}), whose metric is \(G\)-invariant and for which any two pairs of points at the same distance can be mapped to each other by some \(g\in G\) \cite[Def. 4.7]{arxiv:0909.4767}.'
  cousins:
