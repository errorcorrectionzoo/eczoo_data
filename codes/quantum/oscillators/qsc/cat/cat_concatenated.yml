code_id: cat_concatenated
physical: oscillators

name: 'Concatenated cat code'

description: |
  A concatenated code obtained by encoding the physical qubits of an inner qubit code into cat-code states.
  Most examples concatenate a qubit stabilizer code with the two-component cat code in its cat-state basis.
  One important family concatenates a quantum repetition inner code with an outer CSS code to exploit the strongly dephasing-biased noise of stabilized cat qubits \cite{arxiv:1905.00450}.

protection: |
  The cat code can exponentially suppress one effective Pauli error channel with the size of its coherent states, so an inner qubit code such as a quantum repetition code can exploit a large noise bias while still ensuring good performance \cite{arxiv:1904.09474,arxiv:1905.00450,arxiv:2009.10756,arxiv:2212.11927}.

features:
  fault_tolerance:
    - 'In a repetition-to-CSS concatenation built from stabilized cat qubits, a physical bias-preserving CX more than doubles a rigorous lower bound on the fault-tolerance threshold and reduces logical Clifford overhead by a factor of at least five relative to an earlier scheme \cite{arxiv:1905.00450}.'


relations:
