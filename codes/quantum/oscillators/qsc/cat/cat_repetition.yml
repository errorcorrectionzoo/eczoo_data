code_id: cat_repetition
physical: oscillators
logical: qubits

name: 'Cat-repetition code'
introduced: '\cite{arxiv:1409.6759,arxiv:1904.09474,arxiv:1905.00450}'

description: |
  A concatenated qubit-into-\(n\)-mode code obtained by encoding each qubit of a quantum repetition code into a two-component cat code in its cat-state basis.
  
  A basis of codewords for the two-component case,
  \begin{align}
    |\overline{\pm}\rangle\propto\left(\left|\alpha\right\rangle \pm\left|-\alpha\right\rangle \right)^{\otimes n}
  \end{align}
  for any complex \(\alpha\).


protection: |
  The code can detect arbitrary losses in up to \(n/2\) modes.  
  As the inner layer of a repetition-to-CSS concatenation, it can suppress dominant dephasing faults and convert the effective logical noise into a weaker, more symmetric channel before the outer encoding \cite{arxiv:1905.00450}.
  The cat-repetition code on a 2D mode lattice is a candidate for a memory that may be self-correcting, but only in the limit of infinite energy per mode \cite{arxiv:2205.09767}.

features:
  general_gates:
    - 'Fault-tolerant logical \(X\), CNOT, and Toffoli gates and a logical Hadamard synthesized from state preparation and measurement in the dual basis, without magic-state preparation or distillation \cite{arxiv:1904.09474}.'
    - 'Using a physical bias-preserving CX between cat qubits, the logical \(\overline{\mathrm{CX}}\) gadget can be implemented transversally between repetition-code blocks; magic-state preparation using transversal \(ZZ(\theta)\) gates was also analyzed \cite{arxiv:1905.00450}.'
  decoders:
    - 'A measurement-code decoder for the repetition layer yields a \(\overline{\mathrm{CX}}\)-gadget threshold of about \(6\times 10^{-3}\) for \(n=5\); reaching a comparable threshold with naive repeated-syndrome decoding requires \(n=11\) and \(r=5\) \cite{arxiv:1905.00450}.'

  fault_tolerance:
    - 'Fault-tolerant logical \(X\), CNOT, and Toffoli gates and a logical Hadamard synthesized from state preparation and measurement in the dual basis, without magic-state preparation or distillation \cite{arxiv:1904.09474}.'
  threshold:
    - 'For dephasing bias \(\eta=10^4\), the cat-based logical \(\overline{\mathrm{CX}}\) gadget has threshold \(7.5\times 10^{-3}\), compared with \(3.55\times 10^{-3}\) for an earlier scheme; at \(\varepsilon=2.5\times 10^{-3}\), its circuit volume is about five times smaller \cite{arxiv:1905.00450}.'

realizations:
  - 'Superconducting circuit devices: a repetition code out of two-component cat qubits has been realized for distances 3 and 5 \cite{arxiv:2409.13025}.'


