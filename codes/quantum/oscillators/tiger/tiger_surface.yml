code_id: tiger_surface
physical: oscillators
logical: oscillators

name: 'Tiger surface code'
introduced: '\cite{arxiv:2411.09668}'

description: |
  A tiger-code family constructed from a hypergraph product of two repetition codes over the integers, rather than from concatenating a cat code with a qubit surface code.
  The code is conjectured to realize phases of \(U(1)\) gauge theory. 

  An \(r \times (2m-1)\) lattice encodes a logical qubit into \(2rm-r\) bosonic modes with \(d_X=m\) and \(d_Z \geq 4rm\sin^2\!\left(\frac{\pi}{2m}\right)\) \cite{arxiv:2411.09668}.
  The \(m=2\) case is the liger (long-tiger) surface code, which has \(d_X=2\) and \(d_Z=4r\).

protection: |
  The code corrects at least \(\lfloor (m-1)/2 \rfloor\) losses on arbitrary modes, and it detects pure-loss error patterns of total weight up to \(2m-2\) \cite{arxiv:2411.09668}.
  Its Euclidean distance obeys
  \begin{align}
    4rm\sin^2\!\left(\frac{\pi}{2m}\right)\leq d_Z \leq 4rm\sin^2\!\left(\frac{\pi}{2m}\right)+4\sum_{j=1}^{m-1}\sin^2\!\left(\frac{(m-j)\pi}{m}\right)
  \end{align}
  so choosing \(r=\Omega(m^2)\) makes both \(d_X\) and \(d_Z\) grow with system size. For suitable nonzero syndrome choices, the liger surface code has exact orthogonality in both logical \(X\)- and \(Z\)-bases at arbitrary energy \cite{arxiv:2411.09668}.
  
