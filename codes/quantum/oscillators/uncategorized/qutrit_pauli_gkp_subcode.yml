code_id: qutrit_pauli_gkp_subcode
physical: oscillators
logical: qudits

name: 'Qutrit-Pauli tessellation code'
introduced: '\cite{arxiv:2410.18713}'

description: |
  Euclidean-plane tessellation code whose projection is onto a copy of an irreducible representation of the \hyperref[topic:qudit-pauli]{single-qutrit Pauli group}, realized by the \(\{3,3,3\}\) tessellation \cite{arxiv:2410.18713}.
  The code is a subcode of a two-mode GKP code and has GKP-like stabilizers. Logical \(X\), \(Z\), and \((ZX)^{-1}\) are implemented by \(2\pi/3\) rotations around tessellation vertices, while only a GKP-like logical \(Z\) is available via real-space displacement.

protection: |
  The code corrects translation errors of Euclidean norm less than \(\sqrt{3}/2\).
  It also corrects momentum errors in any direction with \(|\vec{k}| < 2\pi/9\) \cite{arxiv:2410.18713}.


