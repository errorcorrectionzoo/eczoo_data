code_id: qudit_reed_muller
physical: qudits
logical: qudits

name: 'Prime-qudit RM code'
introduced: '\cite{arxiv:quant-ph/0502001,arxiv:1205.3104,arxiv:1406.3055}'

# Dual added to include qudit_hamming_css as a child
description: |
  Modular-qudit stabilizer code constructed from GRM codes or their duals via the modular-qudit CSS construction.

  For prime local dimension \(q\), CSS constructions from \(\mathrm{GRM}_q(\nu_1,m) \subseteq \mathrm{GRM}_q(\nu_2,m)\) yield \hyperref[topic:quantum-weight-enumerator]{pure} \([[q^m,k(\nu_2)-k(\nu_1),\min\{d(\nu_1^\perp),d(\nu_2)\}]]_q\) codes \cite{arxiv:quant-ph/0502001}.
  The special case \(m=1\) gives quantum MDS codes \([[q,q-2\nu-2,\nu+2]]_q\) for \(0 \leq \nu \leq (q-2)/2\) \cite{arxiv:quant-ph/0502001}.
  An odd-prime-qudit CSS code family constructed from first-order punctured GRM codes transversally implements a diagonal gate at any level of the \hyperref[topic:qudit-clifford-hierarchy]{qudit Clifford hierarchy} \cite{arxiv:1205.3104,arxiv:1406.3055}.

features:
  rate: 'For the CSS family from \(\mathrm{GRM}_q(\nu_1,m) \subseteq \mathrm{GRM}_q(\nu_2,m)\), the rate is \((k(\nu_2)-k(\nu_1))/q^m\) \cite{arxiv:quant-ph/0502001}.'

  magic_scaling_exponent: 'An odd-prime-qudit CSS code family constructed from first-order punctured GRM codes can be used for qudit magic-state distillation; see \cite[Table I]{arxiv:1205.3104} for yields.'

  transversal_gates:
    - 'An odd-prime-qudit CSS code family constructed from first-order punctured GRM codes transversally implements a diagonal gate at any level of the \hyperref[topic:qudit-clifford-hierarchy]{qudit Clifford hierarchy} \cite{arxiv:1205.3104,arxiv:1406.3055}.'

relations:
