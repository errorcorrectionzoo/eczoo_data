code_id: qudit_cubic
physical: qudits
logical: qudits

name: 'Qudit cubic code'
introduced: '\cite{arxiv:1202.0052,manual:{J. Haah, \href{https://online.kitp.ucsb.edu/online/qinfo_c17/haah/}{KITP Conference: Frontiers of Quantum Information Physics, UCSB, Santa Barbara, CA.}, KITP Conference: Frontiers of Quantum Information Physics, UCSB, Santa Barbara, CA.},arxiv:1709.04460,arxiv:2504.09847}'

description: |
  Generalization of the Haah cubic code to modular qudits.

protection: |
  Performance over the erasure and depolarizing channels was studied in Ref. \cite{doi:10.23919/ISITA.2018.8664389}.


relations:
  parents:
    - code_id: fracton
      detail: 'Haah cubic \cite{arxiv:1101.1962} codes 1-4, 7, 8, and 10 do not have string logical operators and are the first examples of Type-II fracton phases. The remaining cubic codes are fractal Type-I fracton codes \cite{arxiv:1908.08049,arxiv:2001.01722}.
      The qutrit models in \cite[Eqs. (D11-D12)]{arxiv:1908.08049} are likely Type-II, with no string operators found numerically up to width 20, while the \(q=5\) qudit model in \cite[Eq. (D13)]{arxiv:1908.08049} satisfies a proven no-string condition and is Type-II.'
  cousins:
    - code_id: homological_rotor
      detail: 'The qudit cubic code can be generalized to rotors \cite{manual:{J. Haah, \href{https://online.kitp.ucsb.edu/online/qinfo_c17/haah/}{KITP Conference: Frontiers of Quantum Information Physics, UCSB, Santa Barbara, CA.}, KITP Conference: Frontiers of Quantum Information Physics, UCSB, Santa Barbara, CA.},arxiv:1709.04460}.'
    - code_id: analog_stabilizer
      detail: 'The qudit cubic code can be generalized to oscillators \cite{arxiv:1709.04460}.'


