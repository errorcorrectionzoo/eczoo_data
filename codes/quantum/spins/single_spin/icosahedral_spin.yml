code_id: icosahedral_spin
physical: spins
logical: spins

name: 'Icosahedral spin code'
introduced: '\cite{arxiv:2005.10910}'

description: |
  A spin-\(7/2\) single-spin code designed to realize the binary icosahedral group \(2I\) using \(SU(2)\) rotations \cite{arxiv:2005.10910}.
  The codespace is a two-dimensional irrep subspace obtained by restricting the spin-\(7/2\) representation of \(SU(2)\) to the subgroup \(2I\).
  Under the \hyperref[topic:dicke]{Dicke-state mapping}, this code is equivalent to the \(((7,2,3))\) Pollatsek-Ruskai permutation-invariant code \cite{arxiv:2005.10910,arxiv:2305.07023}.

  The code has unnormalized logical states
  \begin{align}
    \begin{split}
      |0_{L}\rangle&\propto\sqrt{3}|_{7/2}^{7/2}\rangle+\sqrt{7}|_{-3/2}^{7/2}\rangle\\
      |1_{L}\rangle&\propto\sqrt{7}|_{3/2}^{7/2}\rangle-\sqrt{3}|_{-7/2}^{7/2}\rangle\,.
    \end{split}
  \end{align}


relations:
  parents:
    - code_id: j_gross
      detail: 'The icosahedral spin code is the \(2I\) example of a Clifford-group spin code \cite{arxiv:2005.10910}.'


