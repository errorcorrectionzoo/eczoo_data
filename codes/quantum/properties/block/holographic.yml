code_id: holographic

name: 'Holographic code'
short_name: 'HQECC'
introduced: '\cite{arxiv:1503.06237}'

description: |
  Block quantum code whose features serve to model aspects of the AdS/CFT holographic duality and, more generally, quantum gravity.

  In the original exactly solvable toy models, a network of perfect tensors defines an isometric encoding map from bulk logical degrees of freedom to boundary physical degrees of freedom \cite{arxiv:1503.06237}.
  For connected boundary regions of negatively curved planar holographic states, the discrete Ryu-Takayanagi formula is satisfied exactly, and bulk operators admit multiple boundary reconstructions via tensor pushing and greedy-geodesic methods \cite{arxiv:1503.06237}.
  More general holographic codes can also be built from non-perfect tensors; for example, the quantum-Lego framework uses \([[15,1,3]]\) Reed-Muller tensors on a \(\{15,4\}\) tiling to obtain a holographic code with a transversal non-Clifford operator, albeit with weaker complementary erasure-correction properties than HaPPY-like perfect-tensor codes \cite{arxiv:2109.08158}.

notes:
  - 'Reviews of holographic codes \cite{arxiv:2102.02619,arxiv:2110.14669}.'
  - 'The original paper also describes black-hole toy models by removing central tensors and interpreting the newly exposed bulk legs as black-hole microstate degrees of freedom \cite{arxiv:1503.06237}.'


# SYK codes do not seem to be related to Lego, so parent is block quantum
