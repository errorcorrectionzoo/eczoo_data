code_id: random_circuit
# includes Galois, modular, oscillators, and groups

name: 'Random-circuit code'
introduced: '\cite{arxiv:quant-ph/9910081}'

description: 'Code whose encoding is naturally constructed by randomly sampling from a large set of quantum circuits. Examples include short random Clifford circuits that define good quantum error-correcting codes \cite{arxiv:1312.7646} and monitored random circuits whose mixed phase dynamically generates error-protected subspaces with nonzero channel-capacity density on polynomial timescales \cite{arxiv:1905.05195}.'

protection: 'For one-dimensional stabilizer random circuits, the average contiguous code length and the related linear code distance provide efficiently computable upper bounds on the true code distance \cite{arxiv:0810.1983,arxiv:1905.05195}.'


notes:
  - 'See Refs. \cite{arxiv:2111.08018,arxiv:2207.14280} for reviews on random-circuit codes.'

# This is more of a unifying property, not meant to be a parent to anything
relations:
