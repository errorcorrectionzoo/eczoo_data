code_id: dynamic_gen
# includes Galois, modular, oscillators, and groups

name: 'Dynamically generated QECC'
short_name: 'Dynamically generated'
introduced: '\cite{arxiv:0708.4025}'

description: |
  Block quantum code whose natural definition is in terms of a many-body scaling limit of a local dynamical process.
  Such processes, which are often non-deterministic, update the code structure and can include random unitary evolution or non-commuting projective measurements.
  In monitored random-circuit realizations, the mixed phase of a purification transition can dynamically project the system into a quantum error-correcting code space that is capacity-achieving for the future evolution of the monitored channel \cite{arxiv:1905.05195}.

protection: |
  In monitored random-circuit realizations, dynamically generated codes can protect an extensive amount of quantum information on polynomial timescales in the mixed phase below a purification threshold, while the pure phase rapidly purifies arbitrary initial states \cite{arxiv:1905.05195}.

features:
  rate: 'Monitored random-circuit realizations can have finite asymptotic code rate below the purification threshold and zero rate above it \cite{arxiv:1905.05195}.'


relations:
  parents:
    - code_id: block_quantum


