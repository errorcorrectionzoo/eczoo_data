code_id: binary_quantum_goppa
physical: galois
logical: galois

name: 'Binary quantum Goppa code'
introduced: '\cite{arxiv:quant-ph/0006061,arxiv:quant-ph/0501074,doi:10.1007/s11128-006-0047-9}'

description: |
  A quantum AG code obtained from algebraic-geometric Goppa codes via the Galois-qudit CSS construction.

  For \(q=2^m\), let \(F/\mathbb{F}_q\) be an algebraic function field of one variable with an automorphism \(\sigma\) of order two fixing \(\mathbb{F}_q\), and let \(P_1,\ldots,P_n\) be pairwise distinct degree-one places such that \(\sigma P_i \neq P_j\) for all \(i,j\).
  If \(\eta\) is a differential with \(v_{P_i}(\eta)=v_{\sigma P_i}(\eta)=-1\), \(\operatorname{res}_{P_i}(\eta)=1\), and \(\operatorname{res}_{\sigma P_i}(\eta)=-1\), and if \(G\) is a \(\sigma\)-invariant divisor satisfying \(v_{P_i}(G)=v_{\sigma P_i}(G)=0\), then
  \begin{align}
    C(G)=\{(f(P_1),\ldots,f(P_n),f(\sigma P_1),\ldots, f(\sigma P_n) )\,|\,f\in\mathcal{L}(G)\}\subseteq \mathbb{F}_q^{2n}
  \end{align}
  obeys \(C(G)^{\perp_s}=C(H)\), where \(H=(P_1+\cdots+P_n+\sigma P_1+\cdots+\sigma P_n)-G+(\eta)\) \cite[Ch. 5]{arxiv:quant-ph/0501074}.
  Whenever \(G \geq H\), this yields an \([[n,k,d]]_q\) quantum stabilizer code with
  \begin{align}
    k=\dim G-\dim(G-P_1-\cdots-P_n-\sigma P_1-\cdots-\sigma P_n)-n
  \end{align}
  and \(d \geq n-\lfloor \deg G/2 \rfloor\) \cite{arxiv:quant-ph/0006061,doi:10.1007/s11128-006-0047-9}\cite[Ch. 5]{arxiv:quant-ph/0501074}.

protection: 'For a code with distance \(d\), detects errors on up to \(d-1\) qudits and corrects errors on up to \(\lfloor (d-1)/2 \rfloor\) qudits. In Matsumoto''s construction, \(d \geq n-\lfloor \deg G/2 \rfloor\).'

features:
  rate: 'For every \(m \geq 2\), there are binary quantum Goppa-code families with \(\liminf k_i/n_i \geq 1-\frac{2}{2^m-1}-4m\delta\) and \(\liminf d_i/n_i \geq \delta\) \cite{arxiv:quant-ph/0006061,arxiv:quant-ph/0501074}.'

  encoders:
    - 'Encoding defined in Ref. \cite{arxiv:quant-ph/0107129} uses a technique from Ref. \cite{arxiv:quant-ph/0005008} to encode quantum stabilizer codes.'

  decoders:
    - 'Farran''s decoder can be used for the underlying AG construction; under the bound \(2\,\mathrm{wt}(e)+1 \leq n-\lfloor \deg G/2 \rfloor\), the relevant minimum-weight error can be recovered in \(O(n^{2.81})\) time \cite{arxiv:math/9910151,arxiv:quant-ph/0501074}.'

relations:
