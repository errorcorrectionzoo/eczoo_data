code_id: expander_lifted_product
physical: galois
logical: galois

name: 'Expander LP code'
introduced: '\cite{arxiv:2111.03654}'

description: |
  Family of \(G\)-lifted product codes constructed using two classical \hyperref[code:expander]{expander codes}, equivalently two regular \hyperref[code:tanner]{Tanner codes} defined on the same expander graph \cite{doi:10.1090/S0273-0979-06-01126-8}. For certain parameters, this construction yields the first asymptotically good QLDPC codes. Classical codes resulting from the same lifted-product complexes are one of the first two families of \(c^3\)-LTCs \cite{arxiv:2111.03654}.

  An expander lifted-product code family is constructed as follows. First, take the Cayley graph of a finite group \(G\).
  Second, take the double cover of the graph, resulting in a graph that satisfies the requirements of participating in a \(G\)-lifted product (i.e., the resulting graph is a free \({\mathbb{F}}_q G\)-module). Third, create two \hyperref[code:tanner]{Tanner codes} on that graph, in which parity-check supports are defined by the graph and the local constraints are specified by two short classical codes (chosen randomly in the original proof). Fourth, take the \(G\)-lifted product of those two Tanner codes.

  The small classical codes used in the construction of good QLDPC codes are required to have a certain product-expansion property (Lemma 10 in Ref. \cite{arxiv:2111.03654}); it is proven that random codes satisfy said property in the thermodynamic limit.

protection: 'Code performance strongly depends on \(G\). Certain non-Abelian groups yield asymptotically good QLDPC codes with parameters \([[n,k=\Theta(n),d=\Theta(n)]]\) \cite{arxiv:2111.03654}. For cyclic Abelian groups \(G=\mathbb{Z}_{\ell}\) with \(\ell=\Theta(n/\log n)\), quasi-cyclic expander LP codes yield families with parameters \([[n,k=\Theta(\log n),d=\Theta(n/\log n)]]\) \cite{arxiv:2012.04068}.'

features:
  rate: 'Expander lifted-product codes for non-Abelian groups include the first examples \cite{arxiv:2111.03654} of (asymptotically) \textit{good QLDPC codes}, i.e., codes with asymptotically constant rate and linear distance. For cyclic Abelian groups \(G=\mathbb{Z}_{\ell}\) with \(\ell=\Theta(n/\log n)\), quasi-cyclic expander LP codes yield families with parameters \([[n,k=\Theta(\log n),d=\Theta(n/\log n)]]\) \cite{arxiv:2012.04068}. Related balanced-product reformulations and other explicit Abelian LP constructions appear in \cite{arxiv:2012.09271,arxiv:2112.01647}.'

  general_gates:
    - 'Certain qubit expander LP codes can admit a cup product structure and can thus have logical gates in the \term{Clifford hierarchy} implemented by constant-depth Clifford circuits \cite{arxiv:2410.16250}.'

  decoders:
    - 'Linear-time decoder \cite{arxiv:2206.07571}.'
    - 'Logarithmic-time subroutine \cite{arxiv:2208.05537}.'

# The existence of such codes proves the QLDPC conjecture \cite{arxiv:2103.06309}.

notes:
  - 'Construction outlined in talk by \href{https://www.youtube.com/watch?v=k7LuOiOBYyQ}{R. O''Donnell}.'
  - 'Popular summary in \href{https://www.quantamagazine.org/qubits-can-be-as-safe-as-bits-researchers-show-20220106}{Quanta Magazine}.'

relations:
  parents:
    - code_id: lifted_product
  cousins:
    - code_id: good_qldpc
      detail: 'Lifted products of certain classical Tanner codes are the first asymptotically good QLDPC codes.'
    - code_id: q-ary_ltc
      detail: 'Classical codes resulting from the expander lifted-product construction are one of the first two families of \(c^3\)-LTCs \cite{arxiv:2111.03654}.'
    - code_id: expander
      detail: 'The construction starts from two expander codes on the same \(G\)-lifted expander graph, using different local codes in the original proof \cite{arxiv:2111.03654}.'
    - code_id: tanner
      detail: 'Expander lifted-product codes are products of regular \(q\)-ary Tanner codes defined on expander graphs \cite{doi:10.1090/S0273-0979-06-01126-8}.'
    - code_id: random
      detail: 'Expander lifted-product codes are quantum CSS codes that utilize short classical codes in their construction which need to satisfy some properties (Ref. \cite{arxiv:2111.03654}, Lemma 10). It is shown that such codes exist, but they are not explicitly constructed. Such codes can be obtained by repeated random sampling or by performing a search of all codes of desired length. Nevertheless, since the length of the desired short codes does not scale with \(n\), this construction is effectively explicit.'
    - code_id: topological
      detail: 'Expander lifted-product codes are expected to realize topological quantum spin glass order \cite{arxiv:2412.13248}.'


