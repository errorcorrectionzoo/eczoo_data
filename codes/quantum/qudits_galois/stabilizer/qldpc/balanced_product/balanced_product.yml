code_id: balanced_product
physical: galois
logical: galois

name: 'Balanced product (BP) code'
short_name: 'BP'
introduced: '\cite{arxiv:2012.09271}'

description: |
  Family of CSS quantum codes obtained from two classical-code chain complexes that share a common group symmetry.
  The balanced product can be understood as taking the usual tensor or hypergraph product and then quotienting by the shared symmetry action.
  This can reduce the overall number of physical qubits \(n\) while, in favorable cases, preserving the number of encoded qubits and the code distance, thereby improving the encoding rate \(k/n\) and normalized distance \(d/n\) compared to the underlying tensor or hypergraph product.
  This quotienting-by-symmetry viewpoint is also the organizing principle used in Ref. \cite{arxiv:2402.16831} to relate balanced-product constructions of good qLDPC codes to left-right Cayley complexes and quantum Tanner codes.

  For trivial group action, the construction reduces to a hypergraph product code.
  For cyclic groups, it overlaps with fiber-bundle and lifted-product constructions \cite{arxiv:2012.09271}.

protection: ''

features:

  rate: 'The original explicit balanced-product family is first constructed as a horizontal subsystem code with \(k \in \Theta(n^{2/3})\), \(d_X \in \Omega(n^{1/3})\), and \(d_Z \in \Theta(n)\); after distance balancing, it yields an LDPC family with \(k \in \Theta(n^{4/5})\) and \(d \in \Omega(n^{3/5})\) \cite{arxiv:2012.09271}. For balanced products of two good classical LDPC codes over groups of order \(\Theta(n)\), the original paper proves constant encoding rate and conjectures linear distance \cite{arxiv:2012.09271}.'

  general_gates:
    - 'Logical gates via Dehn twists for balanced products of cyclic codes \cite{arxiv:2411.03302}.'

  decoders:
    - 'BP-OSD decoder \cite{arxiv:1904.02703}.'

relations:
  parents:
    - code_id: galois_css
    - code_id: generalized_homological_product_css
      detail: 'Balanced product codes result from a tensor product of two classical-code chain complexes, followed by a factoring out of certain symmetries.'
  cousins:
    - code_id: qubit_subsystem_stabilizer
      detail: 'The original explicit balanced-product family is first constructed as a horizontal subsystem balanced-product code built from expander codes and cyclic repetition codes \cite{arxiv:2012.09271}.'
    - code_id: distance_balanced
      detail: 'Applying distance balancing to the explicit subsystem balanced-product family of Ref. \cite{arxiv:2012.09271} yields an LDPC code family with \(k \in \Theta(n^{4/5})\) and \(d \in \Omega(n^{3/5})\).'


