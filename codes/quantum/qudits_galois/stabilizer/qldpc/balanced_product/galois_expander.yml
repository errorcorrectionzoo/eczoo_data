code_id: galois_expander
physical: galois
logical: galois

name: 'Galois-qudit expander code'
introduced: '\cite{arxiv:2410.14662}'

alternative_names:
  - 'Galois-qudit Sipser-Spielman code'

description: |
  Galois-qudit CSS code obtained from tensor products of chain complexes associated with an explicit family of expander codes with Reed-Solomon local checks.

  In the explicit construction of \cite{arxiv:2410.14662}, these expander-code complexes contain planted GRM codewords, yielding a \textit{multiplication property} that allows QLDPC Galois-qudit quantum expander codes with transversal \(C^{r-1} Z\) gates while achieving \(D\geq N^{1/r}/\operatorname{poly}(\log N)\) and \(w\leq\operatorname{poly}(\log N)\).

features:
  magic_scaling_exponent: 'For every integer \(r\geq 2\) and every \(\epsilon>0\), the construction yields \([[N,K\geq N^{1-\epsilon},D\geq N^{1/r}/\operatorname{poly}(\log N)]]_q\) QLDPC Galois-qudit quantum expander codes with transversal \(C^{r-1} Z\) gates and stabilizer weight \(w\leq\operatorname{poly}(\log N)\) \cite{arxiv:2410.14662}. This construction allows for arbitrarily small magic-state yield parameter \(\gamma\).'

  transversal_gates:
    - 'For every integer \(r\geq 2\), there are QLDPC Galois-qudit quantum expander codes with transversal \(C^{r-1} Z\) gates and parameters \([[N,K\geq N^{1-\epsilon},D\geq N^{1/r}/\operatorname{poly}(\log N)]]_q\) \cite{arxiv:2410.14662}. By decomposing each Galois qudit into a Kronecker product of qubits, this yields an explicit qubit CSS QLDPC family with parameters \([[N,K\geq N^{1-\epsilon},D\geq N^{1/r}/\operatorname{poly}(\log N)]]\), stabilizer weight \(\operatorname{poly}(\log N)\), and transversal \(C^{r-1}Z\) gates acting on \(N^{1-\epsilon}\) disjoint logical \(r\)-tuples.'


