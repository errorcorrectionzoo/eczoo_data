code_id: galois_expander
physical: galois
logical: galois

name: 'Galois-qudit expander code'
introduced: '\cite{arxiv:2410.14662}'

alternative_names:
  - 'Galois-qudit Sipser-Spielman code'

description: |
  Galois-qudit CSS code obtained from product constructions on chain complexes associated with expander codes.

  Expander codes with RS inner codes contain GRM codewords because tensor products of univariate polynomials (corresponding to RS codewords) yield multivariate polynomials (corresponding to GRM codewords) \cite{arxiv:2410.14662}. This \textit{multiplication property} allows QLDPC Galois-qudit quantum expander codes with transversal \(C^{r-1} Z\) gates while achieving \(D\geq N^{1/r}/\operatorname{poly}(\log N)\) and \(w\leq\operatorname{poly}(\log N)\) \cite{arxiv:2410.14662}.

features:
  magic_scaling_exponent: 'For every integer \(r\geq 2\) and every \(\epsilon>0\), the construction yields \([[N,K\geq N^{1-\epsilon},D\geq N^{1/r}/\operatorname{poly}(\log N)]]_q\) QLDPC Galois-qudit quantum expander codes with transversal \(C^{r-1} Z\) gates and stabilizer weight \(w\leq\operatorname{poly}(\log N)\) \cite{arxiv:2410.14662}. This construction allows for arbitrarily small magic-state yield parameter \(\gamma\).'

  transversal_gates:
    - 'For every integer \(r\geq 2\), there are QLDPC Galois-qudit quantum expander codes with transversal \(C^{r-1} Z\) gates and parameters \([[N,K\geq N^{1-\epsilon},D\geq N^{1/r}/\operatorname{poly}(\log N)]]_q\) \cite{arxiv:2410.14662}.'


