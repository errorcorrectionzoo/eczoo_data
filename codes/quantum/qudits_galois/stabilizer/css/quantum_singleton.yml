      detail: 'Singleton-bound approaching AQECCs asymptotically approach the quantum Singleton bound, rather than exactly saturating it at finite blocklength.'
    - code_id: galois_fqrs
      detail: 'Singleton-bound approaching AQECCs are built using folded quantum Reed-Solomon (FQRS) codes \cite{arxiv:2212.09935}.'
    - code_id: quantum_secret_sharing
      detail: 'Quantum secret-sharing codes have asymptotically decaying rate and require qudit dimension to increase exponentially with \(n\), while Singleton-bound approaching AQECCs have constant rate and qudit dimension.'

