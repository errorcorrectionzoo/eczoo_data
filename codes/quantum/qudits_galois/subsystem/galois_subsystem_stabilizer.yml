code_id: galois_subsystem_stabilizer
physical: galois
logical: galois

name: 'Subsystem Galois-qudit stabilizer code'
introduced: '\cite{arxiv:quant-ph/0604161}'

alternative_names:
  - 'Gauge Galois-qudit stabilizer code'

description: |
  Galois-qudit generalization of a subsystem qubit stabilizer code.
  Can be obtained by taking a Galois-qudit stabilizer code and assigning some of its logical qudits to be gauge qudits.
  Euclidean and Hermitian constructions from classical additive codes are given in Ref. \cite[Corrs. 4,5]{arxiv:quant-ph/0610153}.

protection: |
  Ref. \cite{arxiv:quant-ph/0610153} derives Gilbert-Varshamov-type lower bounds, linear-programming upper bounds, and pure-code Singleton and Hamming bounds for Clifford subsystem codes.
  The Singleton bound has been extended to Galois-qudit subsystem codes \cite{arxiv:quant-ph/0703213}.

relations:
  parents:
    - code_id: subsystem_galois_into_galois
    - code_id: subsystem_stabilizer
  cousins:
    - code_id: galois_stabilizer
      detail: 'Subsystem Galois-qudit stabilizer codes reduce to Galois-qudit stabilizer codes when there are no gauge qudits.'
    - code_id: quantum_mds
      detail: 'A Clifford subsystem code saturating the quantum Singleton bound must have a trivial gauge subsystem, i.e., there are no \([[n,n-2d+2,r>0,d]]_q\) Clifford subsystem codes \cite[Thms. 19,20]{arxiv:quant-ph/0610153}. More generally, all \hyperref[topic:quantum-weight-enumerator]{pure} MDS subsystem stabilizer codes are derived from MDS stabilizer codes \cite{arxiv:0712.4321}.'


