code_id: css_5_1_3
physical: galois
logical: galois

name: '\([[5,1,3]]_4\) Galois-qudit CSS code'
introduced: '\cite{arxiv:2601.20927}'

description: |
  Five-Galois-qudit CSS code over \(\mathbb{F}_4=\{0,1,\omega,\omega^2\}\) that encodes one logical Galois qudit and corrects a single-qudit error.

  Its \(X\)- and \(Z\)-type stabilizer check matrices are
  \begin{align}
    H_X=\begin{pmatrix}1&1&1&1&0\\0&1&\omega&\omega^2&1\end{pmatrix},
    \qquad
    H_Z=\begin{pmatrix}1&1&1&1&0\\0&1&\omega^2&\omega&1\end{pmatrix}~.
  \end{align}
  Since the code is a true stabilizer code, multiplication of these rows by \(\omega\) or \(\omega^2\) also yields stabilizers \cite{arxiv:2601.20927}.


