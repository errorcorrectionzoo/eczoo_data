code_id: galois_3_1_2
physical: galois
logical: galois

name: '\([[3,1,2]]_4\) Galois-qudit code'
introduced: '\cite{doi:10.1016/0097-3165(78)90021-3,arxiv:2601.20927}'

description: |
  Three-Galois-qudit CSS code over \(\mathbb{F}_4=\{0,1,\omega,\omega^2\}\) that encodes one logical Galois qudit and detects a single-qudit error.

  Its \(X\)- and \(Z\)-type stabilizer check matrices are both
  \begin{align}
    H_X=H_Z=\begin{pmatrix}1&\omega&\omega^2\end{pmatrix}~.
  \end{align}
  Since the code is \(\mathbb{F}_4\)-linear, multiplication of this row by \(\omega\) or \(\omega^2\) also yields stabilizers \cite{arxiv:2601.20927}.

  The code is the smallest member of a family of \(\mathbb{F}_4\)-linear CSS quantum QR codes used in the binarization-and-concatenation construction of phantom qubit codes \cite{arxiv:2601.20927}.

protection: 'Detects a single Galois-qudit error. It is a quantum MDS code, saturating the quantum Singleton bound.'

relations:
  parents:
    - code_id: galois_quad_residue
      detail: 'The \([[3,1,2]]_4\) code is the smallest \(\mathbb{F}_4\)-linear CSS quantum QR code in the construction of Ref. \cite{arxiv:2601.20927}.'
    - code_id: quantum_mds
      detail: 'The \([[3,1,2]]_4\) code saturates the quantum Singleton bound.'
    - code_id: small_distance_quantum
  cousins:
    - code_id: reed_solomon_4
      detail: 'Puncturing the \([4,2,3]_4\) RS\(_4\) code yields a \([3,2,2]_4\) code whose dual is generated by \((1,\omega,\omega^2)\), the parity-check row used for both \(X\)- and \(Z\)-type stabilizers of the \([[3,1,2]]_4\) code.'
    - code_id: stab_6_2_2
      detail: 'Binarizing the \([[3,1,2]]_4\) code in the self-dual normal basis \(\{\omega,\omega^2\}\) yields a \([[6,2,2]]\) qubit CSS code equivalent to the \(C_6\) code after the qubit relabeling \((2\,3\,4\,5\,6)\) \cite{arxiv:2601.20927}.'
    - code_id: carbon
      detail: 'Binarizing this code and concatenating each qubit pair with the \([[4,2,2]]\) code yields the \([[12,2,4]]\) carbon code \cite{arxiv:2601.20927}.'


