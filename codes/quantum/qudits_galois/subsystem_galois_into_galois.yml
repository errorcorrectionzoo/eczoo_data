code_id: subsystem_galois_into_galois
physical: galois
logical: galois

name: 'Subsystem Galois-qudit code'

alternative_names:
  - 'Gauge Galois-qudit code'

description: |
  Subsystem QECC encoding into a \(q^n\)-dimensional Hilbert space consisting of \(n\) Galois qudits.


relations:
  parents:
    - code_id: subsystem_group_quantum
      detail: |
        A Galois qudit for \(q=p^m\) can be decomposed into a Kronecker product of \(m\) modular qudits \cite{doi:10.1109/18.959288}; see \cite[Sec. 5.3]{arxiv:quant-ph/0501074}.
        Interpreted this way, subsystem Galois-qudit codes are subsystem group quantum codes whose physical spaces are constructed using Galois fields \(\mathbb{F}_q\) as groups. More general versions of such qudits can be valued in a Galois ring \cite{arxiv:2501.18968}, over which there also exists a Fourier transform \cite{arxiv:0904.2560}.
  cousins:
    - code_id: galois_into_galois
      detail: 'Subsystem Galois-qudit codes reduce to (subspace) Galois-qudit codes when there is no gauge subsystem.'


