code_id: rotor_stabilizer
physical: groups

name: 'Rotor stabilizer code'
introduced: '\cite{arxiv:1409.3208}'

description: |
  Rotor code whose codespace is defined as the common \(+1\) eigenspace of a group of mutually commuting rotor generalized Pauli operators.
  The stabilizer group can be either discrete or continuous, corresponding to modular or linear constraints on angular positions and momenta.
  Both cases can yield finite or infinite logical dimension.
  Exact codewords are non-normalizable, so approximate constructions have to be considered.


relations:
  parents:
    - code_id: rotor
    - code_id: stabilizer
  cousins:
    - code_id: css
      detail: 'A rotor stabilizer code admitting a set of generators such that each generator consists of either angular position or angular momentum operators is a CSS code.'
    - code_id: qudit_stabilizer
      detail: 'By combining the paper''s bounded-phase-space and integer-local-dimension constructions, prime-qudit stabilizer codes can be algebraically imported into rotor-code settings \cite[Sec. 3.2]{arxiv:2303.17000}.'
    - code_id: galois_stabilizer
      detail: 'Galois-qudit stabilizer codes can be imported into integral-domain settings, and rotor codes and their parameters can be obtained through a synthesis of these cases \cite[Thm. 13; Sec. 3.2]{arxiv:2303.17000}.'


