  - 'LDPC Python software library for decoding LDPC and QLDPC codes \cite{arxiv:2005.07016,preset:Roffe22}.'
  - 'Reviews of QLDPC codes provided in Refs. \cite{doi:10.1109/ACCESS.2015.2503267,arxiv:2103.06309,arxiv:2510.14090}.'


relations:
  parents:
    - code_id: qlwc
      detail: 'QLDPC codes are QLWC codes for which the number of stabilizer generators that each site participates in is bounded by a constant as \(n\to\infty\).'
  cousins:
    - code_id: quantum_locally_recoverable
      detail: 'Finite-dimensional block QLDPC stabilizer codes are QLRCs whose locality \(r \leq w\), where \(w\) is the maximum stabilizer-generator weight \cite{arxiv:2311.08653}.'
    - code_id: q-ary_ldpc
      detail: 'Galois-qudit QLDPC codes are quantum analogues of \(q\)-ary LDPC codes.'
    - code_id: topological
      detail: 'Topological codes are not generally defined using Pauli strings or their qudit and bosonic generalizations. However, for appropriate tessellations, the codespace is the ground-state subspace of a geometrically local Hamiltonian. In this sense, topological codes are QLDPC codes. Geometrically local commuting-projector code Hamiltonians on Euclidean manifolds are stable with respect to small perturbations when they satisfy the \hyperref[topic:tqo]{TQO conditions}, meaning that a notion of a phase can be defined \cite{arxiv:1001.4363,arxiv:1001.0344,arxiv:1810.02428,arxiv:2010.15337}.
      This notion can be extended to semi-hyperbolic manifolds \cite{arxiv:2405.19412} and non-geometrically local QLDPC codes exhibiting check soundness \cite{arxiv:2411.01002} (see also \cite{arxiv:2411.02384}).'
    - code_id: dynamic_gen
      detail: 'QLDPC codes can arise from a dynamical process \cite{arxiv:2004.09560}.'
    - code_id: hamiltonian
      detail: 'QLDPC code Hamiltonians can be simulated, with the help of perturbation theory, by two-dimensional Hamiltonians with non-commuting terms whose interactions scale with \(n\) \cite{arxiv:2308.13277}.'


