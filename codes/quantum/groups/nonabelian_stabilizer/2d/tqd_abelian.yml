code_id: tqd_abelian
physical: groups
logical: groups

name: 'Abelian TQD code'
introduced: '\cite{arxiv:1008.0654,arxiv:1211.3695}'

description: |
  TQD code whose codewords realize a 2D Abelian twisted-quantum-double topological order.
  For Abelian TQDs, the corresponding anyon theory is defined by an Abelian group and a group cocycle built from Type-I, Type-II, or Type-III 3-cocycles \cite{arxiv:1211.3695,arxiv:2112.11394,arxiv:2403.12119}.
  Abelian TQDs with Type-I and -II cocycles account for all 2D Abelian topological orders that admit gapped boundaries \cite{arxiv:1008.0654}.
  Abelian TQDs with Type-III cocycles may admit non-Abelian topological orders. 

  Type-I and -II Abelian TQD codes can be realized as modular-qudit lattice stabilizer codes on composite-dimensional qudits by starting from a stack of Abelian quantum double models (it suffices to take \(\prod_i \mathbb{Z}_{N_i^2}\) toric codes for \(G=\prod_i \mathbb{Z}_{N_i}\)) and \hyperref[topic:code-switching]{condensing} certain bosonic anyons \cite{arxiv:2112.11394}.
  Many Abelian TQD code Hamiltonians were originally formulated as commuting-projector models \cite{arxiv:1810.08204,arxiv:2001.11516}.

features:
  encoders:
    - 'Fault-tolerant state-preparation circuits for all non-chiral abelian topological phases \cite{arxiv:2403.12119}.'
  fault_tolerance:
