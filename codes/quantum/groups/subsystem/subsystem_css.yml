code_id: subsystem_css
physical: groups

name: 'Subsystem CSS code'

description: |
  A subsystem stabilizer code admitting a set of gauge-group generators that are either \(Z\)-type or \(X\)-type operators.
  This ensures that the associated stabilizer group is also CSS.


relations:
  parents:
    - code_id: subsystem_stabilizer
  cousins:
    - code_id: css
      detail: 'Subsystem CSS codes reduce to CSS stabilizer codes when there are no gauge degrees of freedom.'


