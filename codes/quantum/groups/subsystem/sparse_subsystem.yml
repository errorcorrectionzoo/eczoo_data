code_id: sparse_subsystem
physical: groups

name: 'QLDPC subsystem code'
introduced: '\cite{arxiv:1411.3334}'

alternative_names:
  - 'Sparse subsystem code'

description: |
  Member of a family of subsystem stabilizer codes for which the number of sites participating in each gauge generator and the number of gauge generators that each site participates in are both bounded by a constant as \(n\to\infty\).
  The stabilizer group may contain generators of unbounded weight, distinguishing these codes from stabilizer codes with bounded-weight generators for which some logical qubits were re-assigned to be gauge qubits.
  Any stabilizer code with stabilizer-generator weights \(w_i\) can be mapped constructively to a sparse subsystem code with the same number of logical qubits and distance, using \(n=O(\sum_i w_i)\) physical qubits and constant-weight gauge generators \cite{arxiv:1411.3334}.

protection: |
  If a Clifford circuit is a fault-tolerant error-detection circuit for an \([[n,k,d]]\) stabilizer code, then the corresponding localized subsystem code has parameters \([[O(|V|),k,d]]\), preserving the base-code distance while replacing the circuit with constant-weight gauge generators \cite{arxiv:1411.3334}.

features:
  rate: |
    There exists a family of QLDPC subsystem codes with \(d = n^{1-\epsilon}\), where \(\epsilon = O(1/\sqrt{\log n})\) \cite{arxiv:1411.3334}.
    Spatially local subsystem codes also exist in \(D\geq 2\) dimensions with \(d = n^{1-\epsilon-1/D}\), where \(\epsilon = O(1/\sqrt{\log n})\), nearly saturating the \hyperref[topic:subsystem-bt-bound]{subsystem BT bound} \cite{arxiv:1411.3334}.
  fault_tolerance:
    - 'The original construction uses a modified DiVincenzo-Shor cat-state syndrome-measurement gadget with expander-graph parity checks, yielding \(O(w)\)-size gadgets for weight-\(w\) stabilizers that act on at most ten wires at a time \cite{arxiv:1411.3334}.'


relations:
  parents:
    - code_id: subsystem_stabilizer
  cousins:
    - code_id: general_qldpc
      detail: 'QLDPC subsystem codes reduce to QLDPC codes when there are no gauge degrees of freedom.'


