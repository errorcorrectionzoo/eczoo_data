  cousins:
    - code_id: binary_linear
      detail: 'Linear binary codes can be used to construct LCA stabilizer codes \cite{arxiv:2508.04819}.'
    - code_id: eeight
      detail: 'Integer symplectic matrices like the symplectic \(E_8\) generator matrix can be used to construct LCA stabilizer codes \cite{arxiv:2508.04819}.'
    - code_id: group_gkp
      detail: 'Simple single-mode single-qudit LCA codes are Abelian group-GKP codes with \(Kc \mathbb{Z} \subset \mathbb{Z} \subset \mathbb{R} \times \mathbb{Z}_c\), where the logical dimension \(K\) is coprime to the physical qudit dimension \(c\) \cite{arxiv:2508.04819}.'


