code_id: cage_net
physical: categories
logical: categories

name: 'Cage-net code'
introduced: '\cite{arxiv:1806.04687,arxiv:1812.01613}'

alternative_names:
  - 'String-membrane-net code'

description: |
  A commuting-projector code family obtained by coupling layers of two-dimensional topological orders and condensing extended one-dimensional flux strings \cite{arxiv:1806.04687}.
  A modern lattice realization starts from isotropic stacks of \(G\)-graded string-net models \cite{arxiv:2505.13604}.
  The family includes stabilizer examples such as the \(\mathbb{Z}_2\) string-membrane-net realization of the X-cube model \cite{arxiv:1812.01613} as well as non-stabilizer examples with non-Abelian restricted-mobility excitations \cite{arxiv:1806.04687}.
  String-membrane-net and cage-net constructions can realize the same fracton phases; for isotropic stacks, this equivalence can be understood via generalized local unitaries \cite{arxiv:2505.13604}.
  The cage-net construction can be used to realize various fracton phases, stabilizer and otherwise.

