code_id: kitaev_honeycomb
physical: qubits
logical: qubits

name: 'Kitaev honeycomb code'
introduced: '\cite{arxiv:cond-mat/0506438,arxiv:1012.0425,arxiv:2211.03798}'

description: |
  Subsystem qubit stabilizer code underlying the Kitaev honeycomb model \cite{arxiv:cond-mat/0506438,arxiv:1012.0425}.
  Its gauge generators are the two-qubit \(XX\), \(YY\), and \(ZZ\) link operators on the three edge types of the honeycomb lattice \cite[Sec. 3.2]{arxiv:1012.0425}.
  Its stabilizer group is generated by loop operators, and syndrome extraction can be reduced to ordered measurements of the two-qubit link operators \cite[Sec. 3.2]{arxiv:1012.0425}.
  This is the \(q=2\) instance of the \(\mathbb{Z}_q^{(1)}\) subsystem code and does not encode any logical qubits \cite{arxiv:1012.0425}\cite[Sec. 7.3]{arxiv:2211.03798}.

  The original Kitaev honeycomb spin model is exactly solvable by mapping spins to Majorana fermions in a static \(\mathbb{Z}_2\) gauge field, yielding three gapped \(A\) phases and one gapless \(B\) phase \cite{arxiv:cond-mat/0506438}.
  Its ground state lies in the vortex-free sector, and the gapped \(A\) phases realize Abelian \(\mathbb{Z}_2\) topological order \cite{arxiv:cond-mat/0506438}.


features:
  encoders:
    - 'The geometric entanglement measure of a ground state of the Kitaev honeycomb model and any state with anomalous one-form symmetry scales as \hyperref[topic:asymptotics]{order} \(\Omega(n)\) \cite{arxiv:2405.07970}.'

realizations:
  - 'Neutral atom arrays: realized on a 72 qubit device with 32 ancillas by the Lukin group, where a fermion-into-qubit mapping was used to recast this model in terms of simulated fermionic degrees of freedom and simulate other fermionic Hamiltonians \cite{arxiv:2501.18554}.'
  - 'Superconducting qubits: driven version of the Kitaev honeycomb model \cite{arxiv:1701.01440} realized by the Pollmann group on the Sycamore and Willow devices by Google Quantum AI \cite{arxiv:2501.18461}.'

relations:
  parents:
    - code_id: qubit_subsystem_stabilizer
    - code_id: qudit_znone
      detail: 'The Kitaev honeycomb code is the \(q=2\) instance of the \(\mathbb{Z}_q^{(1)}\) subsystem code \cite[Sec. 7.3]{arxiv:2211.03798}.'
  cousins:
    - code_id: tetron
      detail: 'Embedding each physical qubit into two fermions via the tetron code is useful for exactly solving the Kitaev honeycomb model Hamiltonian \cite{arxiv:cond-mat/0506438} and other qubit Hamiltonians on certain graphs \cite{arxiv:2003.05465,arxiv:2012.07857}.'
    - code_id: 2d_bosonization
      detail: 'Embedding each physical qubit into two fermions via the tetron code is useful for exactly solving the Kitaev honeycomb model Hamiltonian \cite{arxiv:cond-mat/0506438} and other qubit Hamiltonians on certain graphs \cite{arxiv:2003.05465,arxiv:2012.07857}. When done in reverse, this embedding can be thought of as a 2D bosonization fermion-into-qubit encoding by converting to a relabeled square lattice and performing single-qubit rotations \cite{arxiv:1711.00515}\cite[Sec. IV.B]{arxiv:2201.05153}.'
    - code_id: surface
      detail: 'The Kitaev honeycomb code can be obtained from the square-lattice surface code by \hyperref[topic:gauging-out]{gauging out} the anyon \(em\) \cite[Sec. 7.3]{arxiv:2211.03798}. During this process, the square lattice is effectively expanded to a honeycomb tiling \cite[Fig. 12]{arxiv:2211.03798}.'
    - code_id: honeycomb
      detail: 'The Kitaev honeycomb code is defined on the honeycomb tiling.'


