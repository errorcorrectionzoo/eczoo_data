code_id: subsystem_color
physical: qubits
logical: qubits

# general class encapsulating capped and doubled, so not necessarily translation invariant. Consider peeling off original lattice codes to separate entries
name: 'Subsystem color code'
introduced: '\cite{arxiv:0908.4246,arxiv:1311.0879}'

alternative_names:
  - 'Gauge color code'

description: |
  A subsystem version of the color code.
  Examples include 2D subsystem color codes obtained by expanding the vertices of a two-colex embedded in a surface of genus \(g\), where each vertex is split into a triangle and each edge into a pair of edges.
  More generally, gauge color codes form a \((d,e)\) family on punctured \(D\)-colexes, or equivalently on suitably colored simplicial \(D\)-balls, encoding one logical qubit and interpolating between conventional and subsystem color codes via gauge fixing \cite{arxiv:1311.0879}.
  The stabilizer group may contain generators of unbounded weight, distinguishing these codes from stabilizer codes with bounded-weight generators for which some logical qubits were re-assigned to be gauge qubits.


features:
  transversal_gates:
    - 'For a \(D\)-dimensional \((d,e)\) gauge color code, \(CNOT\) is transversal, Hadamard is transversal when \(d=e\), and \(R_n=\operatorname{diag}(1,e^{2\pi i/2^n})\) is transversal whenever \(D \geq n(D-e)\) \cite{arxiv:1311.0879}.'
  fault_tolerance:
    - 'Gauge fixing between subsystem color codes defined on the same lattice can be implemented using local measurements and classical processing analogous to error correction \cite{arxiv:1311.0879}.'
  decoders:
    - 'Clustering decoder \cite{arxiv:1503.08217}.'
    - 'Erasure decoder \cite{doi:10.1109/ITW46852.2021.9457583}.'
    - 'Gauge-fixing decoders \cite{arxiv:2111.14594,doi:10.1109/ITW46852.2021.9457583}.'


relations:
  parents:
    - code_id: subsystem_css
    - code_id: qudit_subsystem_color
      detail: 'Modular-qudit subsystem color codes reduce to subsystem color codes for \(q=2\).'
  cousins:
    - code_id: color
      detail: 'Gauge fixing relates subsystem color codes to conventional color codes defined on the same lattice \cite{arxiv:1311.0879}.'
    - code_id: hybrid_stabilizer
      detail: 'A 15-qubit subsystem color code can be converted into a hybrid stabilizer code by converting some of its components to classical bits \cite{arxiv:2411.14389}.'
    - code_id: eastab
      detail: 'A 15-qubit subsystem color code can be converted into an EA qubit stabilizer code by converting some of its components to ebits \cite{arxiv:2411.14389}.'



