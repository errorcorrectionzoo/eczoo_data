code_id: 3d_subsystem_color
physical: qubits
logical: qubits

name: '3D subsystem color code'
introduced: '\cite{arxiv:1311.0879}'

alternative_names:
  - '3D gauge color code'

description: |
  A subsystem version of the 3D color code defined on a 3-colex.

  In the tetrahedral subsystem family introduced in \cite{arxiv:1311.0879}, qubits live on tetrahedra, boundary triangles, boundary edges, and boundary vertices of a colored tetrahedron, and the code encodes one logical qubit.
  Gauge generators can be chosen to have weight four or six, while the corresponding stabilizer generators can be much larger.

features:
  transversal_gates:
    - 'For the \((1,1)\) member, \(CNOT\) and Hadamard are transversal; gauge fixing to the \((1,2)\) code enables a transversal \(R_3\) gate, yielding a universal gate set without encoded ancillas \cite{arxiv:1311.0879}.'
  fault_tolerance:
    - 'In the tetrahedral subsystem family, syndrome extraction can use 4- or 6-qubit gauge checks instead of directly measuring larger stabilizers, and gauge fixing uses only local quantum operations plus classical processing \cite{arxiv:1311.0879}.'
  threshold:
    - 'Phenomenological noise: \(0.31\%\) under clustering decoder \cite{arxiv:1503.08217}.'


# https://www.wikiwand.com/en/Truncated_rhombic_dodecahedron
relations:
  parents:
    - code_id: subsystem_color
    - code_id: translationally_invariant_subsystem
  cousins:
    - code_id: 3d_color
      detail: 'On a fixed 3D lattice, the 3D subsystem color code is gauge-related to the 3D color code; switching between the \((1,1)\) and \((1,2)\) members yields transversal \(CNOT\), \(H\), and \(R_3\) gates \cite{arxiv:1311.0879}.'
    - code_id: single_shot
      detail: 'The 3D subsystem color code defined on the cube-truncated rhombic dodecahedral honeycomb, i.e., a tesselation of cubes and chamfered cubes (a.k.a. tetratruncated rhombic dodecahedra) \cite[Fig. 1]{arxiv:1503.08217}, is a single-shot code \cite{arxiv:1404.5504,arxiv:1503.08217}.'
    - code_id: symmetry_protected_self_correct
      detail: |
        A particular gauge-fixed version of a subsystem code on a 3D lattice yields a self-correcting memory protected by one-form symmetries \cite[Sec. IV D]{arxiv:1805.01474}\cite{arxiv:1805.01836}.
        The symmetric energy barrier grows linearly with the length of a side of the lattice. When the system is coupled locally to a thermal bath respecting the symmetry and below a critical temperature, the memory time grows exponentially with the side length.
        The subsystem color code is not a self-correcting quantum memory if symmetry protection is removed \cite{arxiv:2305.06389}.
    - code_id: 3d_surface
      detail: 'The 3D subsystem color code can be ungauged \cite{arxiv:1202.3120,arxiv:1407.1025,arxiv:1603.04442,arxiv:1603.05182,arxiv:1605.01640,arxiv:1805.01836,arxiv:1806.08679,arXiv:2108.11402,arxiv:2310.16032,arxiv:2410.02213} to obtain six copies of \(\mathbb{Z}_2\) gauge theory with one-form symmetries \cite{arxiv:1805.01836}.'
    - code_id: spt
      detail: 'Ungauging \cite{arxiv:1202.3120,arxiv:1407.1025,arxiv:1603.04442,arxiv:1603.05182,arxiv:1605.01640,arxiv:1805.01836,arxiv:1806.08679,arXiv:2108.11402,arxiv:2310.16032,arxiv:2410.02213} different stabilizer Hamiltonians of the 3D subsystem color code yields distinct SPT phases; in particular, one ungauges to three decoupled copies of the RBH model \cite{arxiv:1805.01836}.'
    - code_id: rbh
      detail: |
        Different stabilizer Hamiltonians of the 3D subsystem color code correspond to distinct SPT phases; one ungauges to three decoupled copies of the RBH model \cite{arxiv:1805.01836}.
        The RBH code for a certain boundary Hamiltonian is dual to the 3D subsystem color code \cite[Sec. IV.C.1]{arxiv:1805.01474}.


