code_id: 3d_bacon_shor
physical: qubits
logical: qubits

name: '3D Bacon-Shor code'
introduced: '\cite{arxiv:quant-ph/0506023}'

description: |
  Generalization of the Bacon-Shor code to three dimensions that was conjectured to be a self-correcting memory.
  It is defined on a cubic lattice and admits sheet-like stabilizer generators.
  The Bravyi-Terhal no-go theorem does not rule it out, and explicitly leaves open the possibility of self-correction in 3D subsystem-code models such as this one \cite{arxiv:0810.1983}.

protection: |
  On an \(L\times L\times L\) cubic lattice, the symmetric family has parameters \([[L^3,1,L]]\) \cite{arxiv:quant-ph/0506023}.
  It remains a candidate rather than a proven self-correcting quantum memory \cite{arxiv:0810.1983}.



features:
  transversal_gates:
    - 'Logical \(CCZ\) gates on three codeblocks of different orientations \cite{arxiv:1705.01686}.'
  threshold:
    - 'The 3D Bacon-Shor code has two entanglement transitions \cite{arxiv:2405.14927}.'


relations:
