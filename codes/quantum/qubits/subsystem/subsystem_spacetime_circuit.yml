code_id: subsystem_spacetime_circuit
physical: qubits
logical: qubits

name: 'Subsystem spacetime circuit code'
introduced: '\cite{arxiv:1411.3334,arxiv:2210.15844}'

description: |
  Subsystem stabilizer code obtained from a spacetime circuit code by \hyperref[topic:gauging-out]{gauging out} logical operators that correspond to circuit faults with trivial effect \cite[Sec. 5.4]{arxiv:2304.05943}.
  In the original circuit-to-code construction, each circuit element is replaced by low-weight gauge generators enforcing its input-output relations, yielding subsystem codes from restricted Clifford postselection circuits \cite{arxiv:1411.3334}.

  An \([[n,k,d]]\) stabilizer code can be mapped into a sparse subsystem code with the same \(k\) and \(d\) as follows.
  One can take the fault-tolerant syndrome extraction circuit associated with the stabilizer code, construct its spacetime circuit code, and then \hyperref[topic:gauging-out]{gauge out} qubits corresponding to trivial faults.
  The subsystem code can be made geometrically local at the cost of more ancilla qubits \cite{arxiv:1411.3334}.

protection: |
  When derived from a fault-tolerant error-detecting circuit for an \([[n,k,d]]\) stabilizer code, the resulting subsystem spacetime circuit code has parameters \([[O(|V|),k,d]]\), so the base-code distance is preserved \cite{arxiv:1411.3334}.

features:
  rate: 'The spacetime circuit code construction is used to show the existence of spatially local subsystem codes that nearly saturate the \hyperref[topic:subsystem-bt-bound]{subsystem BT bound} \cite{arxiv:1411.3334}.'

  fault_tolerance:
    - 'Fault-tolerant measurement gadget that is a modification based on the DiVincenzo-Shor cat-state method \cite{arxiv:quant-ph/9605011,	arxiv:quant-ph/9605031}.'
    - 'The original construction uses \(\ket{+}\)-state vertex qubits together with expander-graph parity checks to obtain \(O(w)\)-size postselection gadgets for measuring weight-\(w\) stabilizers, with gates acting on at most ten wires \cite{arxiv:1411.3334}.'

relations:
  parents:
    - code_id: qubit_subsystem_stabilizer
    - code_id: sparse_subsystem
  cousins:
    - code_id: spacetime_circuit
      detail: 'Spacetime circuit codes can yield subsystem spacetime circuit codes by \hyperref[topic:gauging-out]{gauging out} a subgroup of the logical \hyperref[topic:pauli]{Pauli group} which causes trivial faults in the corresponding \hyperref[topic:clifford]{Clifford circuit}.
      This construction is used to show the existence of geometrically local subsystem codes that nearly saturate the \hyperref[topic:subsystem-bt-bound]{subsystem BT bound} \cite{arxiv:1411.3334}.'


