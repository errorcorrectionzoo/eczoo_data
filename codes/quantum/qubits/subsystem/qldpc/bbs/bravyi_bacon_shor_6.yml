code_id: bravyi_bacon_shor_6
physical: qubits
logical: qubits

name: '\([[6,2,3,2]]\) BBS code'
introduced: '\cite{arxiv:1008.1029}'

description: |
  Error-detecting six-qubit BBS subsystem code with parameters \([[6,2,3,2]]\) that can suppress errors in adiabatic quantum computation \cite{arxiv:1511.01997}.

  The code is defined by the \(3\times 3\) binary matrix
  \begin{align}
  A = \begin{pmatrix} 1 & 1 & 0 \\ 0 & 1 & 1 \\ 1 & 0 & 1 \end{pmatrix},
  \end{align}
  with physical qubits placed at the six nonzero entries of \(A\) and labeled \(1\)–\(6\) in row-major order \cite{arxiv:1008.1029}.
  The gauge generators (exluding phases) are
  \begin{align}
  \begin{array}{cccccc}
    X & X & I & I & I & I \\
    I & I & X & X & I & I \\
    I & I & I & I & X & X \\
    Z & I & I & I & Z & I \\
    I & Z & Z & I & I & I \\
    I & I & I & Z & I & Z
  \end{array}~,
  \end{align}
  where each \(XX\) row corresponds to a same-row pair in \(A\) and each \(ZZ\) row to a same-column pair.

protection: |
  This code detects arbitrary single-qubit errors and is used as an error-suppressing encoding with non-commuting two-local Hamiltonian terms built from gauge generators \cite{arxiv:1511.01997}.
  For the symmetric choice of coefficients considered in \cite{arxiv:1511.01997}, the resulting two-local suppression Hamiltonian has energy separation \(4-2\sqrt{3}\).

features:
  general_gates:
    - 'When both logical qubits are encoded in the same block, \(X_{L1}X_{L2}\) and \(Z_{L1}Z_{L2}\) are implementable using two-local physical interactions up to stabilizers \cite{arxiv:1511.01997}.'


relations:
  parents:
