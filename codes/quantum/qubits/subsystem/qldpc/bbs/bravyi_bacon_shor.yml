code_id: bravyi_bacon_shor
physical: qubits
logical: qubits

name: 'Bravyi-Bacon-Shor (BBS) code'
short_name: 'BBS'
introduced: '\cite{arxiv:1008.1029}'

alternative_names:
  - 'Generalized Bacon-Shor code'

description: 'A CSS subsystem stabilizer code generalizing Bacon-Shor codes to a larger set of qubit geometries. Defined through a binary matrix \(A\) such that physical qubits live on sites \((i,j)\) whenever \(A_{i,j}=1\). The gauge group is generated by 2-qubit operators, including \(XX\) interactions between any two qubits sharing a column in \(A\), and \(ZZ\) interactions between any two qubits sharing a row.'

protection: 'The code parameters are \(n=\sum_{i,j}A_{i,j}\), \(k=\text{rank}(A)\), and \(d\) is the minimum of the distances of the linear binary codes generated by the rows and columns of \(A\) \cite{arxiv:1008.1029}.'

features:
  rate: 'A class of BBS codes \cite{arxiv:1901.06319} saturate the subsystem bound \(kd = O(n)\) \cite{arxiv:1008.1029}.'


relations:
  parents:
    - code_id: subsystem_css
  cousins:
    - code_id: subsystem_quantum_parity
      detail: |
        The BBS code construction can utilize different classical codes in different rows and columns of \(A\), while the subsystem construction does not; see \cite[pg. 4]{arxiv:1008.1029}.
        Subsystem hypergraph product and BBS codes have been numerically compared \cite{arxiv:2002.06257}.


