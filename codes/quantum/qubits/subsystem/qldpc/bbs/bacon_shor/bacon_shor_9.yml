code_id: bacon_shor_9
physical: qubits
logical: qubits

name: '\([[9,1,4,3]]\) Nine-qubit Bacon-Shor code'
short_name: 'Nine-qubit Bacon-Shor'
introduced: '\cite{doi:10.1103/PhysRevA.52.R2493,arxiv:quant-ph/0506023}'

description: |
  Error-correcting nine-qubit subsystem stabilizer code encoding one logical qubit and four gauge qubits.
  There are exactly four inequivalent CSS gauge fixings of the code, including the \hyperref[code:shor_nine]{Shor code} and the \hyperref[code:surface-17]{surface-17 code} \cite{arxiv:2501.17447}.

  The stabilizer subgroup is generated by
  \begin{align}
    \begin{array}{ccccccccc}
      X & X & X & X & X & X & I & I & I\\
      I & I & I & X & X & X & X & X & X\\
      Z & Z & I & Z & Z & I & Z & Z & I\\
      I & Z & Z & I & Z & Z & I & Z & Z
    \end{array}~,
  \end{align}
  while a convenient generating set for the gauge group is completed by the eight weight-two gauge operators
  \begin{align}
    \begin{array}{ccccccccc}
    X & I & I & X & I & I & I & I & I\\
    I & X & I & I & X & I & I & I & I\\
    I & I & I & X & I & I & X & I & I\\
    I & I & I & I & X & I & I & X & I\\
    Z & Z & I & I & I & I & I & I & I\\
    I & I & I & Z & Z & I & I & I & I\\
    I & Z & Z & I & I & I & I & I & I\\
    I & I & I & I & Z & Z & I & I & I
    \end{array}~.
  \end{align}
  If the physical qubits are arranged in a three-by-three square, the \(Z\)-type (\(X\)-type) gauge operators are supported on qubits in the same row (column). 
  The code reduces to the \hyperref[code:shor_nine]{Shor code} for a particular gauge configuration.

features:
  decoders:
    - 'Message passing for \([[9,1,4,3]]\) Bacon-Shor code \cite{arxiv:0806.2188}.'
  code_capacity_threshold:
    - '\(2.02 \times 10^{-5}\) \hyperref[topic:computational-threshold]{concatenated threshold} for the recursively concatenated code \cite{arxiv:0805.4213}.'


realizations:
  - 'Trapped-ion qubits: state preparation, logical measurement, and syndrome extraction (deferred to the end) demonstrated on a 13-qubit device by M. Cetina and C. Monroe groups \cite{arxiv:2009.11482}.'
  - 'Neutral atom arrays: repeated error correction demonstrated on a device by Atom Computing \cite{arxiv:2411.11822}.'


relations:
  parents:
    - code_id: bacon_shor
      detail: 'The nine-qubit Bacon-Shor code is the shortest error-correcting Bacon-Shor code.'
  cousins:
    - code_id: shor_nine
      detail: 'The Shor code is a CSS gauge fixing of the nine-qubit Bacon-Shor code \cite{arxiv:2501.17447}.'
    - code_id: surface-17
      detail: 'The \([[9,1,3]]\) rotated surface code is a CSS gauge fixing of the nine-qubit Bacon-Shor code \cite{arxiv:2501.17447}.'
    - code_id: small_distance_qubit_stabilizer


