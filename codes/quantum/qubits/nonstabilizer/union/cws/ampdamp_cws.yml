code_id: ampdamp_cws
physical: qubits
logical: qubits

name: 'Amplitude-damping CWS code'
introduced: '\cite{arxiv:0907.5149}'

description: |
  Self-complementary CWS code that is designed to detect and correct \hyperref[topic:ad]{AD} errors.

  Ref. \cite{arxiv:0907.5149} constructs such codes by starting from classical self-complementary single-error-correcting codes for the binary asymmetric channel and lifting them to quantum codewords of the form \(|u\rangle+|\overline{u}\rangle\).
  In particular, the paper uses nonlinear Constantin-Rao and related Varshamov-Tenengol'ts codes, and also a binary-to-ternary mapping to obtain improved families for short block lengths.

features:
  encoders:
    - 'Because the resulting codes are of CWS type, encoding circuits can be obtained from the underlying CWS construction \cite{arxiv:0907.5149}.'
  decoders:
    - 'Because the resulting codes are of CWS type, decoding circuits can be obtained from the underlying CWS construction \cite{arxiv:0907.5149}.'


