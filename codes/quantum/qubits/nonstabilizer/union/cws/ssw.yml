code_id: ssw
physical: qubits
logical: qubits

name: 'Smolin-Smith-Wehner (SSW) code'
short_name: 'SSW'
introduced: '\cite{arxiv:quant-ph/0701065,doi:10.1090/S0002-9947-07-04242-0}'

description: |
  A family of \(((n=4k+2l+3,M_{k,l},2))\) self-complementary CWS codes, where \(M_{k,l} \approx 2^{n-2}(1-\sqrt{2/(\pi(n-1))})\).
  For \(n \geq 11\), these codes have a logical subspace whose dimension is larger than that of the largest stabilizer code for the same \(n\) and \(d\).
  Ref. \cite{arxiv:0709.1780} augments a star-graph-based subfamily \(((4n+1,M_n,2))\) by one additional graph-state basis word, yielding \(((4n+1,M_n+1,2))\) codes with \(M_n=2^{4n-1}-\frac{1}{2}\binom{4n}{2n}\).
  In the CWS description of Ref. \cite{arxiv:0708.1021}, the underlying stabilizer state is locally Clifford-equivalent to a GHZ state and its standard-form graph is a star graph.

realizations:
  - 'The \(((5,5,2))\) SSW code has been realized in an NMR device \cite{arxiv:1111.5445}.'


relations:
  parents:
    - code_id: cws
      detail: 'SSW codes can be formulated as CWS codes \cite{arxiv:0708.1021,preset:Cross09}.'
    - code_id: self_complementary
  cousins:
    - code_id: rains
      detail: 'The SSW code outperforms the Rains codes in terms of code parameters at odd \(n > 11\) \cite{arxiv:0708.1021,preset:Cross09}.'


