code_id: rains
physical: qubits
logical: qubits

name: '\(((2m+1,3 \times 2^{2m-3},2))\) Rains code'
introduced: '\cite{arxiv:quant-ph/9703002}'

description: |
  Member of a family of \hyperref[topic:quantum-weight-enumerator]{pure} odd-length distance-two CWS codes with parameters \(((2m+1,3 \times 2^{2m-3},2))\) for all \(m \geq 2\), constructed recursively from the \(((5,6,2))\) code \cite[Lem. 5 and Thm. 4]{arxiv:quant-ph/9704043}\cite[Exam. 8]{arxiv:cs/0610159}\cite{doi:10.1090/S0002-9947-07-04242-0,arxiv:1907.04537}.

relations:
  parents:
    - code_id: cws
      detail: 'The \(((2m+1,3 \times 2^{2m-3},2))\) qubit code family is a CWS family whose graph state is the union of the ring and Bell-pair graphs \cite{arxiv:0708.1021,manual:{A. W. Cross. Fault-tolerant quantum computer architectures using hierarchies of quantum error-correcting codes. PhD thesis, Massachusetts Institute of Technology, 2008.}}.'
    - code_id: small_distance_quantum


