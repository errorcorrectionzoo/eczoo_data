code_id: clifford_hierarchy
physical: qubits
logical: qubits

name: 'Clifford-hierarchy stabilizer code'
introduced: '\cite{arxiv:2511.02900}'

description: |
  A qubit code whose codespace is a joint eigenspace of a subset of operators in the \hyperref[topic:clifford-hierarchy]{Clifford hierarchy}.
  The stabilizing set, which need not be a group, contains Pauli strings and operators at any level \(m\) of the \hyperref[topic:clifford-hierarchy]{Clifford hierarchy}, generalizing qubit stabilizer codes (\(m=1\)) and \textit{Clifford stabilizer codes} (\(m=2\)).

  Clifford-hierarchy codes in \(D\) spatial dimensions include \((D+1)\)-dimensional Dijkgraaf-Witten gauge theories with non-Abelian topological order \cite{arxiv:2511.02900}.
  A \(D\)-dimensional code can be constructed from a twisted \(\mathbb{Z}_2^{D+1}\) gauge theory with Dijkgraaf-Witten twist \((-1)^{\int a_1 \cup a_2 \cup \cdots \cup a_{D+1}}\), where the stabilizers include gates at the \(D\)th level of the Clifford hierarchy in addition to Pauli \(X\) operators.

features:
  transversal_gates:
    - 'A transversal logical \(\text{diag}(1, e^{i2\pi/2^D})\) gate at the \(D\)th level of the Clifford hierarchy in \((D-1)\) spatial dimensions \cite{arxiv:2511.02900}.'


