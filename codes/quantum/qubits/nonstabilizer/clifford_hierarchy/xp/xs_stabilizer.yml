code_id: xs_stabilizer
physical: qubits
logical: qubits

name: 'XS stabilizer code'
introduced: '\cite{arxiv:1404.5327}'

description: |
  A type of stabilizer code where stabilizer generators are elements of the group \( \{\alpha I, X, \sqrt{Z}\}^{\otimes n} \), with \( S = \sqrt{Z} = \text{diag} (1, i)\). The codespace is a joint \(+1\) eigenspace of a set of stabilizer generators, which need not commute to define a valid codespace.

  The phases in the qubit-basis expansion of an XS stabilizer state are polynomials of degree three or below \cite{arxiv:1404.5327}.


relations:
  parents:
    - code_id: xp_stabilizer
      detail: 'The XP stabilizer formalism reduces to the XS formalism at \(N=4\).'
  cousins:
    - code_id: tqd_abelian
      detail: 'Abelian TQD models for the groups \(\mathbb{Z}_2^k\) can be realized as XS stabilizer codes \cite{arxiv:1404.5327}.'
    - code_id: tqd
      detail: 'XS stabilizer codes can also realize non-Abelian TQD phases; in particular, the Type-III \(\mathbb{Z}_2^3\) TQD realizes the same topological order as the ordinary \(G=D_4\) quantum double model \cite{arxiv:hep-th/9511195,arxiv:1508.03468}.'


