      detail: 'Hybrid Bacon-Shor codes are obtained from Bacon-Shor subsystem codes either by gauge fixing gauge qubits into classical registers \cite{arxiv:2012.05896} or by promoting a nontrivial subset of normalizer cosets to classical sectors \cite{arxiv:2304.11442}.'


