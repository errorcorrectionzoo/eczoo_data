code_id: hybrid_bacon_shor
physical: qubits
logical: qubits

name: 'Hybrid Bacon-Shor code'
introduced: '\cite{arxiv:2012.05896,arxiv:2304.11442}'

description: |-
  Family of hybrid qubit codes derived from Bacon-Shor subsystem codes by using their extra gauge structure to store classical information.

  In the earlier gauge-fixing construction, one fixes commuting gauge operators and uses the corresponding gauge qubits to encode classical messages, yielding hybrid stabilizer codes with separate quantum and classical distances \cite{arxiv:2012.05896}.
  For the symmetric \(n\times n\) Bacon-Shor code, this gives the family \([[n^2,1:(n-1)^2,n:2]]_2\), including the \([[9,1:4,3:2]]_2\) code.

  In the later operator-algebra construction, one instead chooses a nontrivial subset \(\mathcal{T}_0\) of coset representatives of the normalizer of the Bacon-Shor stabilizer group inside the Pauli group, so that the classical information is carried by distinct normalizer-coset sectors \cite{arxiv:2304.11442}.
  For the symmetric \(\ell\times\ell\) Bacon-Shor code, choosing \(\mathcal{T}_0\) generated by \(\prod_{i=1}^{\lfloor \ell / 2\rfloor} X_{(2i,1)}\) and \(\prod_{j=1}^{\lfloor \ell / 2\rfloor} Z_{(1,2j-1)}\) yields a \([[\ell^2,1:2,\lceil (\ell-1)/2 \rceil]]\) hybrid Bacon-Shor code, whose smallest nontrivial error-correcting member is the \([[16,1:2,2]]\) code.

protection: |-
  In the gauge-fixing construction, the underlying Bacon-Shor subsystem code retains its quantum distance while the classical distance is determined by the chosen gauge fixing; in particular, the symmetric \(n\times n\) family above has parameters \([[n^2,1:(n-1)^2,n:2]]_2\) \cite{arxiv:2012.05896}.

  In the operator-algebra construction, for the canonical stabilizer generators of the symmetric \(\ell\times\ell\) Bacon-Shor code, each single-qubit Pauli error anti-commutes with at most two \(X\)-type and two \(Z\)-type stabilizer generators.
  Therefore, choosing \(X\)-type and \(Z\)-type coset representatives from classical linear codes \(C_X\) and \(C_Z\) with parameters \([\ell-1,k_X,d_X]\) and \([\ell-1,k_Z,d_Z]\), respectively, yields a hybrid Bacon-Shor code with \(|\mathcal{T}_0|=2^{k_X+k_Z}\) sectors and distance at least
  \begin{align}
    \min\left(\ell,\left\lceil d_X/2 \right\rceil,\left\lceil d_Z/2 \right\rceil\right)~.
  \end{align}
  Choosing both \(C_X\) and \(C_Z\) to be the \([\ell-1,1,\ell-1]\) repetition code saturates this construction and yields the \([[\ell^2,1:2,\lceil (\ell-1)/2 \rceil]]\) family.
  For \(\ell=8\), taking both \(C_X\) and \(C_Z\) to be the \([7,4,3]\) Hamming code yields a \([[64,1:8,2]]\) hybrid Bacon-Shor code \cite{arxiv:2304.11442}.

relations:
