code_id: phantom_11_2_3
physical: qubits
logical: qubits

name: '\([[11,2,3]]\) CSS phantom code'
introduced: '\cite{arxiv:2601.20927}'

description: |
  A distance-three CSS phantom code found by SAT-based code discovery.
  Ref. \cite{arxiv:2601.20927} shows that \(n=11\) is the minimal block length for a \(k=2\), \(d=3\) CSS phantom code.

features:
  general_gates:
    - 'As a CSS phantom code, every ordered-pair in-block logical CNOT gate between its two logical qubits can be implemented by a physical-qubit permutation \cite{arxiv:2601.20927}.'

relations:
  parents:
    - code_id: phantom
      detail: 'Ref. \cite{arxiv:2601.20927} identifies a \([[11,2,3]]\) CSS phantom code and proves that no shorter CSS phantom code has \(k=2\) and \(d=3\).'
    - code_id: small_distance_qubit_stabilizer


