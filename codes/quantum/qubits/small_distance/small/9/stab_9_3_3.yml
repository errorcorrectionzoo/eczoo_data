code_id: stab_9_3_3
physical: qubits
logical: qubits

name: '\([[9,3,3]]\) Quadric code'
introduced: '\cite{doi:10.1137/S0895480104441085,doi:10.2140/iig.2008.6.53}'

description: |
  Nine-qubit \hyperref[topic:quantum-weight-enumerator]{pure} Hermitian qubit code constructed from the almost MDS \([9,3,6]_4\) Hermitian self-orthogonal code.
  It is the only \hyperref[topic:quantum-weight-enumerator]{pure} Hermitian code with its parameters \cite[ID 170235]{arxiv:2501.17447} and is the highest-distance qubit stabilizer code for its \(n\) and \(k\).

  The code can be constructed from the elliptic quadric in \(PG(5, 2)\), or equivalently from the complement of the union of two disjoint hyperovals in \(PG(2, 4)\) \cite{doi:10.2140/iig.2008.6.53}.


