code_id: stab_12_2_2
physical: qubits
logical: qubits

name: '\([[12,2,2]]\) CSS code'
introduced: '\cite{arxiv:2303.15615}'

description: |
  CSS code that admits a logical \(CS\) gate via application of physical \(T\) and \(T^{\dagger}\) gates.

  A stabilizer tableau for the code is given by \cite[Fig. 6]{arxiv:2303.15615}
  \begin{align}
  \begin{array}{cccccccccccc}
    X & X & X & X & I & I & I & I & X & X & X & X \\
    I & I & I & I & X & X & X & X & X & X & X & X \\
    Z & Z & Z & Z & I & I & I & I & I & I & I & I \\
    Z & Z & I & I & Z & Z & I & I & I & I & I & I \\
    Z & I & Z & I & Z & I & Z & I & I & I & I & I \\
    I & Z & Z & I & Z & I & I & Z & I & I & I & I \\
    Z & I & I & I & Z & I & I & I & Z & I & I & I \\
    I & Z & I & I & Z & I & I & I & I & Z & I & I \\
    I & I & Z & I & Z & I & I & I & I & I & Z & I \\
    Z & Z & Z & I & Z & I & I & I & I & I & I & Z
  \end{array}~.
  \end{align}

features:
  transversal_gates:
    - 'Logical \(CS_{01}\) gate via transversal application of \(T\) on qubits \(0,3,4,7,8,11\), \(T^3\) on qubits \(1,2,5,6\), and \(T^7 = T^{\dagger}\) on qubits \(9,10\) \cite[Fig. 6]{arxiv:2303.15615}.'


relations:
  parents:
    - code_id: qubit_css
    - code_id: small_distance_qubit_stabilizer
  cousins:
    - code_id: stab_8_3_2
      detail: 'The \([[12,2,2]]\) CSS code can be obtained by joining two copies of the \([[8,3,2]]\) code at a common face \cite{arxiv:2303.15615}.'


