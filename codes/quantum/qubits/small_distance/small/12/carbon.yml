code_id: carbon
physical: qubits
logical: qubits

name: '\([[12,2,4]]\) carbon code'
short_name: 'Carbon'
introduced: '\cite{arxiv:2404.02280}'

alternative_names:
  - '\(C_{12}\) code'

description: |
  Twelve-qubit CSS code based on Knill's \(C_4/C_6\) scheme \cite{arxiv:2404.02280}.
  Using the concatenation convention of the Zoo, the carbon code can be viewed as a block concatenation with inner code \([[4,2,2]]\) and outer code \(C_6\): three inner \([[4,2,2]]\) blocks encode six intermediate qubits, which are then encoded into two logical qubits by the outer \([[6,2,2]]\) code.

  A stabilizer tableau for the code is given by \cite[Table IV]{arxiv:2404.02280}
  \begin{align}
  \begin{array}{cccccccccccc}
    X & X & X & X & I & I & I & I & I & I & I & I \\
    Z & Z & Z & Z & I & I & I & I & I & I & I & I \\
    I & I & I & I & X & X & X & X & I & I & I & I \\
    I & I & I & I & Z & Z & Z & Z & I & I & I & I \\
    I & I & I & I & I & I & I & I & X & X & X & X \\
    I & I & I & I & I & I & I & I & Z & Z & Z & Z \\
    X & X & I & I & I & X & I & X & X & I & I & X \\
    X & I & I & X & X & X & I & I & I & X & I & X \\
    Z & I & Z & I & I & I & Z & Z & Z & I & I & Z \\
    Z & I & I & Z & Z & I & Z & I & I & I & Z & Z
  \end{array}~.
  \end{align}

features:
  encoders:
    - 'Simplified fault-tolerant state preparation circuits for the \(00\) and \(++\) states \cite{arxiv:2404.02280}.'
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'
    - 'Two-block CNOT gates are transversal because the code is CSS.'
    - 'Automorphism groups of the underlying classical codes can yield transversal \hyperref[topic:clifford]{Clifford gates} when combined with qubit permutations \cite{arxiv:1302.1035}.
    In particular, logical Hadamard is realized by a transversal physical Hadamard followed by a qubit permutation, and a logical one-block CNOT is implemented by a qubit permutation \cite{arxiv:quant-ph/0410199,arxiv:2404.02280}.'

  decoders:
    - 'Syndrome extraction circuit based on Knill error correction (a.k.a. telecorrection \cite{arxiv:quant-ph/0601066}), but using only one ancillary code block instead of two \cite[Fig. 5]{arxiv:2404.02280}.'


realizations:
  - 'Trapped-ion devices: Three rounds of error correction and post-selected fault-tolerant logical Bell-state preparation with logical error rates at least 5 times lower than physical rate on a quantum charge-coupled device (QCCD) \cite{arxiv:2305.03828} by Microsoft and Quantinuum \cite{arxiv:2404.02280}.'


relations:
  parents:
    - code_id: bc_phantom
      detail: 'The carbon code is the B\&C phantom code obtained from the \([[3,1,2]]_4\) Galois-qudit code \cite{arxiv:2601.20927}.'
    - code_id: small_distance_qubit_stabilizer
  cousins:
