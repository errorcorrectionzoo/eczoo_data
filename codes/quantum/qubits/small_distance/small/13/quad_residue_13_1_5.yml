code_id: quad_residue_13_1_5
physical: qubits
logical: qubits

name: '\([[13,1,5]]\) quantum QR code'
introduced: '\cite[pg. 11]{arxiv:quant-ph/9704019}'

description: |
  Thirteen-qubit cyclic Hermitian qubit code derived from a quaternary quadratic-residue code using the Hermitian construction \cite[pg. 11]{arxiv:quant-ph/9704019}\cite{arxiv:2211.00891}.
  The code admits a stabilizer tableau whose rows are cyclic permutations of the Pauli string \(XXZZIZIIIZIZZ\) \cite[ID 67067199e766ad364e845262]{preset:QECDB}.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: stabilizer_over_gf4
    - code_id: galois_quad_residue
    - code_id: small_distance_qubit_stabilizer


