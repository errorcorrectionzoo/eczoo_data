code_id: stab_13_1_5
physical: qubits
logical: qubits

name: '\([[13,1,5]]\) twisted toric code'
introduced: '\cite{arxiv:1108.5490}'
# QECDB id 6706718ae766ad364e845250

description: |
  Thirteen-qubit twisted toric code whose stabilizer tableau consists of cyclic permutations of the \(XZZX\)-type Pauli string \(XIZZIXIIIIIII\).
  The code can be thought of as a small twisted XZZX code \cite[Exam. 11 and Fig. 3]{arxiv:1108.5490}.


features:
  transversal_gates:
    - 'No non-Pauli transversal gates.'

relations:
  parents:
    - code_id: twisted_xzzx
      detail: 'The \([[13,1,5]]\) twisted toric code is a small twisted XZZX toric code \cite[Exam. 11 and Fig. 3]{arxiv:1108.5490}.'
    - code_id: frobenius
    - code_id: stabilizer_over_gf4
      detail: 'The \([[13,1,5]]\) twisted toric code is Hermitian \cite[ID 67067199e766ad364e845262]{preset:QECDB}.'
    - code_id: small_distance_qubit_stabilizer


