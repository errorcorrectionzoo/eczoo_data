code_id: quantum_dodecahedron
physical: qubits
logical: qubits

name: '\([[16,4,3]]\) dodecahedral code'
introduced: '\cite{arxiv:2411.14448}'

description: |
  A \([[16,4,3]]\) non-CSS qubit stabilizer code whose \hyperref[topic:encoder-respecting]{encoder-respecting form} is the graph of vertices of a dodecahedron \cite{arxiv:2411.14448}.

  A stabilizer tableau for the code, obtained from the graph-to-tableau map applied to the dodecahedral graph, is \cite[Fig. 19 and Eq. (10)]{arxiv:2411.14448}
  \begin{align}
  \begin{smallmatrix}
    I & Z & X & Z & I & I & I & I & Z & I & I & I & I & I & I & I \\
    I & I & Z & X & X & Z & I & I & I & Z & I & Z & I & I & I & I \\
    I & I & I & I & Z & X & X & Z & I & I & I & I & Z & I & Z & I \\
    Z & I & I & I & I & I & Z & X & I & I & I & I & I & I & I & Z \\
    X & Z & Z & I & I & I & I & Z & X & I & Z & I & I & I & I & I \\
    Z & X & Z & Z & I & I & I & I & I & X & I & Z & I & I & I & I \\
    I & I & Z & X & I & I & I & I & Z & Z & X & I & Z & I & I & I \\
    I & I & I & I & Z & I & I & I & I & Z & I & X & I & Z & I & I \\
    I & I & I & I & I & Z & I & I & I & I & Z & I & X & I & Z & I \\
    I & I & I & I & Z & X & I & I & I & I & I & Z & Z & X & I & Z \\
    X & Z & I & I & I & I & Z & Z & I & I & I & I & Z & I & X & I \\
    Z & X & Z & I & I & I & I & Z & I & I & I & I & I & Z & I & X
  \end{smallmatrix}~.
  \end{align}

features:
  rate: 'The code has a rate of \(1/4\), higher than that of the five-qubit perfect code.'

  encoders:
    - 'Encoding circuits of depth 5 are possible and optimal; a direct graph-based construction gives depth 6 before further optimization \cite{arxiv:2411.14448}.'

protection: 'The code saturates the paper''s graph degree upper bound on distance, attaining distance 3 on a degree-3 graph \cite{arxiv:2411.14448}.'

relations:
  parents:
    - code_id: small_distance_qubit_stabilizer
  cousins:
