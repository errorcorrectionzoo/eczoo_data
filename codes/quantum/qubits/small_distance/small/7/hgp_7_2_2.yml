code_id: hgp_7_2_2
physical: qubits
logical: qubits

name: '\([[7,2,2]]\) HGP phantom code'
introduced: '\cite{arxiv:2601.20927}'

description: |
  Smallest member of a family of CSS phantom HGP codes obtained from the hypergraph product of a classical simplex code and a repetition code.

  A stabilizer tableau for an equivalent code is given by \cite[ID 521]{preset:qiskit}
  \begin{align}
  \begin{array}{ccccccc}
    Z & Z & I & I & I & I & Z \\
    I & I & Z & I & Z & I & Z \\
    I & I & I & Z & I & Z & Z \\
    I & X & X & X & I & I & X \\
    X & I & I & I & X & X & X
  \end{array}~.
  \end{align}


