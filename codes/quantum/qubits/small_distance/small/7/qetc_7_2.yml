code_id: qetc_7_2
physical: qubits
logical: qubits

name: '\([[7,2,2]]\) QETC'
introduced: '\cite{arxiv:2310.10278}'

description: |
  Seven-qubit \hyperref[topic:quantum-weight-enumerator]{pure} QETC that transmutes all single-qubit Pauli errors to logical phase errors.

  A stabilizer tableau for the code is given by \cite[Table 1]{arxiv:2310.10278}
  \begin{align}
  \begin{array}{ccccccc}
    X & X & Y & Y & Z & I & Z \\
    I & Z & X & Y & Y & X & Y \\
    I & I & I & I & I & Z & Z \\
    Z & Z & I & I & Z & I & Z \\
    Z & Z & Z & Z & I & I & I
  \end{array}~.
  \end{align}
  The above stabilizer tableau is equivalent to \cite[ID 646]{preset:qiskit} by applying \(H\) to qubits 1 and 2 and \(SH\) (with \(H\) applied first) to qubits 3 and 4, followed by the qubit relabeling \((1,2,3,4,5,6,7)\to(5,6,1,3,7,2,4)\).

relations:
  parents:
    - code_id: small_distance_qubit_stabilizer
    - code_id: qetc
  cousins:
    - code_id: bare_7_1_3
      detail: 'The stabilizer group of the \([[7,2,2]]\) QETC, together with the logical-\(Z\) operator on the first logical qubit, generates the stabilizer group of a \([[7,1,3]]\) code \cite{arxiv:2310.10278} equivalent to the bare \([[7,1,3]]\) code \cite{preset:AlbertPC26}.'


