code_id: xz_7_3_2
physical: qubits
logical: qubits

name: '\([[7,3,2]]\) \(X/Z\)-error-correcting code'
introduced: '\cite{arxiv:quant-ph/9705052}'

description: |
  A seven-qubit \hyperref[topic:quantum-weight-enumerator]{pure} CSS code that corrects a single \(X\) or a single \(Z\) error, but not a single \(Y\) error.

  A stabilizer tableau for the code is given by \cite[Table 8.6]{arxiv:quant-ph/9705052}\cite[ID 475]{preset:qiskit}
  \begin{align}
  \begin{array}{ccccccc}
    Z & Z & Z & Z & Z & Z & Z \\
    Y & Y & Y & Y & I & I & I \\
    Y & Y & I & I & Y & Y & I \\
    Y & I & Y & I & Y & I & Y
  \end{array}~.
  \end{align}
  The code is CSS, but the above non-CSS form is required to correct a single \(X\) or a single \(Z\) error.


relations:
