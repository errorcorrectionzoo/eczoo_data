code_id: xz_7_3_2
physical: qubits
logical: qubits

name: '\([[7,3,2]]\) punctured hypercube code'
introduced: '\cite{arxiv:quant-ph/9705052}'

description: |
  A seven-qubit \hyperref[topic:quantum-weight-enumerator]{pure} CSS code that corrects a single \(X\) or a single \(Z\) error, but not a single \(Y\) error.
  It is the punctured version of the \([[8,3,2]]\) hypercube quantum code and is a phantom code \cite{arxiv:2601.20927}.

  A CSS stabilizer tableau for the code is given by \cite[Table 8.6]{arxiv:quant-ph/9705052}\cite[ID 475]{preset:qiskit}
  \begin{align}
  \begin{array}{ccccccc}
    Z & Z & Z & I & I & I & Z \\
    I & Z & I & Z & I & Z & Z \\
    Z & Z & I & I & Z & Z & I \\
    X & X & X & X & X & X & X
  \end{array}~.
  \end{align}

protection: 'Distance two. As the \(k=3\) punctured hypercube code, it saturates the general qubit phantom-code bound \(n\geq 2^k-1\) \cite{arxiv:2604.15111}.'

relations:
  parents:
    - code_id: phantom
      detail: 'This code is the punctured version of the \([[8,3,2]]\) hypercube quantum code and is a phantom code \cite{arxiv:2601.20927}.'
    - code_id: quantum_reed_muller
      detail: 'The punctured hypercube family is a quantum Reed-Muller family built from shortened and punctured classical Reed-Muller codes \cite{arxiv:2604.15111}.'
    - code_id: small_distance_qubit_stabilizer
  cousins:
    - code_id: stab_8_3_2
      detail: 'The \([[7,3,2]]\) code is obtained by puncturing one qubit from the \([[8,3,2]]\) hypercube quantum code \cite{arxiv:2601.20927}.'
    - code_id: hamming743
      detail: 'The \([[7,3,2]]\) punctured hypercube code \(H_X\) check matrix is the parity-check matrix of the \([7,4,3]\) Hamming code, while its \(H_Z\) matrix is that of the SPC code.'
    - code_id: parity_check
      detail: 'The \([[7,3,2]]\) punctured hypercube code \(H_X\) check matrix is the parity-check matrix of the \([7,4,3]\) Hamming code, while its \(H_Z\) matrix is that of the SPC code.'


