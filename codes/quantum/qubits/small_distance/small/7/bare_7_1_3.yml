code_id: bare_7_1_3
physical: qubits
logical: qubits

name: '\([[7,1,3]]\) bare code'
introduced: '\cite{arxiv:1702.01155}'

description: |
  A \([[7,1,3]]\) code that admits fault-tolerant syndrome extraction using only one ancilla per stabilizer generator measurement.

  A stabilizer tableau for the code is given by \cite[ID 108]{preset:qiskit}
  \begin{align}
  \begin{array}{ccccccc}
    X & I & I & I & Z & I & I \\
    I & X & I & I & Z & I & I \\
    I & I & X & I & I & Z & I \\
    I & I & I & X & I & I & Z \\
    I & I & Z & Z & I & Y & Y \\
    Z & Z & Z & I & X & X & Z
  \end{array}~.
  \end{align}
  It is one of sixteen distinct indecomposable \([[7,1,3]]\) codes \cite{arxiv:0709.1780}.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

  decoders:
    - 'Fault-tolerant syndrome extraction using a single ancilla \cite{arxiv:1702.01155}.'

relations:
  parents:
    - code_id: small_distance_qubit_stabilizer


