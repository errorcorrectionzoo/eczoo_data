code_id: twist_defect_7_1_3
physical: qubits
logical: qubits

name: '\([[7,1,3]]\) twist-defect surface code'
introduced: '\cite{arxiv:1612.04795}'

alternative_names:
  - '\([[7,1,3]]\) triangle code'

description: |
  A \([[7,1,3]]\) code (different from the Steane code) that is a small example of a twist-defect surface code.

  It is one of sixteen distinct \([[7,1,3]]\) codes \cite{arxiv:0709.1780}.


protection: |
  Fully fault-tolerant depolarizing-noise designs using \(13\) or \(15\) total qubits, including ancillas, have exREC pseudothresholds of order \(10^{-4}\) \cite{arxiv:1612.04795}.


features:
  transversal_gates:
    - 'Admits certain transversal order-three single-qubit \hyperref[topic:clifford]{Clifford} gates (e.g., \(SH\)) \cite{arxiv:1612.04795}.'
  general_gates:
    - 'Within the triangle-code architecture, supports the full logical \hyperref[topic:clifford]{Clifford group} using lattice surgery, 1-bit teleportation, and patch reorientation \cite{arxiv:1612.04795}.'


relations:
  parents:
    - code_id: triangle_surface
    - code_id: small_distance_qubit_stabilizer


