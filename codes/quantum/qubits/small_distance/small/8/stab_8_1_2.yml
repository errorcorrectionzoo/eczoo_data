code_id: stab_8_1_2
physical: qubits
logical: qubits

name: '\([[8,1,2]]\) Shen-Wang-Cao code'
introduced: '\cite{arxiv:2310.19538}'

description: |
  A stabilizer code that admits a logical \(T\) gate via application of physical \(T\) gates and a \(CZ\)-like gate.

  A stabilizer tableau for the code is given by \cite[ID 980]{preset:qiskit}.
  \begin{align}
  \begin{array}{cccccccc}
    X & X & I & I & X & X & I & I \\
    I & I & X & X & X & X & I & I \\
    I & I & I & I & I & I & X & X \\
    Z & I & I & Z & I & Z & Z & Z \\
    I & Z & I & Z & I & Z & Z & Z \\
    I & I & Z & Z & I & I & I & I \\
    I & I & I & I & Z & Z & I & I
  \end{array}~.
  \end{align}

features:
  transversal_gates:
    - 'Logical \(T\) gate \(\bar{T}=T^{\otimes 6}\otimes K\) via physical \(T\) gates on the first six qubits and the two-qubit gate \(K\propto\cos(\pi/8)(I\otimes I)-i\sin(\pi/8)(Z\otimes Z)\propto\mathrm{diag}(1,e^{i\pi/4},e^{i\pi/4},1)\) on qubits 7 and 8 \cite{arxiv:2310.19538}.'

relations:
  parents:
    - code_id: qubit_css
    - code_id: small_distance_qubit_stabilizer
  cousins:
    - code_id: xp_stabilizer
      detail: 'The \([[8,1,2]]\) code is an XP-regular code that can be obtained via the XP stabilizer formalism applied to the \([[15,1,3]]\) Reed-Muller code \cite{arxiv:2310.19538}.'
    - code_id: stab_15_1_3
      detail: 'The \([[8,1,2]]\) code is an XP-regular code that can be obtained via the XP stabilizer formalism applied to the \([[15,1,3]]\) Reed-Muller code \cite{arxiv:2310.19538}.'
