code_id: stab_8_3_2
physical: qubits
logical: qubits

name: '\([[8,3,2]]\) Smallest interesting color code'
introduced: '\cite{arxiv:1503.02065,manual:{E. Campbell, “The smallest interesting colour code,” Online available at https://earltcampbell.com/2016/09/26/the-smallest-interesting-colour-code/ (2016), accessed on 2019-12-09.}}'

description: |
  Smallest 3D color code whose physical qubits lie on vertices of a cube and which admits a (weakly) transversal \(CCZ\) gate.
  In encoded IQP sampling, the final measurement outcomes determine both the logical sample and stabilizer checks, enabling end-of-circuit error detection or postselected decoding directly from the classical samples \cite{arxiv:2404.19005}.

features:
  transversal_gates:
    - 'CZ gates between any two logical qubits \cite{arxiv:1912.10063} and (weakly) transversal \(CCZ\) gate \cite{arxiv:1503.02065,manual:{E. Campbell, “The smallest interesting colour code,” Online available at https://earltcampbell.com/2016/09/26/the-smallest-interesting-colour-code/ (2016), accessed on 2019-12-09.},arxiv:1912.10063}.'

  general_gates:
    - '\(CCZ\) gate can be distilled in a fault-tolerant manner \cite{arxiv:2007.07929}.'
    - 'Fault-tolerant and teleportation-free logical Hadamard \cite{arxiv:2505.20261}.'

  fault_tolerance:
    - '\(CCZ\) gate can be distilled in a fault-tolerant manner \cite{arxiv:2007.07929}.'
    - 'Fault-tolerant and teleportation-free logical Hadamard \cite{arxiv:2505.20261}.'
    - 'Universal weakly fault-tolerant computation via code switching between this and another \([[8,3,2]]\) CSS code in a postselected error-detecting regime \cite{arxiv:2603.15610}.'
    - 'Fault-tolerant architecture \cite{arxiv:2507.20387}.'
    - 'For hIQP sampling with decoding only in the final measurement round, error-detected \([[8,3,2]]\) circuits outperform the \([[16,3,4]]\) and \([[15,1,3]]\) comparison circuits studied in Ref. \cite{arxiv:2404.19005} under its two-qubit-gate-noise model.'

realizations:
  - 'Trapped ions: one-qubit addition algorithm implemented fault-tolerantly on the Quantinuum H1-1 device \cite{arxiv:2309.09893}. Trapped-ion processor by AQT: measurement-free universal fault-tolerant logical operations and a Grover-search demonstration \cite{arxiv:2506.22600}.'
  - 'Superconducting circuits: fault-tolerant \(CZZ\) gate performed on IBM and IonQ devices \cite{arxiv:2309.08663}.'
  - 'Neutral atom arrays: Lukin group \cite{arxiv:2312.03982}. 48 logical qubits, 228 logical two-qubit gates, 48 logical \(CCZ\) gates, and error detection performed in 16 blocks.
  Circuit outcomes were sampled and cross-entropy (XEB) was calculated to verify quantumness. Logical entanglement entropy was measured \cite{arxiv:2312.03982}.'

relations:
  parents:
    - code_id: 3d_color
      detail: 'The \([[8,3,2]]\) code is the smallest non-trivial 3D color code.'
    - code_id: hypercube_quantum
      detail: 'The \([[8,3,2]]\) code is a hypercube code for \(D=3\).'
    - code_id: xp_stabilizer
      detail: 'As the \(D=3\) member of the hypercube-code family, the \([[8,3,2]]\) code can be viewed as an XP stabilizer code with precision \(N=8\) \cite[Exam. 6.10]{arxiv:2203.00103}.'
    - code_id: campbell_howard
  cousins:
    - code_id: stab_15_1_3
      detail: 'The \([[8,3,2]]\) code can be obtained from a subset of physical qubits of the \([[15,1,3]]\) code \cite{arxiv:2112.01446}.'
    - code_id: 3d_surface
      detail: 'Three cyclically rotated copies of the 3D surface/toric code admit a logical \(CCZ\) gate via transversal physical \(CCZ\) gates, and concatenating each such qubit triple with an \([[8,3,2]]\) block yields a 3D toric/color family with parameters \([[8n,3,2d]]\); its smallest member has parameters \([[72,3,4]]\) \cite{arxiv:2404.19005}.'
    - code_id: qubit_concatenated
      detail: 'Concatenating \([[8,3,2]]\) blocks with triples of qubits drawn from three cyclically rotated 3D surface/toric codes yields a 3D toric/color family with parameters \([[8n,3,2d]]\) and transversal logical \(CCZ\) implemented by physical \(T\) gates on the inner \([[8,3,2]]\) blocks \cite{arxiv:2404.19005}.'


