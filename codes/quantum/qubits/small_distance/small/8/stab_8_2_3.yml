code_id: stab_8_2_3
physical: qubits
logical: qubits

name: '\([[8,2,3]]\) Hermitian code'
introduced: '\cite{arxiv:2008.05051}'

description: |
  A non-CSS Hermitian eight-qubit stabilizer code that has the largest automorphism group of size 1728 
  among the 20 inequivalent \([[8,2,3]]\) codes \cite{arxiv:2501.17447}.
  The code has an exceptionally short fault-tolerant syndrome measurement sequence \cite{arxiv:2008.05051,arxiv:2501.17447}.

  A stabilizer tableau for the code is given by \cite[ID 4947]{preset:qiskit}
  \begin{align}
  \begin{array}{cccccccc}
    Y & Y & I & I & Z & I & I & Z \\
    I & I & X & X & I & Z & Z & I \\
    I & I & Z & Z & I & Y & Y & I \\
    Z & Z & I & I & X & I & I & X \\
    Y & Z & Y & Z & Y & I & Z & I \\
    X & Z & X & Z & I & X & I & Z
  \end{array}~.
  \end{align}

features:
  decoders:
    - 'Short Shor-style syndrome extraction circuits can be used for syndrome-based decoding \cite{arxiv:2008.05051}.'
  fault_tolerance:
    - 'Short Shor-style syndrome extraction circuits can be used for syndrome-based decoding \cite{arxiv:2008.05051}.'

relations:
  parents:
    - code_id: stabilizer_over_gf4
    - code_id: small_distance_qubit_stabilizer


