code_id: stab_10_2_3
physical: qubits
logical: qubits

name: '\([[10,2,3]]\) binarized Galois-qudit code'
introduced: '\cite{arxiv:2601.20927}'

description: |
  CSS code obtained by binarizing a \([[5,1,3]]_4\) Galois-qudit CSS code in the self-dual normal basis \(\{\omega,\omega^2\}\).

  A stabilizer tableau for the binarized code is \cite{arxiv:2601.20927}
  \begin{align}
  \begin{array}{cccccccccc}
    Z & I & Z & I & Z & I & Z & I & I & I \\
    I & Z & I & Z & I & Z & I & Z & I & I \\
    I & I & Z & I & Z & Z & I & Z & Z & I \\
    I & I & I & Z & Z & I & Z & Z & I & Z \\
    X & I & X & I & X & I & X & I & I & I \\
    I & X & I & X & I & X & I & X & I & I \\
    I & I & X & I & I & X & X & X & X & I \\
    I & I & I & X & X & X & X & I & I & X
  \end{array}~.
  \end{align}

features:
  transversal_gates:
    - 'The code is permutation-equivalent to its Hadamard dual: transversal physical Hadamards followed by swapping the two qubits in each binarized \(\mathbb{F}_4\) coordinate preserve the codespace and implement a logical \(H^{\otimes 2}\) up to logical \(\mathrm{SWAP}\). This is the binarized version of the permutation-assisted Hadamard available from plain self-duality of the starting \(q=4\) Galois-qudit CSS code \cite{arxiv:2601.20927}.'

relations:
  parents:
    - code_id: qubit_css
    - code_id: small_distance_qubit_stabilizer
  cousins:
    - code_id: bc_phantom
      detail: 'The binarized \([[10,2,3]]\) code is not phantom, but concatenating each qubit pair with the \([[4,2,2]]\) code yields a \([[20,2,6]]\) B\&C phantom code admitting fold-diagonal logical \(SS\) gates \cite{arxiv:2601.20927}.'
    - code_id: stab_4_2_2
      detail: 'Concatenating each qubit pair of the binarized \([[10,2,3]]\) code with the \([[4,2,2]]\) code yields the \([[20,2,6]]\) B\&C phantom code \cite{arxiv:2601.20927,arxiv:2605.15344}.'


