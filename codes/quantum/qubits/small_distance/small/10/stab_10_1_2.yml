code_id: stab_10_1_2
physical: qubits
logical: qubits

name: '\([[10,1,2]]\) Vasmer-Kubica code'
introduced: '\cite{arxiv:2112.01446}'

description: |
  A stabilizer code obtained by morphing the \([[15,1,3]]\) quantum Reed-Muller code on a subset whose child code is the \([[8,3,2]]\) smallest interesting color code \cite{arxiv:2112.01446}.
  It is the smallest known stabilizer code with a fault-tolerant logical \(T\) gate, implemented via physical \(T\), \(T^{\dagger}\), and \(CCZ\) gates \cite{arxiv:2112.01446}.

features:
  transversal_gates:
    - 'Logical \(T\) gate via application of physical \(T\), \(T^{\dagger}\), and \(CCZ\) gates \cite{arxiv:2112.01446}.'

  general_gates:
    - '10-to-1 magic-state distillation protocol that consumes seven \(|T\rangle\) states and one \(|CCZ\rangle\) state \cite{arxiv:2112.01446}.'

  fault_tolerance:
    - 'A fault-tolerant universal gate set can be obtained via \hyperref[topic:code-switching]{code switching} between the Steane code and the \([[10,1,2]]\) code \cite{arxiv:2403.13732}.'

realizations:
  - 'Trapped-ion devices: fault-tolerant universal gate set via \hyperref[topic:code-switching]{code switching} between the Steane code and the \([[10,1,2]]\) code on a device from the Monz group \cite{arxiv:2403.13732}.'

