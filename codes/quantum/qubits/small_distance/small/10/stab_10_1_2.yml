code_id: stab_10_1_2
physical: qubits
logical: qubits

name: '\([[10,1,2]]\) Vasmer-Kubica code'
introduced: '\cite{arxiv:2112.01446}'

# FT statement based on qiskit database brute force search, but Webster routines spit out only one gate and not all instances, so its not a proof
#    This is the smallest code that implements a fault-tolerant logical \(T\) gate using a diagonal depth-one Clifford circuit \cite{preset:AlbertPC26}.

description: |
  A stabilizer code obtained by morphing the \([[15,1,3]]\) quantum Reed-Muller code on a subset whose child code is the \([[8,3,2]]\) smallest interesting color code \cite{arxiv:2112.01446}.
  It is the smallest known stabilizer code with a fault-tolerant logical \(T\) gate, implemented via physical \(T\), \(T^{\dagger}\), and \(CCZ\) gates \cite{arxiv:2112.01446}.

  A stabilizer tableau for the code is \cite{arxiv:2403.13732}
  \begin{align}
  \begin{array}{cccccccccc}
    X & X & X & X & I & I & I & X & I & I \\
    I & X & X & I & X & X & I & I & X & I \\
    I & I & X & X & I & X & X & I & I & X \\
    Z & Z & Z & Z & I & I & I & I & I & I \\
    I & Z & Z & I & Z & Z & I & I & I & I \\
    I & I & Z & Z & I & Z & Z & I & I & I \\
    I & I & Z & I & I & Z & I & Z & I & I \\
    I & I & Z & Z & I & I & I & I & Z & I \\
    I & Z & Z & I & I & I & I & I & I & Z
  \end{array}~.
  \end{align}
  The minimum-weight logical-\(Z\) representatives are \(Z_1 Z_8\), \(Z_5 Z_9\), and \(Z_7 Z_{10}\), each of weight two, confirming \(d=2\).
  

features:
  general_gates:
    - 'A logical \(\bar{T}\) gate is implemented by applying \(T^{\pm 1}\) to qubits \(1\)--\(7\) and \(CCZ\) to qubits \(8,9,10\) \cite{arxiv:2112.01446}.'
    - '10-to-1 magic-state distillation protocol that consumes seven \(|T\rangle\) states and one \(|CCZ\rangle\) state \cite{arxiv:2112.01446}.'

  fault_tolerance:
    - 'A fault-tolerant universal gate set can be obtained via \hyperref[topic:code-switching]{code switching} between the Steane code and the \([[10,1,2]]\) code \cite{arxiv:2403.13732}.'

realizations:
  - 'Trapped-ion devices: fault-tolerant universal gate set via \hyperref[topic:code-switching]{code switching} between the Steane code and the \([[10,1,2]]\) code on a device from the Monz group \cite{arxiv:2403.13732}.'

