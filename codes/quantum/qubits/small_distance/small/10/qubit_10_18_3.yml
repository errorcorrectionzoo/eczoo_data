code_id: qubit_10_18_3
physical: qubits
logical: qubits

name: '\(((10,18,3))\) qubit code'
introduced: '\cite{arxiv:0708.1021}'

description: |
  Ten-qubit nonadditive CWS code correcting a single-qubit error.
  It outperforms the best ten-qubit stabilizer code with the same distance, whose encoded dimension is \(2^4=16\) \cite{arxiv:0708.1021,arxiv:quant-ph/9608006}.

  In standard CWS form, its word stabilizer is the ten-cycle ring graph generated by cyclic shifts of \(ZXZIIIIIII\), and its \(18\) word operators are obtained from a binary classical code listed in Ref. \cite{arxiv:0708.1021}.

relations:
  parents:
    - code_id: cws
      detail: 'The \(((10,18,3))\) qubit code is a ring-graph CWS code with \(18\) \(Z\)-type word operators built from a binary classical code \cite{arxiv:0708.1021}.'
