code_id: qubit_5_6_2
physical: qubits
logical: qubits

name: '\(((5,6,2))\) qubit code'
introduced: '\cite{arxiv:quant-ph/9703002}'

description: |
  Five-qubit cyclic CWS code detecting a single-qubit error.
  This code has a logical subspace whose dimension is larger than that of the \([[5,2,2]]\) code, the best five-qubit stabilizer code with the same distance \cite{arxiv:0709.1780}.
  In the coding-clique construction of Ref. \cite{arxiv:0709.1780}, it is realized by the five-vertex loop graph \(L_5\), and the corresponding graph realization \((L_5,6,2)\) is unique within that search.

  Its codeword stabilizer consists of all cyclic shifts of \(ZXZII\).
  A standard-form CWS presentation uses the five-cycle graph together with the classical codewords \(00000\), \(11010\), \(01101\), \(10110\), \(01011\), and \(10101\) \cite{arxiv:0708.1021}.
  Its automorphism group is of size 3840 and given in Ref. \cite{arxiv:quant-ph/9703002} (see also \cite[Corr. 18]{arxiv:quant-ph/9704043}).

relations:
  parents:
    - code_id: rains
      detail: 'The \(((5,6,2))\) code is the smallest nontrivial Rains code \cite{arxiv:quant-ph/9704043} (see also \cite[Exam. 8]{arxiv:cs/0610159}\cite{arxiv:0801.0831}).'
    - code_id: arvind
      detail: 'The \(((5,6,2))\) code is the \(((n,1+n(q-1),2))_q\) union stabilizer code for \(n=5\) and \(q=2\) \cite{arxiv:quant-ph/0210097}.'
    - code_id: quantum_cyclic
  cousins:
    - code_id: stab_4_2_2
      detail: 'Tracing out any one qubit of the \(((5,6,2))\) code projector yields a \(((4,4,2))\) code; for this code, all five such partial traces are additive and therefore locally equivalent to the \([[4,2,2]]\) code \cite[Thm. 8 and Corr. 18]{arxiv:quant-ph/9704043}.'


