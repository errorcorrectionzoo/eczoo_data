code_id: stab_5_1_2
physical: qubits
logical: qubits

name: '\([[5,1,2]]\) rotated surface code'

alternative_names:
  - '\([[5,1,2]]\) morphed Steane code'
  - '\([[5,1,2]]\) rotated toric code'
  - '\([[5,1,2]]\) genon code'
  - '\([[5,1,2]]\) holographic code'
  - '\([[5,1,2]]\) planar-perfect code'

# based on qiskit database brute force search
description: |
  A rotated surface code on one rung of a ladder, with one qubit on the rung, and four qubits surrounding it. This is the smallest code that implements a fault-tolerant logical \(S\) gate using a diagonal depth-one Clifford circuit \cite{preset:AlbertPC26}.

  A stabilizer tableau for the code is given by \cite[ID 18]{preset:qiskit}
  \begin{align}
  \begin{array}{ccccc}
    Z & Z & I & Z & I \\
    I & I & Z & Z & Z \\
    I & X & X & X & I \\
    X & I & I & X & X
  \end{array}~.
  \end{align}
  The code is depicted in \ref{figure:512-operators}.

  \begin{figure}
    \includegraphics{stab_5_1_2}
    \caption{
    Stabilizer generators of the \([[5,1,2]]\) rotated surface code.
    The 5 data qubits (circles) consist of 4 corner qubits and 1 center qubit.
    Each triangular region corresponds to a weight-three stabilizer generator.
    Red regions correspond to \(X\) operators while blue regions correspond to \(Z\) operators.}
    \label{figure:512-operators}
  \end{figure}

  A non-CSS genon-code form of the same stabilizer group, local Clifford equivalent to the above via Hadamard on the four corner qubits, is \cite{arxiv:2406.09951}
  \begin{align}
  \begin{array}{ccccc}
    X & X & I & Z & I \\
    I & I & X & Z & X \\
    I & Z & Z & X & I \\
    Z & I & I & X & Z
  \end{array}~.
  \end{align}
  The missing external stabilizer \(YYYIY\) (product of all four generators) forms the back face when the code is viewed as a genon code on a sphere.


features:
  general_gates:
    - 'In the qubit order of the stabilizer tableau above, the physical action \(S_0 S_2 S_3^{\dagger} CZ_{1,4}\) implements the logical gate \(\bar{S}\) \cite[Fig. 1]{arxiv:2112.01446}.'
    - 'Fault-tolerant implementation of the \hyperref[topic:clifford]{single-qubit Clifford group} \cite[Fig. 1]{arxiv:2112.01446}.'
  fault_tolerance:
    - 'Fault-tolerant implementation of the \hyperref[topic:clifford]{single-qubit Clifford group} \cite[Fig. 1]{arxiv:2112.01446}.'


relations:
  parents:
    - code_id: rotated_surface
    - code_id: morphed_diagonal_clifford
      detail: 'The \([[5,1,2]]\) code is a specific instance of the \([[2^r+r-1,1,2]]\) morphed simplex codes with \(r=2\) \cite[Fig. 1]{arxiv:2112.01446}.'
    - code_id: holographic_5_1_2
      detail: 'The \([[5,1,2]]\) rotated surface code is the smallest SCF holographic code \cite{arxiv:2008.10206}.
      The encoding of more general SCF holographic codes is a holographic tensor network consisting of the encoding isometry for the \([[5,1,2]]\) rotated surface code, which is a \hyperref[code:block_perfect]{planar-perfect tensor}.'
    - code_id: block_perfect
      detail: 'The \([[5,1,2]]\) rotated surface code is the smallest SCF holographic code \cite{arxiv:2008.10206}.
      The encoding of more general SCF holographic codes is a holographic tensor network consisting of the encoding isometry for the \([[5,1,2]]\) rotated surface code, which is a \hyperref[code:block_perfect]{planar-perfect tensor}.'
  cousins:
    - code_id: twist_defect_surface
      detail: 'The \([[5,1,2]]\) rotated surface code is a genon code on a sphere, with the missing external \(Y\)-type stabilizer forming the back of the sphere. More generally, any surface code with a single boundary component can be interpreted this way \cite{arxiv:2406.09951}.'
    - code_id: steane
      detail: 'The \([[5,1,2]]\) morphed Steane code is obtained by morphing the Steane code on a region whose child code is a \([[4,2,2]]\) code \cite[Fig. 1]{arxiv:2112.01446}.'
    - code_id: stab_4_2_2
      detail: 'The \([[5,1,2]]\) morphed Steane code is obtained by morphing the Steane code on a region whose child code is a \([[4,2,2]]\) code \cite[Fig. 1]{arxiv:2112.01446}.'


