<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="42mm"
   height="42mm"
   viewBox="4.99999 4.99999 32 32"
   version="1.1"
   id="svg1"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0"
   xmlns="http://www.w3.org/2000/svg">
  <defs id="defs1" />
  <!-- Top triangle: X stabilizer on qubits 1,2,3 (I X X X I) -->
  <polygon
     style="fill:#fae7e7;fill-opacity:1;stroke:none;stroke-width:0.2;stroke-linecap:round"
     points="7,7 35,7 21,21"
     id="poly-top-X" />
  <!-- Right triangle: Z stabilizer on qubits 2,3,4 (I I Z Z Z) -->
  <polygon
     style="fill:#cfdcf5;fill-opacity:1;stroke:none;stroke-width:0.2;stroke-linecap:round"
     points="35,7 35,35 21,21"
     id="poly-right-Z" />
  <!-- Bottom triangle: X stabilizer on qubits 0,3,4 (X I I X X) -->
  <polygon
     style="fill:#fae7e7;fill-opacity:1;stroke:none;stroke-width:0.2;stroke-linecap:round"
     points="35,35 7,35 21,21"
     id="poly-bottom-X" />
  <!-- Left triangle: Z stabilizer on qubits 0,1,3 (Z Z I Z I) -->
  <polygon
     style="fill:#cfdcf5;fill-opacity:1;stroke:none;stroke-width:0.2;stroke-linecap:round"
     points="7,35 7,7 21,21"
     id="poly-left-Z" />
  <!-- Data qubits (circles): layout q1(top-left), q2(top-right), q3(center), q0(bottom-left), q4(bottom-right) -->
  <circle
     style="fill:#808080;fill-opacity:1;stroke:none;stroke-width:0.2;stroke-dasharray:none;stroke-opacity:1"
     cx="7" cy="7" r="2.0" id="q1" />
  <circle
     style="fill:#808080;fill-opacity:1;stroke:none;stroke-width:0.2;stroke-dasharray:none;stroke-opacity:1"
     cx="35" cy="7" r="2.0" id="q2" />
  <circle
     style="fill:#808080;fill-opacity:1;stroke:none;stroke-width:0.2;stroke-dasharray:none;stroke-opacity:1"
     cx="21" cy="21" r="2.0" id="q3" />
  <circle
     style="fill:#808080;fill-opacity:1;stroke:none;stroke-width:0.2;stroke-dasharray:none;stroke-opacity:1"
     cx="7" cy="35" r="2.0" id="q0" />
  <circle
     style="fill:#808080;fill-opacity:1;stroke:none;stroke-width:0.2;stroke-dasharray:none;stroke-opacity:1"
     cx="35" cy="35" r="2.0" id="q4" />
</svg>
