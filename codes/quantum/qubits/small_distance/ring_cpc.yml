code_id: ring_cpc
physical: qubits
logical: qubits

name: '\([[2^r+r, 2^r-r-2, 3]]\) Ring CPC code'
short_name: 'Ring CPC'
introduced: '\cite{arxiv:1611.08012}'

# shortening removes all-ones vector
description: |
  A family of \([[2^r+r, 2^r-r-2, 3]]\) CPC codes for \(r \geq 3\) whose matrices are based on the shortened version of the \([2^r-1,2^r-r-1,3]\) Hamming code.
  See \cite[Thm. 4]{arxiv:1611.08012} for their stabilizer generator matrix.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: cpc
    - code_id: small_distance_qubit_stabilizer
  cousins:
    - code_id: hamming
      detail: 'The ring CPC code is obtained from the shortened Hamming code via the CPC construction \cite{arxiv:1611.08012}.'


