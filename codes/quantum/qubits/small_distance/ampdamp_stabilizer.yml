code_id: ampdamp_stabilizer
physical: qubits
logical: qubits

name: '\([[2(M+1),M]]\) single-loss AD code'
introduced: '\cite{arxiv:0710.1052}'

description: |
  A member of a class of \([[2(M+1),M]]\) CSS codes for \(M\geq 1\) that generalizes the \([[4,1]]\) approximate amplitude-damping code of Ref. \cite{arxiv:quant-ph/9704002}.
  Its \(Z\)-type generators are \(M+1\) pairwise products, with each qubit participating in only one check; the single \(X\)-type generator is the all-\(X\) string.

protection: |
  The \([[2(M+1),M]]\) family is designed to correct a single \hyperref[topic:ad]{AD} error \cite{arxiv:0710.1052}.

relations:
  parents:
    - code_id: qubit_css
    - code_id: self_complementary
      detail: 'The \([[2(M+1),M]]\) single-loss AD code is self-complementary, with the all-\(X\) stabilizer enforcing the complement-pair structure of the codewords \cite{arxiv:0710.1052}.'


