code_id: quantum_cap
physical: qubits
logical: qubits

name: '\([[n,n-2k,4]]\) Quantum cap code'
introduced: '\cite{doi:10.2140/iig.2008.6.53,doi:10.1016/j.disc.2007.12.007,doi:10.1201/9781315371993,arxiv:0905.1059,manual:{J. Bierbrauer, D. Bartoli, S. Marcugini, and F. Pambianco, "Geometric constructions of quantum codes." Error-Correcting Codes, Finite Geometries and Cryptography 523 (2010): 149-154}}'

description: |
  A distance-four \hyperref[topic:quantum-weight-enumerator]{pure} Hermitian qubit code constructed from a Hermitian self-orthogonal \([n,k]_4\) code associated with an \(n\)-cap in \(PG(k-1,4)\).

features:
  rate: 'Quantum cap codes can have a high rate and include codes with parameters \([[6,0,4]]\) (from the hyperoval in \(PG(2,4)\)), \([[12,4,4]]\) (from the union of two hyperovals in \(PG(3,4)\) on two planes meeting in an exterior line), \([[40,30,4]]\) (from the 40-cap in \(AG(4,4)\)), \([[41,31,4]]\) (from a 41-cap in \(PG(4,4)\)), \([[126,114,4]]\) (from the Glynn 126-cap in \(PG(5,4)\)), \([[756,740,4]]\) (from a 756-cap in \(PG(7,4)\)), and \([[5040,5020,4]]\) (from a 5040-cap in \(PG(9,4)\)) \cite{doi:10.2140/iig.2008.6.53}, as well as \([[12,2,4]]\), \([[20,10,4]]\), or \([[29,19,4]]\) \cite{arxiv:0905.1059}.'

relations:
  parents:
    - code_id: stabilizer_over_gf4
      detail: 'A quantum cap code is a distance-four \hyperref[topic:quantum-weight-enumerator]{pure} Hermitian qubit code constructed by identifying its underlying Hermitian self-orthogonal \([n,k]_4\) code with a particular projective cap in \(PG(k-1,4)\).'
    - code_id: small_distance_qubit_stabilizer
      detail: 'Quantum cap codes can have a high rate and include codes with parameters \([[6,0,4]]\), \([[12,4,4]]\), \([[40,30,4]]\), \([[41,31,4]]\), \([[126,114,4]]\), \([[756,740,4]]\), and \([[5040,5020,4]]\) \cite{doi:10.2140/iig.2008.6.53}, as well as \([[12,2,4]]\), \([[20,10,4]]\), or \([[29,19,4]]\) \cite{arxiv:0905.1059}.'
  cousins:
    - code_id: projective
      detail: 'A quantum cap code is a distance-four \hyperref[topic:quantum-weight-enumerator]{pure} Hermitian qubit code constructed by identifying its underlying Hermitian self-orthogonal \([n,k]_4\) code with a particular projective cap in \(PG(k-1,4)\).'


