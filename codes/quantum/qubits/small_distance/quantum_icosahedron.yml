code_id: quantum_icosahedron
physical: qubits
logical: qubits

name: '\([[54,6,5]]\) five-covered icosahedral code'
introduced: '\cite{arxiv:2411.14448}'

description: |
  A \([[54,6,5]]\) qubit stabilizer code whose \hyperref[topic:encoder-respecting]{encoder-respecting form} is the graph of a five-cover of the icosahedron \cite{arxiv:2411.14448}.
  The covering-space construction avoids the weight-three logical operators that occur for the bare icosahedral graph \cite{arxiv:2411.14448}.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: small_distance_qubit_stabilizer
  cousins:
    - code_id: icosahedron
      detail: 'The \hyperref[topic:encoder-respecting]{encoder-respecting form} of the \([[54,6,5]]\) five-covered icosahedral code is the graph of a five-cover of the icosahedron \cite{arxiv:2411.14448}.'

