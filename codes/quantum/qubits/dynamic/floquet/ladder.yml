code_id: ladder
physical: qubits
logical: qubits

name: 'Ladder Floquet code'
introduced: '\cite{arxiv:2107.02194}'

description: |
  1D Floquet code defined on a ladder qubit geometry, with one qubit per vertex.
  The check operators consist of \(ZZ\) checks on each rung and alternating \(XX\) and \(YY\) checks on the legs.
  The period-four measurement schedule measures \(ZZ\), \(XX\), \(ZZ\), and \(YY\) in rounds \(0,1,2,3\) mod \(4\), respectively, dynamically generating one logical qubit \cite{arxiv:2107.02194}.

protection: 'For \(r\geq 4\), the ISG is generated by plaquette stabilizers on the ladder squares together with the most recently measured checks. The code has effective distance \(2\): it detects all single-qubit Pauli errors, and chains of check errors produce syndrome defects only at their endpoints, analogously to a repetition code \cite{arxiv:2107.02194}.'

features:
  decoders:
    - 'Syndrome bits are the plaquette-stabilizer eigenvalues, recorded every time they can be inferred from consecutive rounds of measurements \cite{arxiv:2107.02194}.'
    - 'Period-four measurement sequence utilizing two-qubit measurements \cite{arxiv:2107.02194}.'


relations:
  parents:
    - code_id: floquet
      detail: 'The ladder Floquet code is the first 1D Floquet code.'
  cousins:
    - code_id: honeycomb_floquet
      detail: 'The ladder Floquet code is introduced as a 1D toy model that explains how fault tolerance can arise in the honeycomb Floquet code \cite{arxiv:2107.02194}.'
    - code_id: stab_4_2_2
      detail: 'The smallest example of the ladder Floquet code is a dynamical version of the \([[4,2,2]]\) code \cite{doi:10.26081/K6WH2V,manual:{V. V. Albert, \href{https://boulderschool.yale.edu/sites/default/files/files/BSS_notes_-_VVA.pdf}{Boulder School 2023 Lecture notes}.}}. The \([[4,2,2]]\) code can be Floquetified in various ways \cite{arxiv:2307.11136,arxiv:2410.17240}.'
    - code_id: stab_6_2_2
      detail: 'The ISG of the ladder code includes \(Z\)-type Pauli products around squares of the qubit ladder. These are also included in the checks of the \(C_6\) code.'


