code_id: floquet_color_ruby
physical: qubits
logical: qubits

name: 'Floquet color code'
introduced: '\cite{arxiv:2307.13668}'

alternative_names:
  - 'Ruby Floquet color code'

description: |
  2D Floquet code on the ruby lattice whose check operators are weight-two Pauli operators on \(x\)-, \(y\)-, and \(z\)-labeled edges \cite{arxiv:2307.13668}.
  Its three-round schedule yields ISGs that are FDLQC-equivalent to the 2D color code; in one round, the ISG is exactly the color code concatenated with a three-qubit repetition code \cite{arxiv:2307.13668}.
  The original three-round schedule has a \(\mathbb{Z}_3\) automorphism of the dynamically generated logical operators, while the rewinding schedule \(012102\) and another six-round schedule both trivialize that automorphism.
  A parent stabilizer code for this Floquet code is FDLQC-equivalent to two copies of the 2D color code \cite{arxiv:2307.13668}.


features:
  rate: 'On a torus, the Floquet color code encodes four logical qubits, two of which are dynamically generated relative to the underlying subsystem code \cite{arxiv:2307.13668}.'
  general_gates:
    - 'In the round whose ISG is the 2D color code concatenated with a three-qubit repetition code, the usual transversal logical Clifford gates of the color code remain available \cite{arxiv:2307.13668}.'
  fault_tolerance:
    - 'Pairs of consecutive ISGs are locally reversible, and the paper argues that this suggests a non-zero fault-tolerant threshold \cite{arxiv:2307.13668}.'


