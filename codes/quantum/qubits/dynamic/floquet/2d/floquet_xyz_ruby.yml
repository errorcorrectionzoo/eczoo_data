code_id: floquet_xyz_ruby
physical: qubits
logical: qubits

name: 'Ruby Floquet code'
introduced: '\cite{arxiv:2307.13668,arxiv:2407.08566}'

alternative_names:
  - 'Floquet color code'
  - 'Ruby Floquet color code'

description: |
  2D Floquet code whose qubits are placed on vertices of a ruby tiling, with weight-two Pauli check operators on \(x\)-, \(y\)-, and \(z\)-labeled edges \cite{arxiv:2407.08566}.
  The code admits two different measurement schedules, the XYZ ruby schedule and the color-code schedule.

  One third of the time during the XYZ ruby measurement schedule, its ISG is that of the 6.6.6 color code concatenated with a three-qubit repetition code.
  Together, all ISGs generate the gauge group of the 3F subsystem code.

  A different three-round color-code schedule \cite{arxiv:2307.13668} admits ISGs are FDLQC-equivalent to the 2D color code; in one round, the ISG is exactly the color code concatenated with a three-qubit repetition code.
  The color-code schedule has a \(\mathbb{Z}_3\) automorphism of the dynamically generated logical operators, while the rewinding schedule \(012102\) and another six-round schedule both trivialize that automorphism.
  A parent stabilizer code for this schedule is FDLQC-equivalent to two copies of the 2D color code \cite{arxiv:2307.13668}.


features:
  rate: 'On a torus, the color-code schedule encodes four logical qubits, two of which are dynamically generated relative to the underlying subsystem code \cite{arxiv:2307.13668}.'
  general_gates:
    - 'In the round whose ISG is the 2D color code concatenated with a three-qubit repetition code, the usual transversal logical Clifford gates of the color code remain available \cite{arxiv:2307.13668}.'
  threshold:
    - 'Circuit-level noise: \(\approx 0.18\%\) using BP-OSD decoder \cite{arxiv:2407.08566}.'
  fault_tolerance:
    - 'Pairs of consecutive ISGs of the color-code schedule are locally reversible, and the paper argues that this suggests a non-zero fault-tolerant threshold \cite{arxiv:2307.13668}.'


