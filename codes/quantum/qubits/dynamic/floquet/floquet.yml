code_id: floquet
physical: qubits
logical: qubits

name: 'Hastings-Haah Floquet code'
introduced: '\cite{arxiv:2107.02194}'

alternative_names:
  - 'Periodic Floquet code'

description: |
  Dynamical code whose sequence of check-operator measurements is periodic.
  The original Hastings-Haah construction introduced periodic measurement schedules that dynamically generate logical qubits even when the underlying subsystem code has fewer or no logical qubits \cite{arxiv:2107.02194}.
  Its basic examples are the 2D honeycomb Floquet code and the 1D ladder Floquet code.

# In addition, the number of logical qubits is larger than when the code is viewed as a static subsystem stabilizer code.

protection: 'In the original Hastings-Haah examples, periodic measurements protect against single-qubit Pauli faults and measurement faults: the honeycomb Floquet code on a torus stores two logical qubits with distance proportional to linear size, while the ladder Floquet code is an error-detecting toy model \cite{arxiv:2107.02194}. Spacetime errors for periodic Floquet codes have been studied in Ref. \cite{arxiv:2510.05549}.'

features:
  fault_tolerance:
    - 'Periodic Floquet codes on tri-colorable lattices can be made fault-tolerant in the presence of dead qubits \cite{arxiv:2307.03715,arxiv:2405.15854}.'

relations:
  parents:
    - code_id: da
      detail: 'Periodic Floquet codes are dynamical codes with periodic measurement sequences.'


