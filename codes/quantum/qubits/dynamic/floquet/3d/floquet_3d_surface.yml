    - code_id: checkerboard
      detail: 'A planar Floquet 3D surface code stacked with two planar 3D subsystem surface codes prepares an instantaneous state equivalent to a 3D surface code stacked with two checkerboard model codes, enabling a logical \(CCZ\) gate \cite{arxiv:2307.13668}.'


