      detail: 'The G-round ISG is FDLQC-equivalent to the 3D surface code, while the other rounds are FDLQC-equivalent to two copies of the 3D surface code up to non-local stabilizers \cite{arxiv:2307.13668}.'
    - code_id: 2d_color
