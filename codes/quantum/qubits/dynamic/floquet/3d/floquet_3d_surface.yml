code_id: floquet_3d_surface
physical: qubits
logical: qubits

name: 'Floquet 3D surface code'
introduced: '\cite{arxiv:2307.13668}'

description: |
  A 3D Floquet code on a truncated cubic honeycomb with pairs of physical qubits on vertices.
  It is constructed from three stacks of square-octagon Floquet toric codes, coupled by interlayer \(YY\) measurements in a coupled-layer construction \cite{arxiv:1701.00747,arxiv:2307.13668}.

  The rewinding schedule \(GBRBGR\) yields ISGs that are FDLQC-equivalent either to the 3D surface code or to two copies of the 3D surface code up to non-local stabilizers.
  A parent stabilizer code for this Floquet code is FDQC-equivalent to a 3-foliated stack of 2D color codes \cite{arxiv:2307.13668}.


features:
  rate: 'On a three-torus of linear size \(L\), the Floquet code preserves three logical qubits \cite{arxiv:2307.13668}.'
  general_gates:
    - 'A planar Floquet 3D surface code stacked with two planar 3D subsystem surface codes prepares an instantaneous state equivalent to a 3D surface code stacked with two checkerboard model codes, enabling a logical \(CCZ\) gate \cite{arxiv:2307.13668}.'


