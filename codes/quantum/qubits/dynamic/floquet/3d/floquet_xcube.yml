code_id: floquet_xcube
physical: qubits
logical: qubits

name: 'X-cube Floquet code'
introduced: '\cite{arxiv:2211.05784}'

description: |
  3D Floquet code on the truncated cubic honeycomb, built from coupled layers of square-octagon Floquet toric codes.
  Its original measurement schedule yields ISGs that are stacks of 2D surface codes or are FDLQC-equivalent to the X-cube model code \cite{arxiv:2211.05784}.
  A rewinding period-six schedule \(GBRBGR\) yields only fracton ISGs: the G-round is the canonical X-cube model concatenated with four-qubit repetition codes on composite green edges, the B- and first R-rounds are FDLQC-equivalent to the product of the X-cube model, a 3D surface code, and a 3-foliated stack of 2D surface codes up to non-local stabilizers, and the second R-round is FDLQC-equivalent to the X-cube model together with a 3-foliated stack of 2D surface codes \cite{arxiv:2307.13668}.
  A parent stabilizer code for the rewinding schedule is FDQC-equivalent to a 3-foliated stack of 2D color codes \cite{arxiv:2307.13668}.

features:
  rate: 'The original code has subextensive logical dimension \cite{arxiv:2211.05784}; for even \(L\), the rewinding schedule preserves \(6L-3\) logical qubits on an \(L\times L\times L\) three-torus \cite{arxiv:2307.13668}.'
  decoders:
    - 'Period-six measurement sequence utilizing two-qubit measurements \cite{arxiv:2211.05784}.'
    - 'A rewinding period-six schedule \(GBRBGR\) yields ISGs FDLQC-equivalent to the X-cube model together with a 3D surface-code factor and/or a 3-foliated stack of 2D surface codes \cite{arxiv:2307.13668}.'
  code_capacity_threshold:
    - 'It is argued that this code has a threshold in Ref. \cite{arxiv:2211.05784}.'


