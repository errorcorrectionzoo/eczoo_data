    - code_id: quantum_repetition
      detail: 'The G-round of the rewinding X-cube Floquet code is exactly the canonical X-cube model concatenated with four-qubit repetition codes on composite green edges \cite{arxiv:2307.13668}.'
    - code_id: 2d_color
      detail: 'A parent stabilizer code for the rewinding X-cube Floquet code is FDQC-equivalent to a 3-foliated stack of 2D color codes \cite{arxiv:2307.13668}.'


