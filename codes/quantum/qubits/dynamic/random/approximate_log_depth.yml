    - code_id: random_stabilizer
      detail: 'Log-depth \hyperref[topic:clifford]{Clifford circuits} on a 1D geometry yield approximate codes whose encoding rate achieves the hashing bound for Pauli noise and the channel capacity for erasure errors \cite{arxiv:2503.17759,arxiv:2602.20900}.'
  cousins:
