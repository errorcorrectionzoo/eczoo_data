code_id: kpt
physical: qubits
logical: qubits

name: 'Kim-Preskill-Tang (KPT) code'
short_name: 'KPT'
introduced: '\cite{arxiv:2003.05451}'

description: |
  An approximate quantum error-correcting code that protects the encoded interior of a black hole from computationally bounded exterior observers.
  Under the assumption that the Hawking radiation emitted by an old black hole is pseudorandom, there exists a subspace of the radiation system that encodes the black hole interior, entangled with the late outgoing Hawking quanta.
  The logical operators of this code, called ghost operators in \cite{arxiv:2003.05451}, commute with efficient operations acting on the radiation, protecting the interior up to corrections exponentially small in the black hole's entropy.
  The construction is state dependent: the encoding depends on the state that collapsed to form the black hole \cite{arxiv:2003.05451}.

  This code has been tested in various models of gravity \cite{arxiv:2003.05451,arxiv:2203.01961}.

protection: |
  Protection relies on the pseudorandomness of the radiation and on restricting noise to efficient quantum computations acting on the radiation alone.
  Such operations commute with the interior logical algebra up to errors exponentially small in the remaining black-hole entropy \cite{arxiv:2003.05451}.


relations:
