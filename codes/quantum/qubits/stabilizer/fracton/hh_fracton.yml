code_id: hh_fracton
physical: qubits
logical: qubits

name: 'Hsieh-Halasz (HH) code'
short_name: 'HH'
introduced: '\cite{arxiv:1703.02973}'

description: |
  Member of one of two families of fracton codes, named HH-I and HH-II, defined on a cubic lattice with two qubits per site.
  HH-I (HH-II) is a CSS (non-CSS) stabilizer code family, with the former identified as a foliated type-I fracton code that is decomposable into two separate lattice models \cite{arxiv:1908.08049}.
  The sorting analysis of Ref. \cite{arxiv:1908.08049} leaves HH-II inconclusive, consistent with either a fractal type-I or a type-II fracton phase.



relations:
  parents:
    - code_id: qldpc
    - code_id: fracton
      detail: 'Both HH-I and HH-II are fracton codes; HH-I is identified as foliated type-I, while HH-II remains inconclusive between fractal type-I and type-II in the sorting analysis of Ref. \cite{arxiv:1908.08049}.'


