code_id: anisotropic_z2_laplacian
physical: qubits
logical: qubits

name: 'Anisotropic \(\mathbb{Z}_2\) Laplacian model code'
introduced: '\cite{arxiv:2210.03727,arxiv:2209.07987}'

description: |
  A graph-based analogue of a Type-I fracton phase with lineon-like restricted mobility \cite{arxiv:2210.03727,arxiv:2209.07987}.

  On generic sparse graphs, the Laplacian seed is not rank deficient enough to generate fracton order \cite{arxiv:2312.08462}.
  Instead, the model exhibits partially confined point-like excitations in a phase more akin to nonlocal topological order.


