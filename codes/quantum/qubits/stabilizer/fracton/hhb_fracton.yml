code_id: hhb_fracton
physical: qubits
logical: qubits

name: 'Hsieh-Halasz-Balents (HHB) code'
short_name: 'HHB'
introduced: '\cite{arxiv:1707.02308}'

description: |
  Member of one of two families of fracton codes, named HHB model A and B, defined on a cubic lattice with two qubits per site.
  Both are expected to be foliated type-I fracton codes \cite[Eqs. (D42-D43)]{arxiv:1908.08049}.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: qldpc
    - code_id: fracton
      detail: 'Both HHB models are expected to be foliated type-I fracton codes \cite[Eqs. (D42-D43)]{arxiv:1908.08049}.'


