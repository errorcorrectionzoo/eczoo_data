code_id: layer
physical: qubits
logical: qubits

name: 'Layer code'
introduced: '\cite{arxiv:2309.16503}'

description: |
  Member of a family of qubit QLDPC CSS codes with stabilizer generator weights \(\leq 6\) that are obtained by coupling layers of 2D surface codes according to the Tanner graph of a QLDPC code (or a more general qubit stabilizer code).
  Geometric locality is maintained because, instead of being concatenated, each pair of parallel surface-code squares is fused (or quasi-concatenated) with perpendicular surface-code squares via lattice surgery.

features:
  rate: 'Layer codes achieve the 3D \hyperref[topic:bpt-bound]{BPT bound}, with parameters  \([[n,\Theta(n^{1/3}),\Theta(n^{1/3})]]\), when asymptotically good QLDPC codes are used in the construction.'

  decoders:
    - 'Decoders against stochastic and adversarial noise \cite{arxiv:2510.06659}.'

relations:
  parents:
    - code_id: qubit_css
    - code_id: qldpc
      detail: 'Layer codes are constructed by coupling layers of 2D surface codes according to the Tanner graph of a QLDPC code.'
  cousins:
    - code_id: topological_abelian
      detail: 'The Layer code realizes 2D layers of \(\mathbb{Z}_2\) gauge theory coupled along defects.'
    - code_id: fracton
      detail: 'Layer codes are non-translation invariant 3D lattice stabilizer codes that can be viewed as fracton topological defect networks \cite{arxiv:2309.16503}.'
    - code_id: good_qldpc
      detail: 'Layer codes achieve the 3D \hyperref[topic:bpt-bound]{BPT bound}, with parameters  \([[n,\Theta(n^{1/3}),\Theta(n^{1/3})]]\), when asymptotically good QLDPC codes are used in the construction.'
    - code_id: qubit_concatenated
      detail: 'Each pair of surface-code squares in a layer code is fused (or quasi-concatenated) with perpendicular surface-code squares via lattice surgery.'
    - code_id: self_correct
      detail: 'The energy barrier of excitations for layer codes constructed using asymptotically good QLDPC codes scales as \hyperref[topic:asymptotics]{order} \(\Theta(n^{1/3})\) \cite{arxiv:2309.16503}. Layer codes are partially self-correcting quantum memories \cite{arxiv:2510.06659,arxiv:2510.09218}. Layer codes constructed from random CSS codes have near-optimal scaling of code parameters and a polynomial energy barrier, exhibiting behavior consistent with partial self-correction \cite{arxiv:2510.06659}.'


