code_id: fibonacci_fractal_liquid
physical: qubits
logical: qubits

name: 'Fibonacci fractal spin-liquid code'
introduced: '\cite{arxiv:1302.6248}'

alternative_names:
  - 'Fibonacci prism model code'

description: |
  A fractal type-I fracton CSS code defined on a cubic lattice \cite[Eq. (D23)]{arxiv:1908.08049}.
  In Yoshida's quantum fractal-liquid family, it is obtained from the pair of reversible polynomials \(f(x)=1+x+x^2\) and \(g(x)=1+x+x^3\) over \(\mathbb{F}_2\), yielding a seven-body stabilizer model with fractal logical operators and no string-like logical operators \cite{arxiv:1302.6248}.

protection: 'The model has no string-like logical operators because \(1+x+x^2\) and \(1+x+x^3\) are algebraically unrelated over \(\mathbb{F}_2\) \cite{arxiv:1302.6248}.'

rate: 'On an \(L\times L\times L\) lattice with two qubits per site, the code encodes \(k=2L\) logical qubits into \(n=2L^3\) physical qubits, giving rate \(1/L^2\) \cite{arxiv:1302.6248}.'



relations:
  parents:
    - code_id: fracton
      detail: 'The Fibonacci fractal spin-liquid code is a fractal type-I fracton code \cite{arxiv:1908.08049}.'
    - code_id: fractal_liquid
      detail: 'The Fibonacci fractal spin-liquid code is the qubit quantum fractal liquid defined by \(f(x)=1+x+x^2\) and \(g(x)=1+x+x^3\) over \(\mathbb{F}_2\) \cite{arxiv:1302.6248}.'
  cousins:
    - code_id: fibonacci_model
      detail: 'The Fibonacci fractal spin-liquid code uses the Fibonacci model polynomial \(f(x)=1+x+x^2\) as one of its two defining cellular automata, which generates its fractal logical operators \cite{arxiv:1302.6248}.'


