code_id: sierpinsky_fractal_liquid
physical: qubits
logical: qubits

# https://arxiv.org/pdf/2312.08462
name: 'Sierpinski prism model code'
introduced: '\cite{arxiv:1108.2051,arxiv:1302.6248}'

alternative_names:
  - 'Sierpinski fractal spin-liquid (SFSL) code'
  - 'Yoshida first-order fractal spin-liquid code'
  # https://arxiv.org/pdf/2112.14717#page=27.72


description: |
  A fractal type-I fracton CSS code defined on a cubic lattice \cite[Eq. (D22)]{arxiv:1908.08049}.
  The code admits an excitation-moving operator shaped like a Sierpinski triangle \cite[Fig. 2]{arxiv:1908.08049}.




relations:
  parents:
    - code_id: hypergraph_product
      detail: 'The Sierpinski prism model code is a hypergraph product of the repetition code and the Newman-Moore code \cite{arxiv:2402.16831}, and can be formulated directly as an LP code \cite{arxiv:2312.08462}.'
    - code_id: fracton
      detail: 'The Sierpinski prism model code is a fractal type-I fracton code \cite{arxiv:1908.08049}.'
  cousins:
    - code_id: newman_moore
      detail: 'The Sierpinski prism model code is a hypergraph product of the repetition code and the Newman-Moore code \cite{arxiv:2402.16831}, and can be formulated directly as an LP code \cite{arxiv:2312.08462}.'
    - code_id: repetition
      detail: 'The Sierpinski prism model code is a hypergraph product of the repetition code and the Newman-Moore code \cite{arxiv:2402.16831}, and can be formulated directly as an LP code \cite{arxiv:2312.08462}.'
    - code_id: lifted_product
      detail: 'The Sierpinski prism model code is a hypergraph product of the repetition code and the Newman-Moore code \cite{arxiv:2402.16831}, and can be formulated directly as an LP code \cite{arxiv:2312.08462}.'
    - code_id: spt
      detail: 'Ungauging \cite{arxiv:1202.3120,arxiv:1407.1025,arxiv:1603.04442,arxiv:1603.05182,arxiv:1605.01640,arxiv:1805.01836,arxiv:1806.08679,arXiv:2108.11402,arxiv:2310.16032,arxiv:2410.02213} yields explicit fracton-SPT constructions; in particular, the Yoshida first-order fractal spin-liquid code underlies a 2D fracton SPT protected by Sierpinski-triangle symmetries via a gapped domain wall \cite{arxiv:1805.01836}.'
    - code_id: 3d_surface
      detail: 'The Sierpinski prism model code admits a topological defect network construction out of 3D surface codes on triangular prisms \cite{arxiv:2002.05166,arxiv:2112.14717}.'


