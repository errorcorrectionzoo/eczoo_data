code_id: check_product
physical: qubits
logical: qubits

name: 'Quantum check-product code'
introduced: '\cite{arxiv:2209.11405}'

description: |
  CSS code constructed from an extension of the check product (between two classical codes) to a product between a classical and a quantum code.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: qubit_css
    - code_id: qltc
      detail: 'Quantum check-product constructions yield an SLTC code with constant soundness \(2\rho\) from a classical LTC code with soundness \(\rho\) \cite{arxiv:2209.11405}. These form the first bona-fide QLTC family because they admit asymptotically constant soundness, but they are not practical because their distance is two.'
  cousins:
    - code_id: tensor
      detail: 'Quantum check-product codes extend the concept of a check product, which yields the dual of a tensor code, to a product between a classical and a quantum code.'
    - code_id: quantum_tensor_product
      detail: 'Quantum check-product codes extend the concept of a check product, which yields the dual of a tensor code, to a product between a classical and a quantum code.'
    - code_id: distance_balanced
      detail: 'Quantum check-product code constructions use distance balancing to increase distance \cite{arxiv:2209.11405}.'

