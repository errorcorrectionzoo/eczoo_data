code_id: anisotropic_z2_laplacian
physical: qubits
logical: qubits

name: 'Anisotropic \(\mathbb{Z}_2\) Laplacian model code'
introduced: '\cite{doi:10.1103/PhysRevB.107.125121,doi:10.21468/SciPostPhys.14.5.106}'

description: |
  A non-geometrically-local CSS code on a graph that can be written as the hypergraph product of a cyclic repetition code and a Laplacian code \cite{arxiv:2312.08462}.
  The model was proposed as a graph-based analogue of a Type-I fracton phase with lineon-like restricted mobility \cite{doi:10.1103/PhysRevB.107.125121,doi:10.21468/SciPostPhys.14.5.106}.

  The product-code analysis of Ref. \cite{arxiv:2312.08462} shows that, on generic sparse graphs, the Laplacian seed is not rank deficient enough to generate fracton order.
  Instead, the model exhibits partially confined point-like excitations in a phase more akin to nonlocal topological order.

