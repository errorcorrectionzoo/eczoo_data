code_id: xyz_product
physical: qubits
logical: qubits

name: 'XYZ product code'
introduced: '\cite{preset:Maurice21,arxiv:2011.09746}'

description: >
  A non-CSS QLDPC code obtained from a three-fold variant of the hypergraph
  product applied to three classical binary codes with parity-check matrices
  \(H_1,H_2,H_3\).  Unlike CSS three-fold hypergraph product codes, the third
  input code acts through Pauli-\(Y\) checks \cite{arxiv:2011.09746}.

  Under mild assumptions, the code dimension is determined by a tensor
  Sylvester equation over \(\mathbb{F}_2\), and the minimum-distance problem
  reduces up to constant factors to how closely a related inhomogeneous tensor
  Sylvester equation can be satisfied \cite{arxiv:2011.09746}.  When the
  underlying classical codes are repetition codes, the construction yields the
  \hyperref[code:chamon]{Chamon model code}.

protection: >
  The natural logical operators are membrane-like two-dimensional objects
  rather than strings \cite{arxiv:2011.09746}.  For cyclic XYZ product
  codes, fractal operators yield large-weight errors with constant-weight
  syndromes, ruling out local testability \cite{arxiv:2011.09746}.


features:

  rate: >
    The logical dimension depends on properties of the input classical codes,
    specifically similarity invariants of the matrices \(H_i H_i^T\).
    It is conjectured that specific instances of XYZ product codes have a
    constant encoding rate and a minimum distance of \(d \in \Theta(n^{2/3})\)
    \cite{arxiv:2011.09746}.


