code_id: generalized_quantum_tanner
physical: qubits
logical: qubits

name: 'Generalized quantum Tanner code'
introduced: '\cite{arxiv:2405.07980}'

description: |
  An extension of quantum Tanner codes to codes constructed from two commuting regular graphs with the same vertex set.
  This allows for code construction using finite sets and Schreier graphs, yielding a broader family of square complexes.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: qubit_generalized_homological_product_css


