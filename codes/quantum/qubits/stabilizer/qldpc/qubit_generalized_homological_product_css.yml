code_id: qubit_generalized_homological_product_css
physical: qubits

name: 'Generalized homological-product qubit CSS code'

description: |
  A qubit CSS code whose properties are determined from an underlying chain complex via the \hyperref[topic:CSS-to-homology-correspondence]{qubit CSS-to-homology correspondence}. This complex often consists of some type of product of other chain complexes.


relations:
  parents:
    - code_id: qubit_css
    - code_id: qldpc
      detail: 'Homological products are a primary tool for generating qubit QLDPC codes with favorable parameters. Typically, whenever the input codes are binary LDPC or qubit QLDPC, the resulting code will be qubit QLDPC with non geometrically local stabilizer generators.'
    - code_id: generalized_homological_product_css


