code_id: bb5
physical: qubits
logical: qubits

name: 'BB5 code'
introduced: '\cite{arxiv:2503.22071}'

description: |
  A BB code with weight-five stabilizer generators
  (contrasting with the weight-six checks of standard BB codes), designed and
  benchmarked for long chains of trapped ions \cite{arxiv:2503.22071}.

  Two highlighted instances are \([[30,4,5]]\) and \([[48,4,7]]\), which improve
  the best-known BB6 distances at the same \([[n,k]]\): respectively
  \([[30,4,4]]\) and \([[48,4,6]]\) \cite{arxiv:2503.22071}.

features:
  fault_tolerance:
    - 'Circuit-level simulations in \cite{arxiv:2503.22071} use BP-OSD for BB5 and BB6 instances under an ion-chain noise model.'
    - 'For physical error rate \(10^{-3}\), the \([[48,4,7]]\) BB5 instance achieves logical error rate per syndrome round and per logical qubit \(\approx 5\times 10^{-5}\), about \(4\times\) lower than the best BB6 baseline considered in \cite{arxiv:2503.22071}. In that comparison, it also matches the logical error rate of a distance-7 surface code while using about \(4\times\) fewer physical qubits per logical qubit.'


relations:
