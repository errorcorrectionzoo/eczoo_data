code_id: bb72
physical: qubits
logical: qubits

name: '\([[72,12,6]]\) BB code'
introduced: '\cite{arxiv:2308.07915}'

alternative_names:
  - '\((6,6)\) BB code'

description: |
  A bivariate bicycle (BB) code with parameters \([[72,12,6]]\) and weight-six stabilizer generators \cite{arxiv:2308.07915}.

  One defining presentation uses \((\ell,m)=(6,6)\) with \(x^{\ell}=y^{m}=1\), and
  \(A=x^3+y+y^2\), \(B=y^3+x+x^2\) in \(\mathbb{F}_2[x,y]/(x^{\ell}-1,y^{m}-1)\) \cite{arxiv:2308.07915} \cite[Table 3]{arxiv:2308.07915}.

features:
  rate: 'Ancilla-added encoding rate is \(1/12\), using \(n_a=n=72\) ancilla qubits.'


relations:
