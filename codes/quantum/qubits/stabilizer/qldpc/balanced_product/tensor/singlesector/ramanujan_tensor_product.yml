code_id: ramanujan_tensor_product
physical: qubits
logical: qubits

name: 'High-dimensional expander (HDX) code'
short_name: 'HDX'
introduced: '\cite{arxiv:1409.1397,arxiv:2004.07935}'

description: |
  CSS code obtained by applying the generalized distance-balancing/product construction of Ref. \cite{arxiv:2004.07935} to a Ramanujan-complex quantum code and an asymptotically good classical LDPC code.
  Ramanujan quantum codes are defined using LSV Ramanujan complexes, which are simplicial complexes that generalise Ramanujan graphs \cite{doi:10.1007/BF02126799,doi:10.1017/CBO9780511615825}.
  The auxiliary classical code is viewed as a 1-dimensional chain complex, and the output code is defined on the co-complex of the product of the two co-complexes.
  Using a 2D LSV complex yields a QLDPC family with \(K=\Omega(\sqrt{N/\log N})\) and \(D=\Omega(\sqrt{N \log N})\), while using a 3D LSV complex yields \(K=\Omega(\sqrt{N}/\log N)\) and \(D=\Omega(\sqrt{N}\log N)\).

protection: 'The unbalanced component code from a 2D LSV complex can have \(d_X=\Omega(\log n)\) and \(d_Z=\Omega(n)\), while one from a 3D LSV complex can have \(d_X=\Omega(\log^2 n)\) and \(d_Z=\Omega(n)\) \cite{arxiv:2004.07935}. After distance balancing, the resulting HDX family has minimum distance \(D=\Omega(\sqrt{N \log N})\) in the 2D case and \(D=\Omega(\sqrt{N}\log N)\) in the 3D case.'

features:

  rate: 'For 2D LSV complexes, the rate is of \hyperref[topic:asymptotics]{order} \(\Omega(1/\sqrt{N \log N})\), with minimum distance \(D=\Omega(\sqrt{N \log N})\). For 3D LSV complexes, the rate is \(\Omega(1/(\sqrt{N}\log N))\), with minimum distance \(D=\Omega(\sqrt{N}\log N)\).'

  decoders:
    - 'For HDX codes built from 2D LSV complexes, \(X\)-error decoding reduces to polynomial-time cycle-code decoding on the 1-skeleton together with decoding of the auxiliary classical LDPC code \cite{arxiv:2004.07935}.'
    - 'For the 2D construction, \(Z\)-errors of linear weight admit a local decoder based on coboundary expansion; replacing the component complex by the 2-skeleton of a 3D LSV complex preserves 2D-type asymptotic parameters while giving linear-time \(Z\)-decoding with unit-weight local corrections \cite{arxiv:2004.07935}.'

notes:
  - 'Codes were first to break a 20-year record set by the \hyperref[code:freedman_meyer_luo]{Freedman-Meyer-Luo code} for the lower bound on scaling of the minimum distance \cite{arxiv:2103.06309}.'

relations:
  parents:
    - code_id: homological_product
      detail: 'Ramanujan codes result from a tensor product of a classical-code and a quantum-code chain complex.'
    - code_id: iterated_ramanujan
      detail: 'Ramanujan codes result from a tensor product of a classical-code and a quantum-code chain complex.'
  cousins:
    - code_id: distance_balanced
      detail: 'Ramanujan tensor-product constructions use distance balancing to increase distance.'
    - code_id: hypergraph_product
      detail: 'Ramanujan codes utilize the hypergraph product with a twist, which is an automorphism on one of the complexes in the tensor product, in order to increase distance \cite{arxiv:2103.06309}.'
    - code_id: freedman_meyer_luo
      detail: 'Ramanujan codes broke 20-year record on minimum code distance set by Freedman-Meyer-Luo codes.'


