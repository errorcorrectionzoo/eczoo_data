code_id: lacross
physical: qubits
logical: qubits

name: 'La-cross code'
introduced: '\cite{arxiv:2404.13010}'

description: |-
  Code constructed using a hypergraph product of two copies of a cyclic LDPC code.
  The construction uses cyclic LDPC codes with \hyperref[topic:Cyclic-to-polynomial-correspondence]{generating polynomials} \(1+x+x^k\) for some \(k\).
  Using a length-\(n\) seed code yields an \([[2n^2,2k^2]]\) family for periodic boundary conditions and an \([[(n-k)^2+n^2,k^2]]\) family for open boundary conditions.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: hypergraph_product
      detail: 'La-cross codes are constructed using a hypergraph product of a cyclic LDPC code with itself.'
    - code_id: quantum_cyclic
  cousins:
