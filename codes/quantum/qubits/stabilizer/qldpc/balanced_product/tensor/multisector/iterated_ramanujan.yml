code_id: iterated_ramanujan
physical: qubits
logical: qubits

name: 'Tensor-product HDX code'
introduced: '\cite{arxiv:2008.09495}'

description: 'A code constructed in a similar way as the HDX code, but utilizing iterated homological products of \textit{multiple} Ramanujan complexes and then applying distance balancing.
For any fixed tensor-power parameter \(c\), these yield explicit QLDPC codes with distance scaling as \(\sqrt{n}\log^{c} n\), improving on the original HDX construction by replacing a single logarithmic enhancement with arbitrarily high fixed polylogarithmic enhancement.
The utility of such tensor products comes from the fact that one of the Ramanujan complexes is a \textit{collective cosystolic expander} as opposed to just a cosystolic expander.'

protection: 'Construction yields explicit QLDPC codes with distance \(\sqrt{n}\log^c n\) for any fixed \(c\), using the \(c\)-fold tensor product of Ramanujan complexes followed by distance balancing \cite{arxiv:2008.09495}.'


relations:
  parents:
    - code_id: multisector_hypergraph
      detail: 'Tensor-product HDX codes result from iterated homological products of length-two chain complexes (i.e., quantum codes) based on Ramanujan complexes \cite{arxiv:2103.06309}.'


