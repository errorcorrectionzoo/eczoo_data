      detail: '\(D\)-dimensional HGP codes are constructed using a hypergraph product of \(D\) linear binary codes.'
    - code_id: binary_cyclic
      detail: 'Higher-dimensional homological-product codes can be constructed out of CSS codes that in turn stem from cyclic codes \cite[Sec. 4.2]{arxiv:1512.07081}.'
    - code_id: quantum_reed_muller
      detail: 'Higher-dimensional homological-product codes can be constructed out of quantum RM codes \cite[Sec. 4.3]{arxiv:1512.07081}.'
    - code_id: qc_ldpc
      detail: 'Higher-dimensional hypergraph-product codes can be constructed out of QC-LDPC codes \cite[Table III]{arxiv:2407.18490}.'
    - code_id: asymmetric_qecc
      detail: 'The \((a,b)\)-complex construction yields asymmetric CSS codes with \(d_X=\delta^a\) and \(d_Z=\delta^b\), allowing independent tuning of the two distances for channels with unequal bit-flip and phase-flip rates \cite{arxiv:1810.01519}.'




