code_id: yoked_surface
physical: qubits
logical: qubits

name: 'Yoked surface code'
introduced: '\cite{arxiv:2312.04522}'

description: |-
  Member of a family of \([[n,k,d]]\) qubit CSS codes resulting from a concatenation of a \hyperref[code:qmdpc]{QMDPC code} with a \hyperref[code:rotated_surface]{rotated surface code}.
  Concatenation does not impose additional connectivity constraints and can triple the number of logical qubits per physical qubit when compared to the original surface code.
  Concatenation with 1D (2D) QMDPC yields codes with twice (four times) the distance.
  Using the concatenation convention of the Zoo, the stabilizer generators of the inner QMDPC code are referred to as \textit{yokes} in this context; the cited paper \cite{arxiv:2312.04522} uses the opposite inner/outer terminology.


features:
  decoders:
    - 'Soft information from the outer surface codes can be utilized via a message passing algorithm \cite{arxiv:quant-ph/0606126}.'
    - 'Yokes can be measured using lattice surgery \cite{arxiv:2312.04522}.'


relations:
  parents:
    - code_id: qubit_css
    - code_id: qubit_concatenated
      detail: 'Using the concatenation convention of the Zoo, a yoked surface code is a concatenation of a QMDPC code (inner code) with a rotated surface code (outer code). The cited paper \cite{arxiv:2312.04522} uses the opposite inner/outer terminology.'


