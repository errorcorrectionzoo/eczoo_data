code_id: css-t
physical: qubits
logical: qubits

name: 'CSS-T code'
introduced: '\cite{arxiv:2001.04887}'

description: |
  A CSS code for which a physical transversal \(T\) gate is either the identity (up to a global phase) or a logical gate.
  CSS-T codes are constructed from a pair of linear binary codes via the CSS construction, with the pair satisfying certain conditions \cite{arxiv:2312.17518}.

notes:
  - 'A database of CSS-T codes is available in QECDB \cite{preset:QECDB}.'

features:
  rate: 'Asymptotically good CSS-T codes exist \cite{arxiv:2412.08586}.'
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'
    - 'A physical transversal \(T\) gate is either the identity (up to a global phase) or a logical gate \cite{arxiv:1910.09333}.'


relations:
  parents:
    - code_id: qubit_css
  cousins:
    - code_id: binary_linear
      detail: 'CSS-T codes are constructed from a pair of linear binary codes via the CSS construction, with the pair satisfying certain conditions \cite{arxiv:2312.17518}.'
    - code_id: binary_cyclic
      detail: 'Binary cyclic and extended cyclic codes can be used to construct CSS-T codes via the CSS construction \cite{arxiv:2312.17518}.'
    - code_id: quantum_reed_muller
      detail: 'Certain quantum RM codes are CSS-T codes \cite{arxiv:2305.06423,arxiv:2310.16504,arxiv:2312.17518}.'


