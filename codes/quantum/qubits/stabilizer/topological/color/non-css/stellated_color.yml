code_id: stellated_color
physical: qubits
logical: qubits

name: 'Stellated color code'
introduced: '\cite{arxiv:1806.02820}'

description: |
  A non-CSS color-code family on a lattice patch with a single central puncture that hosts a twist defect connected to the boundary by a domain wall.

  The family is parameterized by a rotational symmetry order \(s\); for odd \(s\), the code encodes \(k=s-1\) logical qubits, while for even \(s\), it encodes \(k=s-2\) logical qubits \cite{arxiv:1806.02820}.

features:
  rate: 'Code families yield the following values of the constant \(c\) in the \hyperref[topic:bpt-bound]{BPT bound}, \(k d^2 \leq c n\). On the 4.8.8 lattice, stellated color codes have \(c=4-\frac{4}{s}\) for odd \(s\) and \(c=4-\frac{8}{s}\) for even \(s\), approaching \(4\) as \(s\) grows. On the 6.6.6 lattice, they have \(c=\frac{8}{3}-\frac{8}{3s}\) for odd \(s\) and \(c=\frac{8}{3}-\frac{16}{3s}\) for even \(s\), approaching \(\frac{8}{3}\) \cite{arxiv:1806.02820}.'

relations:
  parents:
    - code_id: twist_defect_color
  cousins:
    - code_id: triangle_surface
      detail: 'Stellated color codes are color-code analogues of triangle surface codes in that both encode logical information in lattices with a single twist defect.
      Instances of the former can be obtained by fattening \cite{arxiv:cond-mat/0607736} the vertices of the latter \cite{arxiv:1806.02820}.'
    - code_id: stellated_surface
      detail: 'Stellated color codes are color-code analogues of stellated surface codes; the surface-code family has the same rotational parameter \(s\), but half the asymptotic \(c\)-value of the 4.8.8 stellated color-code family \cite{arxiv:1806.02820}.'
