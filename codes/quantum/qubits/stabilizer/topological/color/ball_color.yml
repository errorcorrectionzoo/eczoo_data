code_id: ball_color
physical: qubits
logical: qubits

name: 'Ball code'
introduced: '\cite{arxiv:2112.01446}'

description: |
  A distance-two color code defined on a colorable \(D\)-ball, equivalently on a \(D\)-colex with boundary \cite[Appx. A]{arxiv:2112.01446}.
  In the morphing construction of Ref. \cite{arxiv:2112.01446}, ball codes arise as the child codes associated with the morphed ball-like regions.
  This family includes hypercube codes (defined on balls constructed from hyperoctahedra) and 3D ball codes (defined on duals of certain Archimedean solids).


protection: |
  A \(D\)-dimensional ball code defined on a ball-like region \(B_v\) has parameters \([[|B_v^D|,|B_v^1|-D,2]]\) \cite[Lemma 2]{arxiv:2112.01446}.
  The hypercube code family has parameters \([[2^D,D,2]]\) \cite[Exam. 3]{arxiv:2112.01446}.
  3D ball codes on duals of the truncated octahedron, truncated cuboctahedron, and truncated icosidodecahedron have parameters \([[24,11,2]]\), \([[48,23,2]]\), and \([[120,59,2]]\), respectively \cite[Exam. 4]{arxiv:2112.01446}.

features:
  transversal_gates:
    - 'The 3D ball codes on duals of the truncated octahedron, truncated cuboctahedron, and truncated icosidodecahedron admit logical \(CCZ\)-type gates implemented by physical \(T\) and \(T^\dagger\) gates \cite[Exam. 4, Thm. 5]{arxiv:2112.01446}.'

  magic_scaling_exponent: 'The 3D ball codes on duals of the truncated octahedron, truncated cuboctahedron, and truncated icosidodecahedron have \(\gamma\) close to one \cite{arxiv:2112.01446}.'


relations:
  parents:
    - code_id: color
      detail: 'Ball codes are color codes defined on a \(D\)-dimensional colex \cite[Appx. A]{arxiv:2112.01446}.'
    - code_id: small_distance_qubit_stabilizer
  cousins:
    - code_id: polyhedron
      detail: 'Polytopes dual to the hyperoctahedron, truncated octahedron, truncated cuboctahedron, and truncated icosidodecahedron are used to construct 3D ball codes.'


