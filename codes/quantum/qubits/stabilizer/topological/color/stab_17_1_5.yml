code_id: stab_17_1_5
physical: qubits
logical: qubits

name: '\([[17,1,5]]\) 4.8.8 color code'
introduced: '\cite{arxiv:quant-ph/0605138,arxiv:1311.0879}'


description: |
  Seventeen-qubit doubly even 2D color code that admits a transversal implementation of the logical Clifford group.
  The smallest distance-five CSS code has \(n=17\) \cite{arxiv:1207.6512}.

features:
  encoders:
    - 'Fault-tolerant logical zero state preparation using reinforcement learning \cite{arxiv:2402.17761}.'
  transversal_gates:
    - 'Transversal implementation of the logical Clifford group.'
  fault_tolerance:
    - 'Fault-tolerant logical zero state preparation using reinforcement learning \cite{arxiv:2402.17761}.'


