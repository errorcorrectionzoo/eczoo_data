code_id: quasi_hyperbolic_color
physical: qubits
logical: qubits

name: 'Quasi-hyperbolic color code'
introduced: '\cite{arxiv:2310.16982}'

description: |
  An extension of the color code construction to quasi-hyperbolic 3-manifolds, e.g., a product of a 2D hyperbolic surface and a circle.

protection: |
  There exists a quasi-hyperbolic family with rate of \hyperref[topic:asymptotics]{order} \(O(1/\log n)\) and distance of \hyperref[topic:asymptotics]{order} \(O(\log n)\) \cite{arxiv:2310.16982}.
  These codes support collective logical \(CCZ\) gates via transversal \(T\) and exponentially many individually addressable, parallelizable logical \(CZ\) gates via transversal \(S\) on codimension-1 submanifolds \cite{arxiv:2310.16982}.

features:
  rate: 'A Torelli mapping-torus construction yields a code with constant rate, although its distance scaling is currently unknown \cite{arxiv:2310.16982}.'

  fault_tolerance:
    - 'The quasi-hyperbolic family supports collective logical \(CCZ\) gates via transversal \(T\) and exponentially many individually addressable, parallelizable logical \(CZ\) gates via transversal \(S\) on codimension-1 submanifolds \cite{arxiv:2310.16982}.'


relations:
  parents:
