  cousins:
    - code_id: higher_dimensional_surface
      detail: 'Quasi-hyperbolic color codes are related to quasi-hyperbolic surface codes via a constant-depth \hyperref[topic:clifford]{Clifford circuit} \cite{arxiv:2310.16982}.'


