code_id: cubic_honeycomb_color
physical: qubits
logical: qubits

name: 'Cubic honeycomb color code'
introduced: '\cite{arxiv:cond-mat/0607736}'

description: |
  3D color code defined on a four-colorable bitruncated cubic honeycomb uniform tiling.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

  transversal_gates: 
    - 'A code family on a truncated cube with particular boundary conditions admits a transversal control-\(S\) gate via physical \(T\) and \(T^{\dagger}\) gates \cite{arxiv:2411.15035}.'


relations:
  parents:
    - code_id: 3d_color


