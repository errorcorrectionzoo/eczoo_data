code_id: tetrahedral_color
physical: qubits
logical: qubits

name: 'Tetrahedral color code'
introduced: '\cite{arxiv:1311.0879,arxiv:1410.0069}'

# https://www.youtube.com/watch?v=kTQ1p1OkLmo
# tetrahedral-octahedral honeycomb uniform tiling
# Tetrahedra do not tile space
description: |
  A 3D color code defined on a colored tetrahedron cut from a suitably colored BCC lattice \cite{arxiv:1311.0879}.
  Qubits are placed on tetrahedra, on the triangles covering the tetrahedron faces, on the edges along the tetrahedron edges, and on the tetrahedron vertices.
  The code has both string-like and sheet-like logical operators \cite{arxiv:1708.07131}.


features:
  rate: 'The tetrahedral family with linear size parameter \(L\) has \(n=1+4L+6L^2+4L^3\) physical qubits and encodes one logical qubit \cite{arxiv:1311.0879}.'
  transversal_gates:
    - 'A \([[5d^3-12d^2+16,3,d]]\) close relative of this code admits a logical \(CCZ\) gate via single-qubit rotations; for this family, stabilizers remain asymptotically constant-weight and can be gauge-reduced to weight at most six \cite{arxiv:2404.19005}.'

  threshold:
    - '\(0.46\%\) with clustering decoder \cite{arxiv:1708.07131}.'
    - '\(1.9\%\) for 1D string-like logical operators and \(27.6\%\) for 2D sheet-like operators for 3D codes with noise models using optimal decoding and perfect measurements \cite{arxiv:1708.07131}.'

  fault_tolerance:
    - 'Fault-tolerant quantum computation designed for a 2D architecture \cite{arxiv:1810.09571}.'


relations:
  parents:
    - code_id: 3d_color
  cousins:
    - code_id: bcc
      detail: 'The tetrahedral color code is defined on a lattice of tetrahedra carved out of a suitably colored BCC lattice \cite{arxiv:1311.0879}.'
    - code_id: 3d_surface
      detail: 'A tetrahedral 3D color code with four differently colored boundaries is equivalent, via a local \hyperref[topic:clifford]{Clifford circuit}, to three 3D surface codes attached along one boundary, with condensation of a composite electric charge on that attached boundary \cite{arxiv:1503.02065}.'


