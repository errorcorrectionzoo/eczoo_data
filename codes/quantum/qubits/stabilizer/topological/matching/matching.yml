code_id: matching
physical: qubits
logical: qubits

name: 'Matching code'
introduced: '\cite{arxiv:1501.07779}'

description: 'Member of a class of qubit stabilizer codes based on the Abelian phase of the Kitaev honeycomb model.'

realizations:
  - 'Braiding of defects has been demonstrated for a five-qubit version of the code \cite{arxiv:1609.07774}.'

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: qldpc
    - code_id: quantum_double_abelian
      detail: 'Matching codes were inspired by the \(\mathbb{Z}_2\) topological order phase of the Kitaev honeycomb model \cite{arxiv:cond-mat/0506438}.'
  cousins:
    - code_id: kitaev_honeycomb
      detail: 'Matching codes were inspired by the \(\mathbb{Z}_2\) topological order phase of the Kitaev honeycomb model \cite{arxiv:cond-mat/0506438}.'


