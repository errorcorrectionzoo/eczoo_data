code_id: xysurface
physical: qubits
logical: qubits

name: 'XY surface code'
introduced: '\cite{arxiv:1708.08474}'

alternative_names:
  - 'Tailored surface code (TSC)'

description: |
  A variant of the surface code whose generators are \(XXXX\)  and \(YYYY\), obtained by mapping \(Z \to Y\) in the surface code.
  While this code is equivalent to a CSS surface code with the same distance, other properties like noise-bias performance can differ significantly.


protection: As a stabilizer code, \([[n=O(d^2), k=O(1), d]]\).

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

  threshold:
    - '\(6.32(3)\%\) for infinite \(Z\) bias, and thresholds of \(\approx 5\%\) for \(Z\) bias around \(\eta = 100\) using a variant of the minimum-weight perfect matching decoder \cite{arxiv:1907.02554}.'
  code_capacity_threshold:
    - '\(50\%\) at infinite \(Z\) bias with maximum-likelihood decoder \cite{arxiv:1812.08186}.'
    - '\(18.7\%\) for standard depolarizing noise with maximum-likelihood decoder \cite{arxiv:1812.08186}.'

relations:
  parents:
    - code_id: surface
      detail: 'The XY surface code is obtained from the surface code by applying \(H\sqrt{Z}H\) to all qubits, thereby exchanging \(Z\leftrightarrow Y\). While it is equivalent to a CSS surface code with the same distance, but other properties like noise-bias performance can differ significantly.'
  cousins:
    - code_id: heavy_hex
      detail: 'XY surface code can be adapted for a heavy-hexagonal point set \cite{arxiv:2211.14038}.'


