code_id: hurwitz_surface
physical: qubits
logical: qubits

name: 'Hurwitz surface code'
introduced: '\cite{manual:{I. H. Kim, “Quantum codes on Hurwitz surfaces”, PhD thesis, Massachusetts Institute of Technology, 2007}}'

description: |
  Homological code constructed on triangulations of Hurwitz surfaces.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

  rate: 'Constant rate and vanishing distance \cite{manual:{I. H. Kim, “Quantum codes on Hurwitz surfaces”, PhD thesis, Massachusetts Institute of Technology, 2007}}.'


relations:
  parents:
    - code_id: hyperbolic_surface


