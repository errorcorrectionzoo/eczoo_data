code_id: golden
physical: qubits
logical: qubits

name: 'Golden code'
introduced: '\cite{arxiv:1712.08578}'

description: |
  Variant of the Guth-Lubotzky hyperbolic surface code that uses regular tessellations of 4-dimensional hyperbolic space.

protection: 'Nonvanishing rate and asymptotic distance lower bounded by \(n^0.1\).'

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

  rate: 'Nonvanishing rate and asymptotic distance lower bounded by \(n^0.1\).
  However, the smallest number of physical qubits in this family is 234,000.'

relations:
  parents:
    - code_id: four_dimensional_hyperbolic


