code_id: hypersphere_product
physical: qubits
logical: qubits

name: 'Hypersphere product code'
introduced: '\cite{arxiv:1608.05089}'

description: |
  Homological code based on products of hyperspheres.
  The hypersphere product code family has asymptotically diminishing soundness that scales as \hyperref[topic:asymptotics]{order} \(O(1/\log (n)^2)\), locality of stabilizer generators scaling as \hyperref[topic:asymptotics]{order} \(O(\log n/ \log\log n)\), and distance of \hyperref[topic:asymptotics]{order} \(\Theta(\sqrt{n})\).

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: higher_dimensional_surface
  cousins:
    - code_id: qltc
      detail: 'The hypersphere product code family has asymptotically diminishing soundness that scales as \hyperref[topic:asymptotics]{order} \(O(1/\log (n)^2)\), locality of stabilizer generators scaling as \hyperref[topic:asymptotics]{order} \(O(\log n/ \log\log n)\), and distance of \hyperref[topic:asymptotics]{order} \(\Theta(\sqrt{n})\).
      Applying Hastings'' weight-reduction construction yields QLDPC families with distance \(\Theta^*(\sqrt{n})\) and inverse-polylogarithmic soundness \cite{arxiv:1611.03790}.
      Application of generalized distance balancing \cite{arxiv:2004.07935} to hypersphere product codes using an asymptotically good classical code of length \(t\) yields \(O( 1/(\log(n)^2 t^2) )\) soundness and \hyperref[topic:asymptotics]{order} \(\Theta(\sqrt{n}t)\) distance while maintaining locality scaling and at the expense of a dimension scaling as \hyperref[topic:asymptotics]{order} \(\Theta(t^2)\) \cite{arxiv:2305.00689}.'
    - code_id: distance_balanced
      detail: 'Application of generalized distance balancing \cite{arxiv:2004.07935} to hypersphere product codes using an asymptotically good classical code of length \(t\) yields \(O( 1/(\log(n)^2 t^2) )\) soundness and \hyperref[topic:asymptotics]{order} \(\Theta(\sqrt{n}t)\) distance while maintaining locality scaling and at the expense of a dimension scaling as \hyperref[topic:asymptotics]{order} \(\Theta(t^2)\) \cite{arxiv:2305.00689}.'


