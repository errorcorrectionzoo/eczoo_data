code_id: 3d_bosonization
physical: qubits
logical: qubits

name: '3D bosonization code'
introduced: '\cite{arxiv:1807.07081}'

description: |
  A mapping from a 3D lattice quadratic Hamiltonian of Majorana modes to a lattice of qubits which realizes a \(\mathbb{Z}_2\) gauge theory with a particular Gauss law.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: bosonization
    - code_id: 3d_stabilizer
      detail: 'The 3D bosonization code encodes fermionic modes into a 3D qubit stabilizer code.'


