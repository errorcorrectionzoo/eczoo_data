code_id: 3d_bosonization
physical: qubits
logical: qubits

name: '3D bosonization code'
introduced: '\cite{arxiv:1807.07081}'

description: |
  A mapping that maps a 3D lattice quadratic Hamiltonian of Majorana modes into a lattice of qubits which realize a \(\mathbb{Z}_2\) gauge theory with a particular Gauss law.


relations:
  parents:
    - code_id: bosonization
    - code_id: qldpc
      detail: 'The 3D bosonization code encodes fermionic modes into a 3D qubit stabilizer code.'
    - code_id: 3d_stabilizer
      detail: 'The 3D bosonization code encodes fermionic modes into a 3D qubit stabilizer code.'


