code_id: mlsc
physical: qubits
logical: qubits

name: 'Majorana loop stabilizer code (MLSC)'
short_name: 'MLSC'
introduced: '\cite{arxiv:1812.08190}'

description: |
  A single-error-correcting fermion-into-qubit encoding defined on a 2D qubit lattice whose stabilizers are associated with loops in the lattice.

protection: |
  The code can correct single-qubit errors \cite{arxiv:1812.08190}.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: 2d_bosonization
      detail: 'The MLSC on a square lattice can be obtained from exact 2D bosonization by finite-depth generalized local unitaries \cite{arxiv:2201.05153}.'


