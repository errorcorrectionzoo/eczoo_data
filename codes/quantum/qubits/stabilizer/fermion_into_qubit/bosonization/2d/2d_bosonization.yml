code_id: 2d_bosonization
physical: qubits
logical: qubits

name: '2D bosonization code'
introduced: '\cite{arxiv:1711.00515}'

description: |
  A mapping between a 2D lattice quadratic Hamiltonian of Majorana modes and a 2D lattice of qubits.
  The original exact 2D bosonization code \cite{arxiv:1711.00515} is a stabilizer code whose generators are products of plaquettes and stars of the surface code, with gauge constraints that project onto a toric-code-like subspace with emergent fermions \cite{arxiv:1711.00515,arxiv:2201.05153}.
  Finite-depth generalized local unitary Clifford circuits generate a family of equivalent local encodings with qubit-to-fermion ratio \(r = 1 + \frac{1}{2k}\) for any positive integer \(k\); the square-lattice compact encoding with \(r=1.5\) and the super-compact encoding with \(r=1.25\) are explicit examples \cite{arxiv:2201.05153}.

protection: |
  The original code \cite{arxiv:1711.00515} can be converted via Clifford operations into codes whose distance runs up to \(7\) while preserving the code rate \cite{arxiv:2210.08411}.


features:
  encoders:
    - 'Tensor-network realization \cite{arxiv:1909.10552}, extended to periodic boundary conditions and sectors of odd fermionic charge \cite{arxiv:2404.07727}.'


