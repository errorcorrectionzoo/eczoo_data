code_id: aqm
physical: qubits
logical: qubits

name: 'Auxiliary qubit mapping (AQM) code'
short_name: 'AQM'
introduced: '\cite{arxiv:1712.07067,arxiv:1810.02681}'

description: |
  A concatenation of the JW transformation code with a qubit stabilizer code.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: fermions_into_qubits
    - code_id: qubit_concatenated
  cousins:
    - code_id: jw
      detail: 'The AQM fermion-into-qubit code reduces to the JW transformation code when the outer code is trivial.'


