code_id: ternary_tree_fermion
physical: qubits
logical: qubits

name: 'Ternary-tree fermion-into-qubit code'
introduced: '\cite{arxiv:1910.10746}'

description: |
  A fermion-into-qubit encoding defined on ternary trees that maps Majorana operators into Pauli strings of weight \(\lceil \log_3 (2n+1) \rceil\).

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

  general_gates:
    - 'Fermion permutations on \(N\) modes can be done with a circuit of depth \hyperref[topic:asymptotics]{order} \(O(\log^2 N)\) \cite{arxiv:2510.05099}.'

relations:
  parents:
    - code_id: fermions_into_qubits


