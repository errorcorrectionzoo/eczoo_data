code_id: bc_phantom
physical: qubits
logical: qubits

name: 'Binarized-and-concatenated (B\&C) phantom code'
short_name: 'B\&C phantom'
introduced: '\cite{arxiv:2601.20927}'

description: |
  Member of a family of \(k=2\) CSS phantom codes obtained from a \(q=4\) Galois-qudit CSS code by binarizing each \(\mathbb{F}_4\) qudit into two qubits and then concatenating each qubit pair with the \([[4,2,2]]\) code \cite{arxiv:2601.20927}.

  The construction starts from a \([[n,1,d]]_4\) CSS code satisfying a condition that realizes the Frobenius transform \(\gamma\mapsto\gamma^2\) by a coordinate permutation; together with field multiplication \(\gamma\mapsto\alpha\gamma\), this supplies all \(\mathrm{GL}(2,\mathbb{F}_2)\) transformations on the two binary components of the logical \(\mathbb{F}_4\) qudit after concatenation.
  Binarization uses the self-dual normal basis \(\{\omega,\omega^2\}\) of \(\mathbb{F}_4\).
  The subsequent \([[4,2,2]]\) layer maps a single \(\mathbb{F}_4\)-qudit Pauli to four-qubit Paulis, e.g.,
  \(X^\omega\mapsto XXII\), \(X^{\omega^2}\mapsto XIXI\), \(X^1\mapsto IXXI\), and similarly \(Z^{\omega^2}\mapsto IIZZ\), \(Z^\omega\mapsto IZIZ\), \(Z^1\mapsto IZZI\) \cite{arxiv:2601.20927}.

protection: |
  A starting \([[n,1,d]]_4\) CSS code yields a qubit CSS code with parameters \([[4n,2,\geq 2d]]\) after binarization and concatenation with the \([[4,2,2]]\) code \cite{arxiv:2601.20927}.
  The inner \([[4,2,2]]\) blocks contribute many weight-four stabilizers, while completing the stabilizer group may require generators whose weight is at least the code distance.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'
    - 'Ordinary CSS self-duality of the starting \(q=4\) Galois-qudit CSS code yields a permutation-assisted logical Hadamard on the resulting qubit code. Hermitian self-duality, meaning that the \(Z\)-type check space is the Frobenius conjugate of the \(X\)-type check space, additionally yields a logical \(CZ\) gate \cite{arxiv:2601.20927}.'

