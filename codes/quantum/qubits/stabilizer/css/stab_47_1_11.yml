code_id: stab_47_1_11
physical: qubits
logical: qubits

name: '\([[47,1,11]]\) quantum QR code'
introduced: '\cite{arxiv:0711.1556}'

description: |
  A \([[47,1,11]]\) self-dual CSS code constructed from a binary quadratic-residue code.
  It is one of the shortest known qubit stabilizer codes of distance eleven that realizes the full Clifford group transversally \cite{arxiv:2408.12752}.

protection: 'Detects up to 10-qubit errors and corrects up to 5-qubit errors.'

features:
  decoders:
    - 'The comparative logical-CNOT study of Ref. \cite{arxiv:0711.1556} used an algebraic decoder because table lookup is impractical at distance eleven; missing syndromes are reconstructed from algebraic relations before solving for the error locations.'

  transversal_gates:
    - 'All logical \hyperref[topic:clifford]{Clifford gates} are realized transversally \cite{arxiv:2408.12752}.'

  threshold:
    - 'In the same comparative study, the best finite-resource pseudo-threshold under depolarizing noise was \((6.45\pm 0.03)\times 10^{-4}\) at \(L=30,R=1\) \cite[Table 4]{arxiv:0711.1556}.'


relations:
  parents:
    - code_id: qubit_css
    - code_id: galois_quad_residue
      detail: 'The \([[47,1,11]]\) code is a qubit quantum QR code \cite{arxiv:0711.1556,arxiv:2408.12752}.'
  cousins:
    - code_id: self_dual_48_24_12
      detail: 'Applying the puncture-and-CSS construction of Ref. \cite{arxiv:2408.12752} to the \([48,24,12]\) self-dual doubly even quadratic-residue code yields the \([[47,1,11]]\) quantum QR code.'


