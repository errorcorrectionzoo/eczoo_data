code_id: single_qubit_clifford
physical: qubits
logical: qubits

name: '\([[2^{2r-1}-1,1,2^r-1]]\) quantum punctured RM code'
short_name: '\([[2^{2r-1}-1,1,2^r-1]]\)'
introduced: '\cite[Ch. 7]{preset:PreskillNotes}'

description: |
  A quantum Reed-Muller code constructed from a punctured self-dual RM code and its even subcode for \(r \geq 2\).

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'
    - 'All single-qubit gates in the \hyperref[topic:clifford]{Clifford group}.'

relations:
  parents:
    - code_id: quantum_reed_muller
      detail: 'The \([[2^{2r-1}-1,1,2^r-1]]\) quantum punctured RM codes are special cases of the \([[\sum_{i=w+1}^m \binom{m}{i}, \sum_{i=0}^{w} \binom{m}{i}, \sum_{i=w+1}^{r+1} \binom{r+1}{i}]]\) family for \(m \to 2r-1\), \(w \to 0\), and \(r \to r-1\).'
    - code_id: self_dual_css
      detail: 'Puncturing a self-dual RM code yields a classical punctured RM code whose dual is its even subcode; applying the CSS construction to the even subcode yields this self-dual CSS family \cite[Sec. 7.15.3]{preset:PreskillNotes}.'


