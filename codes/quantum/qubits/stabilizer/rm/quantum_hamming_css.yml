code_id: quantum_hamming_css
physical: qubits
logical: qubits

name: '\([[2^r-1, 2^r-2r-1, 3]]\) quantum Hamming code'
short_name: '\([[2^r-1, 2^r-2r-1, 3]]\)'
introduced: '\cite{arxiv:quant-ph/9605021}'

description: |
  Member of a family of self-dual CSS codes constructed from \([2^r-1,2^r-r-1,3]=C_X=C_Z\) Hamming codes and their duals, the simplex codes.
  The code's stabilizer generator matrix blocks \(H_{X}\) and \(H_{Z}\) are both the generator matrix for a simplex code.
  The weight of each stabilizer generator is \(2^{r-1}\).

protection: 'Protects against any single qubit error.'

features:
  transversal_gates:
    - 'Pauli, Hadamard, and CNOT gates.'
  decoders:
    - 'Efficient decoder \cite{arxiv:2207.08826}.'
  fault_tolerance:
    - 'Syndrome measurement can be done with two ancillary flag qubits \cite{arxiv:1705.02329}.'
    - 'Concatenating a growing sequence of quantum Hamming codes yields fault-tolerant quantum computation with constant space overhead and quasi-polylogarithmic time overhead \cite{arxiv:2207.08826}.'
    - 'Concatenating quantum Hamming codes on top of the \([[4,2,2]]\) and \(C_6\) codes yields fault-tolerant quantum computation with constant space and quasi-polylogarithmic time overheads \cite{arxiv:2402.09606}. In the optimized protocol of Ref. \cite{arxiv:2402.09606}, a level-five \(C_4/C_6\) code underlies concatenated quantum Hamming codes \(\mathcal{Q}_5,\mathcal{Q}_6,\mathcal{Q}_7,\mathcal{Q}_7\), yielding a \(2.5\%\) threshold and space overheads \(162\) and \(373\) physical qubits per logical qubit at physical error rate \(0.1\%\) for logical CNOT error rates \(10^{-10}\) and \(10^{-24}\), respectively. This scheme can be augmented to fit on a 1D qubit lattice with nearest-neighbor connectivity \cite{arxiv:2502.16132}.'
  threshold:
    - '\hyperref[topic:measurement-threshold]{Concatenated threshold} requiring constant-space and quasi-polylogarithmic time overhead \cite{arxiv:2207.08826}.'

relations:
  parents:
    - code_id: quantum_reed_muller
      detail: '\([[2^r-1, 2^r-2r-1, 3]]\) quantum Hamming codes are quantum RM codes because Hamming and simplex codes are both punctured RM codes.'
    - code_id: qudit_hamming_css
      detail: '\([[2^r-1, 2^r-2r-1, 3]]_p\) prime-qudit CSS codes for \(p=2\) reduce to \([[2^r-1, 2^r-2r-1, 3]]\) quantum Hamming codes.'
    - code_id: small_distance_qubit_stabilizer
  cousins:
    - code_id: hamming
      detail: 'Quantum Hamming codes result from applying the CSS construction to Hamming codes and their duals the simplex codes.'
    - code_id: simplex
      detail: 'Quantum Hamming codes result from applying the CSS construction to Hamming codes and their duals the simplex codes.'
    - code_id: qubit_concatenated
      detail: |
        Concatenating a growing sequence of quantum Hamming codes yields fault-tolerant quantum computation with constant space overhead and quasi-polylogarithmic time overhead \cite{arxiv:2207.08826}.
        Concatenating quantum Hamming codes on top of the \([[4,2,2]]\) and \(C_6\) codes yields fault-tolerant quantum computation with constant space and quasi-polylogarithmic time overheads \cite{arxiv:2402.09606}. In the optimized protocol of Ref. \cite{arxiv:2402.09606}, a level-five \(C_4/C_6\) code underlies concatenated quantum Hamming codes \(\mathcal{Q}_5,\mathcal{Q}_6,\mathcal{Q}_7,\mathcal{Q}_7\), yielding a \(2.5\%\) threshold and space overheads \(162\) and \(373\) physical qubits per logical qubit at physical error rate \(0.1\%\) for logical CNOT error rates \(10^{-10}\) and \(10^{-24}\), respectively. This scheme can be augmented to fit on a 1D qubit lattice with nearest-neighbor connectivity \cite{arxiv:2502.16132}.
        Quantum Hamming codes can also be concatenated with surface codes \cite{arxiv:2407.16176}.

    - code_id: stab_4_2_2
      detail: 'Concatenating quantum Hamming codes on top of the \([[4,2,2]]\) and \(C_6\) codes yields fault-tolerant quantum computation with constant space and quasi-polylogarithmic time overheads \cite{arxiv:2402.09606}. In the optimized protocol of Ref. \cite{arxiv:2402.09606}, a level-five \(C_4/C_6\) code underlies concatenated quantum Hamming codes \(\mathcal{Q}_5,\mathcal{Q}_6,\mathcal{Q}_7,\mathcal{Q}_7\), yielding a \(2.5\%\) threshold and space overheads \(162\) and \(373\) physical qubits per logical qubit at physical error rate \(0.1\%\) for logical CNOT error rates \(10^{-10}\) and \(10^{-24}\), respectively. This scheme can be augmented to fit on a 1D qubit lattice with nearest-neighbor connectivity \cite{arxiv:2502.16132}.'
    - code_id: stab_6_2_2
      detail: 'Concatenating quantum Hamming codes on top of the \([[4,2,2]]\) and \(C_6\) codes yields fault-tolerant quantum computation with constant space and quasi-polylogarithmic time overheads \cite{arxiv:2402.09606}. In the optimized protocol of Ref. \cite{arxiv:2402.09606}, a level-five \(C_4/C_6\) code underlies concatenated quantum Hamming codes \(\mathcal{Q}_5,\mathcal{Q}_6,\mathcal{Q}_7,\mathcal{Q}_7\), yielding a \(2.5\%\) threshold and space overheads \(162\) and \(373\) physical qubits per logical qubit at physical error rate \(0.1\%\) for logical CNOT error rates \(10^{-10}\) and \(10^{-24}\), respectively. This scheme can be augmented to fit on a 1D qubit lattice with nearest-neighbor connectivity \cite{arxiv:2502.16132}.'
    - code_id: surface
      detail: 'Quantum Hamming codes can be concatenated with surface codes \cite{arxiv:2407.16176}. In a unified logical-CNOT comparison under circuit-level depolarizing noise, using the surface code as the underlying code gives a \(0.31\%\) threshold and requires space overhead \(4.5\times 10^3\) at physical error rate \(0.1\%\) to achieve logical CNOT error rate \(10^{-24}\), compared to \(3.7\times 10^2\) for the optimized \(C_4/C_6\)/Hamming construction \cite{arxiv:2402.09606}.'
