code_id: morphed_diagonal_clifford
physical: qubits
logical: qubits

name: '\([[2^r+r-1,1,2]]\) morphed simplex code'
short_name: '\([[2^r+r-1,1,2]]\)'
introduced: '\cite{arxiv:2112.01446}'

alternative_names:
  - '\([[2^r+r-1,1,2]]\) morphed quantum RM code'

description: |
  A member of a family of codes obtained by morphing the \([[2^{r+1}-1,1,3]]\) simplex codes on a region whose child code is a \([[2^r,r,2]]\) hypercube code \cite[Appx. C]{arxiv:2112.01446}.
  The morphing process replaces a subset of qubits with their logical qubits, yielding a code with parameters \([[2^r+r-1,1,2]]\) that inherits a diagonal gate at the \((r-1)\)st level of the Clifford hierarchy from the parent code.
  
features:
  general_gates:
    - 'Each code implements a diagonal gate at the \((r-1)\)st level of the \term{Clifford hierarchy} using transversal operations and \(C^{r}Z\) gates \cite[Appx. C]{arxiv:2112.01446}.'

relations:
  parents:
    - code_id: qubit_css
    - code_id: small_distance_qubit_stabilizer
  cousins:
    - code_id: diagonal_clifford
      detail: 'The \([[2^r+r-1,1,2]]\) morphed simplex code is obtained by morphing the \([[2^{r+1}-1,1,3]]\) simplex code on a region whose child code is a \([[2^r,r,2]]\) hypercube code \cite[Appx. C]{arxiv:2112.01446}.'
    - code_id: hypercube_quantum
      detail: 'The \([[2^r+r-1,1,2]]\) morphed simplex code is obtained by morphing the \([[2^{r+1}-1,1,3]]\) simplex code on a region whose child code is a \([[2^r,r,2]]\) hypercube code \cite[Appx. C]{arxiv:2112.01446}.'


