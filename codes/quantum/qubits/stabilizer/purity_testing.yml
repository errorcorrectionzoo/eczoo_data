code_id: purity_testing
physical: qubits
logical: qubits

name: 'Purity-testing stabilizer code'
introduced: '\cite{arxiv:quant-ph/0205128}'

description: |
  A qubit stabilizer code that is constructed from a normal rational curve and that is relevant to testing the purity of an entangled Bell state shared by two parties \cite{arxiv:quant-ph/0205128}.
  Purity-testing stabilizer codes have been generalized to come from more general non-projective codes \cite{arxiv:2503.14003}.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: qubit_stabilizer
  cousins:
    - code_id: projective
      detail: 'Purity-testing stabilizer codes are constructed from normal rational curves.'
    - code_id: eastab
      detail: 'Purity-testing stabilizer codes are relevant to testing the purity of an entangled Bell state shared by two parties \cite{arxiv:quant-ph/0205128}.'


