code_id: square_lattice_cluster
physical: qubits
logical: qubits

name: 'Square-lattice cluster-state code'
introduced: '\cite{arxiv:quant-ph/0004051,arxiv:quant-ph/0108118,doi:10.1103/PhysRevLett.86.5188}'

description: |
  A code based on the cluster state on a square lattice that was used in the first proposal for MBQC \cite{arxiv:quant-ph/0108118,doi:10.1103/PhysRevLett.86.5188}.
  In the one-way model, the pre-entangled square-lattice cluster is a universal resource, and the computation is carried out entirely by adaptive single-qubit measurements.

protection: |
  Random measurement outcomes induce Pauli byproduct operators that are tracked classically and propagated to later measurements or the final readout \cite{doi:10.1103/PhysRevLett.86.5188}.
  For computations longer than the available lattice extent, the original paper proposed splitting the computation into consecutive segments and stabilizing each segment using standard error-correction techniques \cite{doi:10.1103/PhysRevLett.86.5188}.

features:
  encoders:
    - 'Initialization of each qubit in the \(|+\rangle\) state followed by nearest-neighbor Ising-type entangling evolution, equivalently controlled-phase gates on the edges of the square lattice, prepares the resource state \cite{doi:10.1103/PhysRevLett.86.5188}.'
  general_gates:
    - 'Measurements in the \(Z\) basis remove qubits from the lattice to carve out the computation network. \(X\)-basis measurements propagate quantum information along a wire, adaptive equatorial-basis measurements on a five-qubit chain implement arbitrary single-qubit \(SU(2)\) rotations, and a four-qubit pattern implements CNOT between neighboring wires. Later measurement bases can depend on earlier outcomes because of the tracked Pauli byproducts \cite{doi:10.1103/PhysRevLett.86.5188}.'
    - 'Universal MBQC remains possible on irregular occupied sublattices above the percolation threshold because wires and gates can be bent and stretched without changing circuit topology \cite{doi:10.1103/PhysRevLett.86.5188}.'


realizations:
  - 'Encoding on 72 qubits of the Zuchongzhi 3.1 quantum processor \cite{arxiv:2505.01978}.'

notes:
  - 'The original proposal discussed implementations using neutral atoms in optical lattices with controlled collisions and capacitively coupled quantum dots \cite{doi:10.1103/PhysRevLett.86.5188}.'

relations:
  parents:
    - code_id: cluster_state
    - code_id: qldpc
    - code_id: 2d_stabilizer
  cousins:
    - code_id: spt
      detail: |
        The square-lattice cluster state, which is the prototypical resource for universal MBQC \cite{arxiv:quant-ph/0108118,doi:10.1103/PhysRevLett.86.5188}, and other 2D cluster states \cite{arxiv:1806.08780,arxiv:1806.04663,arxiv:1907.13279} have SPT order protected by subsystem symmetries \cite{arxiv:1803.02369,arxiv:1803.00095,arxiv:1806.08780}.


