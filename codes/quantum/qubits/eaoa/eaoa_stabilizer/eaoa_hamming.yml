code_id: eaoa_hamming
physical: qubits
logical: qubits

name: '\([[10,1,3;1,3,4]]\) EAOA Hamming code'
introduced: '\cite{arxiv:2411.14389}'

description: |
  An EAOA qubit stabilizer code constructed from the dual of a \([10,6,3]\) code obtained by shortening the classical \([15,11,3]\) Hamming code at five positions.
  In the notation of the parent entry, the example of Ref. \cite{arxiv:2411.14389} is a \([[10,1,3;1,3,4]]\) code: it encodes one logical qubit and four classical strings (equivalently, two classical bits), while retaining one gauge qubit and using three ebits.


relations:
  parents:
    - code_id: eaoa_stabilizer
  cousins:
    - code_id: hamming
      detail: 'The dual of a \([10,6,3]\) code obtained by shortening the \([15,11,3]\) Hamming code at five positions can be used to construct \([[10,1,3;1,3,4]]\) EAOA Hamming code \cite{arxiv:2411.14389}.'
    - code_id: small_distance_qubit_stabilizer


