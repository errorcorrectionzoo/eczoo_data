      detail: 'EA FG-QLDPC codes are entanglement-assisted quantum analogues of finite-geometry LDPC codes.'
    - code_id: pg_qldpc
      detail: 'EA FG-QLDPC codes are entanglement-assisted versions of FG qubit QLDPC codes.'
