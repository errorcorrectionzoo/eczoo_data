code_id: ea_pg_qldpc
physical: qubits
logical: qubits

name: 'EA FG-QLDPC code'
introduced: '\cite{arxiv:0906.5532}'

description: |
  One of several EA QLDPC code families constructed from finite-geometry LDPC (FG-LDPC) codes.
  The construction includes families whose entanglement-consumption rate \(c/n\) decreases with block length \(n\) \cite{arxiv:0906.5532}.
  Two such FG-based families require only one ebit (\(c=1\)) independent of code length \cite{arxiv:0906.5532}.


relations:
