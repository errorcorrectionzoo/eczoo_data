code_id: ea_qc_qldpc
physical: qubits
logical: qubits

name: 'EA QC-QLDPC code'
introduced: '\cite{arxiv:0803.0100}'

description: |
  One of several EA QLDPC code families constructed from classical QC-LDPC codes with girth at least six.
  The entanglement assistance removes the dual-containing constraint in the CSS construction, avoiding many 4-cycles while retaining SPA decoding \cite{arxiv:0803.0100}.

features:
  decoders:
    - 'Sum-product algorithm (SPA) decoder \cite{arxiv:0906.5532}.'


relations:
  parents:
    - code_id: ea_qldpc
  cousins:
    - code_id: qc_ldpc
      detail: 'EA QC-QLDPC codes are entanglement-assisted quantum analogues of QC-LDPC codes.'
    - code_id: quasi_cyclic_qldpc
      detail: 'EA QC-QLDPC codes are entanglement-assisted versions of QC-QLDPC codes.'
