code_id: ea_quantum_convolutional
physical: qubits
logical: qubits

name: 'EA quantum convolutional code'
introduced: '\cite{arxiv:0712.2223,arxiv:0806.4214,arxiv:0807.3803}'

description: |-
  A quantum convolutional code designed to utilize pre-shared entanglement between sender and receiver \cite{arxiv:0712.2223,arxiv:0806.4214,arxiv:0807.3803}.
  Entanglement assistance removes the self-orthogonality constraint that ordinary quantum convolutional codes inherit from the stabilizer formalism, allowing arbitrary classical convolutional codes to be imported into quantum ones \cite{arxiv:0807.3803}.
  In some constructions, the additional ebits also reduce the memory requirements of the encoding circuit \cite{arxiv:0812.4449}.

features:
  encoders:
    - 'Importing arbitrary classical quaternary convolutional codes into entanglement-assisted quantum convolutional encoders \cite{arxiv:0712.2223,arxiv:0807.3803}.'


