code_id: majorana_checkerboard
physical: qubits
logical: qubits

name: 'Majorana checkerboard code'
introduced: '\cite{arxiv:1505.02576}'

alternative_names:
  - 'Majorana cubic model code'

description: |
  A Majorana analogue of the X-cube model defined on a cubic lattice.
  The code admits weight-eight Majorana stabilizer generators on the eight vertices of each cube of a checkerboard sublattice.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: majorana_stab
    - code_id: qldpc
      detail: 'The Majorana checkerboard code is a 3D qubit stabilizer code with respect to the Majorana operator basis.'
    - code_id: fracton
      detail: 'The Majorana checkerboard code is a foliated type-I fracton code \cite{arxiv:1904.01111}.'
  cousins:
    - code_id: xcube
      detail: 'The Majorana checkerboard code is equivalent via a constant-depth unitary to a semionic version of the X-cube model and some decoupled fermionic modes \cite{arxiv:1904.01111}.'


