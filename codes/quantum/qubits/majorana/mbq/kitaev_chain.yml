code_id: kitaev_chain
physical: qubits
logical: qubits

name: 'Kitaev chain code'
introduced: '\cite{arxiv:cond-mat/0010440}'

alternative_names:
  - 'Majorana repetition code'
# 2411.08955 and 2412.16081

description: |
  A Majorana stabilizer code obtained from the ground-state subspace of the Kitaev Majorana chain in its fermionic topological phase \cite{arxiv:cond-mat/0010440}. Its codespace is stabilized by nearest-neighbor Majorana bilinears, while two unpaired edge Majoranas furnish one logical fermionic mode. Under parity-preserving noise, it behaves as the Majorana analogue of the repetition code \cite{arxiv:2411.08955}.

  At the fixed-point limit, the code Hamiltonian is proportional to \(-\sum_{j=1}^{n-1} i \gamma_{2j}\gamma_{2j+1}\), so the codespace is the common \(+1\) eigenspace of the stabilizers \(S_j=i\gamma_{2j}\gamma_{2j+1}\). The two unpaired edge operators \(\gamma_{1}\) and \(\gamma_{2n}\) are the \textit{Majorana zero modes (MZMs)} or \textit{Majorana edge modes (MEMs)}; they commute with all stabilizers and define a logical fermionic mode \(f_{\mathrm{L}}=(\gamma_{1}+i\gamma_{2n})/2\). Via the Jordan-Wigner transformation, the model maps to the 1D quantum Ising chain in its symmetry-breaking phase.
  The code can be thought of as the Majorana stabilizer analogue of the quantum repetition code: parity-preserving dephasing operators \(Z_j=i\gamma_{2j-1}\gamma_{2j}\) play the role of repetition-code bit flips, while the logical Majorana operators have odd weight and therefore encode a logical fermion \cite{arxiv:2411.08955}.

  The two basis states of a single chain have opposite fermionic parity.
  Therefore, a single chain does not by itself furnish a fixed-parity qubit encoding; coherent superpositions between the two basis states are not directly accessible in an isolated fermionic system with parity superselection.
  One can combine two such code blocks to form a Majorana box qubit, which is the fixed-parity subspace of the combined codespace.
  Odd numbers of code blocks also contain fixed-parity logical subspaces in their codespace.

protection: |
  In the fixed-point limit, local parity-preserving bilinears such as \(Z_j=i\gamma_{2j-1}\gamma_{2j}\) anticommute with nearby stabilizers, so the chain behaves as a repetition code against dephasing or phase errors \cite{arxiv:2411.08955}. For a finite chain, the splitting between the two code states is exponentially small in the separation between the edge modes \cite{arxiv:cond-mat/0010440}.
  As a Majorana stabilizer code, however, its distance is \(1\) because a single MZM is already a logical operator. The code therefore does not protect against single-Majorana, parity-violating errors such as quasiparticle poisoning.
  Disorder may help with protection \cite{arxiv:1108.3845}.

features:
  general_gates:
    - 'Braiding, \(S\), and \(T\) phase gates, fermion \(CZ_f\), and mixed qubit-fermion \(CZ_{qf}\) gates are described for logical fermions encoded in this repetition code \cite{arxiv:2411.08955}.'
  decoders:
    - 'Local automaton decoder based on self-dual cellular automaton \cite{arxiv:1711.08196}.'
    - 'Syndrome extraction of the stabilizers \(S_j=i\gamma_{2j}\gamma_{2j+1}\) can be performed by interfacing with a qubit ancilla and mixed qubit-fermion gates \cite{arxiv:2411.08955}.'


realizations:
  - 'Photonic systems: braiding of topological Majorana modes has been simulated in a device that has a different notion of locality than a bona fide fermionic system \cite{arxiv:1411.7751}.'
  - 'Superconducting circuits: preparation \cite{arxiv:2206.00563}, braiding \cite{arxiv:2203.15083}, and detection of Majorana edge modes \cite{arxiv:2203.15083,arxiv:2204.11372} have been simulated in devices that have a different notion of locality than a bona fide fermionic system.'



notes:
  - 'See notes \cite{arxiv:0904.2771} for a description of this code.'

relations:
  parents:
    - code_id: mbq
      detail: 'Majorana box qubit codes are defined to be positive-parity logical subspaces of two or more Kitaev-chain code blocks. The parameter \(n\) in the MBQ code definition corresponds to the number of Kitaev chains used in the construction, and not the total number of physical Majorana modes of the chains.'
    - code_id: spt
      detail: 'The Kitaev chain is a 1D fermionic SPT (more precisely, a 1D topological superconductor) protected by fermion parity symmetry.'
  cousins:
