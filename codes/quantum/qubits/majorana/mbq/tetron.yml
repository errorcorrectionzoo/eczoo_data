code_id: tetron
physical: qubits
logical: qubits

name: 'Tetron code'
introduced: '\cite{arxiv:quant-ph/0205004,arxiv:cond-mat/0506438,arxiv:1004.3791,arxiv:1610.05289}'

alternative_names:
  - 'Kitaev-Wen Majorana mapping'
  - 'Kitaev honeycomb mapping'
  - 'Bravyi-Leemhuis-Terhal (BLT) Majorana mapping'
  - 'Majorana representation'
  - 'Parton construction'

description: |
  A \([[2,1,2]]_{f}\) Majorana box qubit encoding a logical qubit into four Majorana modes, equivalently into the fixed-total-parity sector of two physical fermionic modes.
  Four Majorana zero modes are the smallest aggregate that supports a qubit in a fixed fermion-parity sector \cite{arxiv:1610.05289}.
  This code can be concatenated with various qubit codes such as surface codes and color codes.
  Four-boundary Majorana surface-code patches are logical tetrons, i.e., higher-distance analogues of this physical tetron block \cite{arxiv:1801.08143}.

  Embedding each physical qubit into two fermions via the tetron code is useful for exactly solving the Kitaev honeycomb model Hamiltonian \cite{arxiv:cond-mat/0506438} and other qubit Hamiltonians on certain graphs \cite{arxiv:2003.05465,arxiv:2012.07857}.
  It has been used throughout condensed matter physics under the name of the Majorana representation \cite{arxiv:cond-mat/9305017,arxiv:cond-mat/9504006} or parton construction \cite{arxiv:2204.11888}, allowing for a mean-field treatment of many models that are otherwise not amenable.
  Majorana stabilizer groups can be converted into ordinary qubit stabilizer groups via the parton mapping, while their corresponding states are converted via the Gutzwiller projection \cite{arxiv:2505.02683}.

protection: |
  A tetron is the smallest fixed-parity Majorana block that can host a qubit.
  Single-Majorana events are detectable as parity violations if the tetron parity is measured, but two-Majorana operators act within the codespace and can realize logical Pauli errors, so a bare tetron is only an error-detecting block and not an error-correcting code \cite{arxiv:1801.08143}.

