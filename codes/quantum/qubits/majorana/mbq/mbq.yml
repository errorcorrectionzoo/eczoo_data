      detail: 'When treated as ground states of the code Hamiltonian, codewords of a single Kitaev chain realize \(\mathbb{Z}_2\) fermionic topological order.'
    - code_id: qldpc
      detail: 'The Majorana box qubit is a 1D qubit stabilizer code with respect to the Majorana operator basis.'
    - code_id: 1d_stabilizer
      detail: 'The Majorana box qubit is a 1D qubit stabilizer code with respect to the Majorana operator basis.'
  cousins:
    - code_id: hamiltonian
      detail: 'A Majorana box qubit forms a fixed-parity subspace of the ground-state subspace of one or more Kitaev Majorana chain Hamiltonians.'
    - code_id: majorana_surface
      detail: 'The 4.8.8, 6.6.6, and 4.6.12 Majorana surface-code families realize logical tetrons and hexons as fault-tolerant versions of these small Majorana blocks, using tetrons, hexons, or dodecons as parity-fixed building blocks \cite{arxiv:1801.08143}.'
    - code_id: majorana_color
      detail: 'Majorana color codes are obtained by stacking Majorana surface-code layers and replacing stacked building blocks by small Majorana fermion codes such as hexons, octons, and the \([[20,4,4]]_m\) decon-based code \cite[Sec. V]{arxiv:1801.08143}.'


