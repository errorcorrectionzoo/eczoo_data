code_id: mbq
physical: qubits
logical: qubits

name: 'Majorana box qubit'
introduced: '\cite{arxiv:cond-mat/0010440,arxiv:1609.01697,arxiv:1610.05289}'

description: |
  A family of Majorana stabilizer codes obtained by fixing the total fermion parity of \(n\) fermionic modes, equivalently \(2n\) Majorana zero modes, within the ground-state subspace of one or more Kitaev Majorana chain Hamiltonians.
  The resulting positive-parity subspace encodes \(n-1\) logical qubits and has Majorana distance \(2\).
  The \([[2,1,2]]_{f}\) member is called the tetron Majorana code, while an \([[3,2,2]]_{f}\) extension using three Kitaev chains and housing two logical qubits of the same parity is called the \textit{hexon Majorana code}.
  Similarly, \textit{octon}, \textit{decon}, and \textit{dodecon} are codes defined by the positive-parity subspace of \(4\), \(5\), and \(6\) fermionic modes, respectively \cite{arxiv:1801.08143}.


protection: |
  Fixing total fermion parity detects single-Majorana events as parity violations if that parity is measured.
  However, these distance-two box-qubit codes do not correct errors: two-Majorana operators act within the fixed-parity sector and can implement logical Pauli errors without changing the stabilizer outcome, while treating the parity constraint as a Hamiltonian term turns single-Majorana events into leakage errors \cite{arxiv:1801.08143}.


features:
  general_gates:
    - 'Braiding and fusion of MZMs, which act as Ising anyons \cite{arxiv:1006.4395,arxiv:1511.05153}.'
  decoders:
    - 'Qubit readout can be done by charge sensing \cite{arxiv:1511.05153,arxiv:1609.01697,arxiv:1610.05289,arxiv:2004.02124}.'
  fault_tolerance:
    - 'Fault-tolerant computation scheme \cite{arxiv:2502.12252}.'


