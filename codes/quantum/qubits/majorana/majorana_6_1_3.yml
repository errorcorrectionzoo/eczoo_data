code_id: majorana_6_1_3
physical: qubits
logical: qubits

name: '\([[6,1,3]]_{f}\) Vijay-Fu Majorana code'
introduced: '\cite{arxiv:1703.00459}'

description: |
  A Majorana stabilizer code encoding a logical fermion into six physical fermions.
  This code is the shortest code correcting single fermion-parity flips \cite{arxiv:1703.00459}.

features:
  transversal_gates:
    - 'Logical Pauli transformations \cite{arxiv:quant-ph/9705052,arxiv:0903.5256,arxiv:1803.06987}.'
    - 'The four-block transversal gate mapping each \(X \to IXXX\) and each \(Z \to IZZZ\) implements the same logical gate on all qubits \cite[Exam. 1]{arxiv:quant-ph/9703048}\cite{arxiv:quant-ph/9705052}.'

relations:
  parents:
    - code_id: majorana_stab
    - code_id: small_distance_qubit_stabilizer


