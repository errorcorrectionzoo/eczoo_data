code_id: majorana_hamming
physical: qubits
logical: qubits

name: '\([[2^{m-1},2^{m-1}-m-1,4]]_{f}\) Hamming Majorana code'
introduced: '\cite{arxiv:1703.00612}'

# n is number of fermionic modes, so mult by 2 to get number of Majorana modes
description: |
  A member of the \([[2^{m-1},2^{m-1}-m-1,4]]_{f}\) family of Majorana stabilizer codes for \(m \geq 3\) constructed from a self-orthogonal first-order RM code (whose dual is the extended Hamming code).
  A shortened  \([[2^{m-1}-1,2^{m-1}-m-2,3]]_{f}\) version can also be defined \cite[Prop. 2.5.1]{arxiv:2502.14165}.
  The logical subspace of the \([[8,3,4]]_{f}\) Hamming Majorana code is a Cartan subspace of the \(E_8\) Lie algebra \cite{arxiv:1801.06998}.
  In the notation of \cite{arxiv:1801.08143}, the \([[8,3,4]]_{f}\) member is a \([[16,3,4]]_m\) code and serves as the inner code of an order-3 Majorana color code with Majorana overhead \(\frac{4}{3}d^2\) and maximum stabilizer weight \(16\).

protection: |
  The \([[8,3,4]]_{f}\) member has Majorana distance \(4\).
  When concatenated with a 4.8.8 Majorana surface code, it yields an order-3 Majorana color code of distance \(d\) and overhead \(\frac{4}{3}d^2\) Majoranas per logical qubit \cite{arxiv:1801.08143}.


