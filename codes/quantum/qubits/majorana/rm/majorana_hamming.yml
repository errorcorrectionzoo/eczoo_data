    - code_id: majorana_color
      detail: 'The \([[8,3,4]]_{f}\) Hamming Majorana code, i.e., the \([[16,3,4]]_m\) code of \cite{arxiv:1801.08143}, can replace stacks of three tetrons in a 4.8.8 Majorana surface code to yield an order-3 Majorana color code with overhead \(\frac{4}{3}d^2\) and maximum stabilizer weight \(16\) \cite[Table I]{arxiv:1801.08143}.'


