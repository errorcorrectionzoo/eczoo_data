      detail: 'The original Majorana color code is a fermionic analogue of a 2D color code in which one Majorana face operator doubles to matching \(X\)- and \(Z\)-type face checks, but the underlying cylinder graph need only be locally \(3\)-colorable and can support odd boundary logical operators \cite{arxiv:1004.3791}. Later realizations mirror the bosonic surface-to-color concatenation picture by stacking Majorana surface-code layers and replacing stacked building blocks with small Majorana fermion codes \cite{arxiv:1703.00612,arxiv:1704.01589,arxiv:1708.05012,arxiv:1801.08143}.'



