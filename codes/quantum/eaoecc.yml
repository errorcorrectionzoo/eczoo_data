code_id: eaoecc
#physical: bits
#logical: qubits

name: 'Entanglement-assisted (EA) operator QECC'
short_name: 'EAOQECC'
introduced: '\cite{arxiv:0708.2142,doi:10.1109/ISIT.2007.4557160}'

alternative_names:
  - 'EA subsystem QECC'

description: |
  Subsystem QECC whose encoding and decoding utilize pre-shared entanglement between sender and receiver.


relations:
  parents:
    - code_id: eaoaecc
      detail: 'An EAOA QECC that has gauge structure (e.g., gauge qubits), that has no block structure that corresponds to a classical code, and that utilizes pre-shared entanglement is an EAOQECC.'
  cousins:
    - code_id: oecc
      detail: 'EAOQECCs utilize additional ancillary subsystems in a pre-shared entangled state, but reduce to subsystem QECCs when said subsystems are interpreted as noiseless physical subsystems.'
    # EA tree separate


