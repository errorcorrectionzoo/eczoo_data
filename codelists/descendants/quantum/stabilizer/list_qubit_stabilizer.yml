
list_id: 'qubit_stabilizer'

title: |
  Qubit stabilizer codes (non-CSS)

intro: |
  Here is a list of non-CSS \hyperref[code:qubit_stabilizer]{qubit stabilizer codes}. For non-qubit non-CSS stabilizer codes, see \hyperref[codelist:stabilizer]{Stabilizer codes (non-CSS, non-qubit)}. For CSS codes, see \hyperref[codelist:qubit_css]{Qubit CSS codes} and \hyperref[codelist:css]{Quantum CSS codes (non-qubit)}.


display:
  style: table
  options:
    cssclass: xtra-xtra-stretch
    columns:
      - property: name
        title: Code
        link_to_code: true
        cssclass: 'top left'

      - property: description
        title: Description
        cssclass: 'textit'
        first_paragraph_only: true

sort:
  by: name

codes:
  select:
    - descendant_of: qubit_stabilizer
    - not_descendant_of: qubit_css