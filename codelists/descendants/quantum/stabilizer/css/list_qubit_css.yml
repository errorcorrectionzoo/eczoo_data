
list_id: 'qubit_css'

title: |
  Qubit CSS codes

intro: |
  Here is a list of qubit \hyperref[code:qubit_css]{CSS codes}. For non-qubit CSS codes, see \hyperref[codelist:css]{Quantum CSS codes (non-qubit)}. For non-CSS stabilizer codes, see \hyperref[codelist:qubit_stabilizer]{Qubit stabilizer codes (non-CSS)} and \hyperref[codelist:stabilizer]{Stabilizer codes (non-CSS, non-qubit)}.


display:
  style: table
  options:
    cssclass: xtra-xtra-stretch
    columns:
      - property: name
        title: Code
        link_to_code: true
        cssclass: 'top left'

      - property: description
        title: Description
        cssclass: 'textit'
        first_paragraph_only: true

sort:
  by: name

codes:
  select:
    - descendant_of: qubit_css