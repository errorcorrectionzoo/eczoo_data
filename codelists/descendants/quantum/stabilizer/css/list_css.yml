
list_id: 'css'

title: |
  Quantum CSS codes (non-qubit)

intro: |
  Here is a list of non-qubit \hyperref[code:css]{quantum CSS codes}. For qubit CSS codes, see \hyperref[codelist:qubit_css]{Qubit CSS codes}.

display:
  style: table
  options:
    cssclass: xtra-xtra-stretch
    columns:
      - property: name
        title: Code
        link_to_code: true
        cssclass: 'top left'

      - property: description
        title: Description
        cssclass: 'textit'
        first_paragraph_only: true

sort:
  by: name

codes:
  select:
    - descendant_of: css
    - not_descendant_of: qubit_css
