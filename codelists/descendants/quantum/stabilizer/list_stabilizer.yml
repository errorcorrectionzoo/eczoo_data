
list_id: 'stabilizer'

title: |
  Stabilizer codes (non-CSS, non-qubit)

intro: |
  Here is a list of non-CSS non-qubit \hyperref[code:stabilizer]{stabilizer codes}. For qubit non-CSS stabilizer codes, see \hyperref[codelist:qubit_stabilizer]{Qubit stabilizer codes (non-CSS)}. For CSS codes, see \hyperref[codelist:css]{Quantum CSS codes (non-qubit)} and \hyperref[codelist:qubit_css]{Qubit CSS codes}.


display:
  style: table
  options:
    cssclass: xtra-xtra-stretch
    columns:
      - property: name
        title: Code
        link_to_code: true
        cssclass: 'top left'

      - property: description
        title: Description
        cssclass: 'textit'
        first_paragraph_only: true

sort:
  by: name

codes:
  select:
    - descendant_of: stabilizer
    - not_descendant_of: css
    - not_descendant_of: qubit_stabilizer
