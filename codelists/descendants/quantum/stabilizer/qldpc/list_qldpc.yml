
list_id: 'qldpc'

title: |
  Qubit QLDPC codes (non-lattice)

intro: |
  Here is a list of non-lattice \hyperref[code:qldpc]{qubit QLDPC codes}.
  Lattice qubit QLDPC codes are listed in the \hyperref[codelist:qubit_translationally_invariant]{list of lattice qubit stabilizer codes}.


display:
  style: table
  options:
    cssclass: xtra-xtra-stretch
    columns:
      - property: name
        title: Code
        link_to_code: true
        cssclass: 'top left'

      - property: description
        title: Description
        cssclass: 'textit'
        first_paragraph_only: true

sort:
  by: name

codes:
  select:
    - descendant_of: qldpc
      not_descendant_of: translationally_invariant_stabilizer

