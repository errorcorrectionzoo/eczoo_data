
list_id: quantum_concatenated

title: |
  Concatenated quantum codes and friends

intro: |
  Here is a list of concatenated quantum codes.


display:
  style: table
  options:
    cssclass: xtra-xtra-stretch
    columns:
      - property: name
        title: Code
        link_to_code: true
        cssclass: 'top left'

      - property: description
        title: Description
        cssclass: 'textit'
        first_paragraph_only: true

sort:
  by: name

# Rule is to make single instanced children of instances which concatenate the same code, so repetition is a child of QPC, but hierarchical is not a parent of surface (different codes being concatenated)
codes:
  select:
    - descendant_of: quantum_concatenated
