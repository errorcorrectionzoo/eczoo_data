
list_id: 'subsystem'

title: |
  Subsystem codes (non-stabilizer)

intro: |
  Here is a list of quantum \hyperref[code:oecc]{subsystem codes} that are not subsystem stabilizer codes (see \hyperref[codelist:subsystem_stabilizer]{Subsystem stabilizer codes}).


display:
  style: table
  options:
    cssclass: xtra-xtra-stretch
    columns:
      - property: name
        title: Code
        link_to_code: true
        cssclass: 'top left'

      - property: description
        title: Description
        cssclass: 'textit'
        first_paragraph_only: true

sort:
  by: name

codes:
  select:
    - descendant_of: oecc
    - not_descendant_of: subsystem_stabilizer
