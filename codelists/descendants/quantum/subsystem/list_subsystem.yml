
list_id: 'subsystem'

title: |
  Subsystem codes (non-qubit)

intro: |
  Here is a list of non-qubit quantum \hyperref[code:oecc]{subsystem codes}. For operator-algebra qubit codes, see \hyperref[codelist:oa_qubit]{Operator-algebra qubit codes}.


display:
  style: table
  options:
    cssclass: xtra-xtra-stretch
    columns:
      - property: name
        title: Code
        link_to_code: true
        cssclass: 'top left'

      - property: description
        title: Description
        cssclass: 'textit'
        first_paragraph_only: true

sort:
  by: name

codes:
  select:
    - descendant_of: oecc
      not_any_descendant_of: ['subsystem_qubits_into_qubits']
