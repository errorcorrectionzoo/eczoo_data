
list_id: 'subsystem_qldpc'

title: |
  QLDPC subsystem codes

intro: |
  Here is a list of 
  \hyperref[code:sparse_subsystem]{QLDPC subsystem codes}.


display:
  style: table
  options:
    cssclass: xtra-xtra-stretch
    columns:
      - property: name
        title: Code
        link_to_code: true
        cssclass: 'top left'

      - property: description
        title: Description
        cssclass: 'textit'
        first_paragraph_only: true

sort:
  by: name

codes:
  select:
    - descendant_of: sparse_subsystem