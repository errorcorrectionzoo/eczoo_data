
list_id: 'oa_qubit'

title: |
  Operator-algebra qubit codes

intro: |
  Here is a list of \hyperref[code:oa_qubits_into_qubits]{operator-algebra qubit codes} that are not ordinary (i.e., subspace) \hyperref[code:qubits_into_qubits]{qubit codes}. Subsystem stabilizer qubit codes are included here and in \hyperref[codelist:subsystem_stabilizer]{Subsystem stabilizer codes}.


display:
  style: table
  options:
    cssclass: xtra-xtra-stretch
    columns:
      - property: name
        title: Code
        link_to_code: true
        cssclass: 'top left'

      - property: description
        title: Description
        cssclass: 'textit'
        first_paragraph_only: true

sort:
  by: name

codes:
  select:
    - descendant_of: oa_qubits_into_qubits
      not_descendant_of: qubits_into_qubits