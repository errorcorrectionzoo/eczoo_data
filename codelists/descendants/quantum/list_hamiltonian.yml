
list_id: 'hamiltonian'

title: |
  Hamiltonian-based codes

intro: |
  Here is a list of \hyperref[code:hamiltonian]{Hamiltonian-based quantum codes} that are non-stabilizer and non-constant-excitation (CE).
  All stabilizer codes (see list) are automatically Hamiltonian-based since their codewords are ground states of the stabilizer generator Hamiltonian.
  All CE codes (see list) are associated with a Hamiltonian that counts the number of excitations, so they are also Hamiltonian-based.

display:
  style: table
  options:
    cssclass: xtra-xtra-stretch
    columns:
      - property: name
        title: Code
        link_to_code: true
        cssclass: 'top left'

      - property: description
        title: Description
        cssclass: 'textit'
        first_paragraph_only: true

sort:
  by: name

codes:
  select:
    - descendant_of: hamiltonian
    - not_descendant_of: stabilizer
    - not_descendant_of: constant_excitation
#     - cousin_of: hamiltonian
